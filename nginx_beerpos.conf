upstream beerpos_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ============================================================
# PUBLIC: biatuoitayninh.store
# ============================================================
server {
    listen 80;
    server_name biatuoitayninh.store www.biatuoitayninh.store;
    return 301 https://biatuoitayninh.store$request_uri;
}

server {
    listen 443 ssl http2;
    server_name biatuoitayninh.store www.biatuoitayninh.store;

    ssl_certificate /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/beer-pos;
    index landing.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /deploy {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "public";
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ~* \.(mp4|webm|ogg)$ {
        add_header Content-Type "video/mp4" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Accept-Ranges "bytes";
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        sendfile on;
        tcp_nopush on;
        directio 512;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri $uri/ /landing.html;
    }
}

# ============================================================
# ADMIN: admin.biatuoitayninh.store
# ============================================================
server {
    listen 80;
    server_name admin.biatuoitayninh.store;
    return 301 https://admin.biatuoitayninh.store$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.biatuoitayninh.store;

    ssl_certificate /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # API endpoints
    location /api/ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Socket.IO (WebSocket handshake/upgrade) — Express on 3000
    location /socket.io/ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Native WebSocket (ws library) — port 3001
    location /ws/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }

    # WebSocket at ROOT — client connects wss://admin.biatuoitayninh.store/
    # MUST be before "location /" prefix match to take priority
    location = / {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # SPA fallback — all other paths go to Express
    location / {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
