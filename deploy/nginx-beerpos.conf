upstream beerpos_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ============================================================
# PUBLIC: biatuoitayninh.store
# ============================================================
server {
    listen 80;
    server_name biatuoitayninh.store www.biatuoitayninh.store;
    return 301 https://biatuoitayninh.store$request_uri;
}

server {
    listen 443 ssl http2;
    server_name biatuoitayninh.store www.biatuoitayninh.store;

    ssl_certificate /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/beer-pos;
    index landing.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /deploy {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "public";
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ~* \.(mp4|webm|ogg)$ {
        add_header Content-Type "video/mp4" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Accept-Ranges "bytes";
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        sendfile on;
        tcp_nopush on;
        directio 512;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri $uri/ /landing.html;
    }
}

# ============================================================
# ADMIN: admin.biatuoitayninh.store
# ============================================================
server {
    listen 80;
    server_name admin.biatuoitayninh.store;
    return 301 https://admin.biatuoitayninh.store$request_uri;
}

server {
    # NOTE: http2 removed from admin subdomain. Socket.IO uses WebSocket upgrade
    # via Connection:Upgrade header which is incompatible with HTTP/2 multiplexing.
    # Socket.IO transparently falls back to HTTP polling when WebSocket fails.
    listen 443 ssl;
    server_name admin.biatuoitayninh.store;

    ssl_certificate /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Socket.IO WebSocket + Polling (MUST be before location /) ─────────────
    # Socket.IO first tries WebSocket; if upgrade fails, falls back to polling.
    # The Upgrade + Connection headers enable HTTP → WebSocket upgrade.
    location /socket.io/ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers (REQUIRED for 101 Switching Protocols)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;

        # Longer timeouts for long-polling
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ── Static assets (CSS, JS, images) ───────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ── All other requests → Node.js app (Express handles routing) ───────────
    location / {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";

        # WebSocket upgrade headers (pass through for any WS-capable endpoint)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
