# =============================================================================
# BeerPOS Nginx Config — Production
# Handles both:
#   - biatuoitayninh.store  (public landing page)
#   - admin.biatuoitayninh.store  (POS admin panel)
# =============================================================================

# ── HTTP → HTTPS redirect (both domains) ─────────────────────────────────────
server {
    listen 80;
    server_name biatuoitayninh.store www.biatuoitayninh.store admin.biatuoitayninh.store;

    return 301 https://$host$request_uri;
}

# ── Admin subdomain (POS Admin Panel) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.biatuoitayninh.store;

    # ── SSL Certificate (Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/admin.biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.biatuoitayninh.store/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.biatuoitayninh.store/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Client Max Body Size (for large data sync) ──
    client_max_body_size 10m;

    # ── Proxy Timeouts ──
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;

    # ── Socket.IO WebSocket + Polling (MUST be before location /) ─────────────
    # This is the KEY fix for HTTP 426 Upgrade Required.
    # Socket.IO first tries WebSocket; if that fails, it falls back to polling.
    # The Upgrade + Connection headers enable the HTTP → WebSocket upgrade.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers (REQUIRED for 426 fix)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;

        # Longer timeouts for long-polling
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── All other requests → Node.js app ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers for any WebSocket-capable endpoint
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }

    # ── Health Check ──
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# ── Public domain (Landing Page) ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name biatuoitayninh.store www.biatuoitayninh.store;

    # ── SSL Certificate (Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/biatuoitayninh.store/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Root & Index ──
    root /var/www/beerpos;
    index index.html;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Client Max Body Size ──
    client_max_body_size 10m;

    # ── Socket.IO for public domain ───────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── Static Assets ──
    location / {
        root /var/www/beerpos/public;
        try_files $uri =404;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # realtime.js and socketSingleton.js must NOT be cached
            set $no_cache 0;
            if ($request_uri ~* "realtime\.js|socketSingleton\.js") {
                set $no_cache 1;
            }
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-SW-Cache "HIT" always;
        }

        location ~* (realtime\.js|socketSingleton\.js)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header X-SW-Cache "BYPASS";
        }
    }

    # ── Health Check ──
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
