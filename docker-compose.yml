# Beer POS Pro - Docker Compose
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beerpos-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - TZ=Asia/Ho_Chi_Minh
      - ADMIN_DOMAIN=localhost
      - PUBLIC_DOMAIN=localhost
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_me}
      - SESSION_DURATION_MS=${SESSION_DURATION_MS:-2592000000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - IS_CLOUD_SERVER=${IS_CLOUD_SERVER:-false}
      - CLOUD_MODE=${CLOUD_MODE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persist SQLite database
      - beerpos-data:/app/data
      # Persist logs
      - beerpos-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  beerpos-data:
    driver: local
  beerpos-logs:
    driver: local
