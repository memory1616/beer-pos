  <circle cx="390" cy="300" r="5" fill="#FFE082" opacity="0.3"/>
  <circle cx="430" cy="330" r="3" fill="#FFD54F" opacity="0.4"/>
  <circle cx="365" cy="340" r="4" fill="#FFE082" opacity="0.3"/>
  <!-- Text -->
  <text x="400" y="430" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#FFD700" text-anchor="middle" opacity="0.9"><z BIA TUOI TÂY NINH</text>
