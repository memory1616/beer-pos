<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Beer POS Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0E11; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(4px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(1);    opacity: 1; }
      40%             { transform: scale(0.6);   opacity: 0.4; }
    }
    @keyframes exitFade {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #0B0E11;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    #splash-logo {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      object-fit: contain;
      display: block;
    }

    #splash-name {
      margin-top: 18px;
      font-size: 21px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #splash-dots {
      display: flex;
      gap: 6px;
      margin-top: 28px;
      align-items: center;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #FCD535;
      animation: dotBounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    #splash.exiting {
      animation: exitFade 0.35s ease forwards;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="splash">
    <img id="splash-logo" src="/icons/icon-192.png" alt="BeerPOS" width="88" height="88" decoding="async">
    <div id="splash-name">BEER POS</div>
    <div id="splash-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    (function () {
      var el = document.getElementById('splash');

      function hide() {
        if (!el || el.classList.contains('exiting')) return;
        el.classList.add('exiting');
        setTimeout(function () { if (el) el.remove(); }, 400);
      }

      window.addEventListener('app:ready', hide);
      setTimeout(hide, 4000);
    })();
  </script>
</body>
</html>
