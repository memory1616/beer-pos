<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- NO-FLICKER: Apply theme BEFORE first paint to prevent flash -->
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chi tiết khách hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0B0E11">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/unified.css?v=20260412b-app-shell">
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260410-binance"></script>
  <script>requireAuth();</script>
  <style>
    canvas { width: 100% !important; height: auto !important; }

    /* ===== CUSTOMER INVOICE MODAL ===== */
    .customer-invoice-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: modal-fade-in 0.2s ease;
    }
    .customer-invoice-overlay.hidden {
      display: none;
    }
    @keyframes modal-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .customer-invoice-sheet {
      width: 90%;
      max-width: 400px;
      max-height: 85vh;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .customer-invoice-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: linear-gradient(135deg, var(--primary) 0%, #d97706 100%);
      flex-shrink: 0;
    }

    .customer-invoice-title {
      font-size: 18px;
      font-weight: 700;
      color: #000;
    }

    .customer-invoice-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.2);
      color: #000;
      font-size: 20px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .customer-invoice-close:hover {
      background: rgba(0,0,0,0.3);
    }

    .customer-invoice-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      overscroll-behavior: contain;
    }

    /* Mobile: bottom sheet */
    @media (max-width: 480px) {
      .customer-invoice-sheet {
        width: 100%;
        max-width: 100%;
        max-height: 90vh;
        border-radius: 16px 16px 0 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
      }
      .customer-invoice-overlay {
        align-items: flex-end;
      }
      .customer-invoice-body {
        padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      }
    }
  </style>
</head>
<body class="bg-main text-primary body--app">
  <div id="app"></div>

  <!-- Invoice Modal for Customer Detail -->
  <div id="customerInvoiceModal" class="customer-invoice-overlay hidden">
    <div class="customer-invoice-sheet">
      <div class="customer-invoice-header">
        <div class="customer-invoice-title">Hóa đơn</div>
        <button id="btnCloseInvoice" class="customer-invoice-close">×</button>
      </div>
      <div class="customer-invoice-body">
        <div id="invoiceContent"></div>
        <button id="btnCloseInvoice2" class="btn btn-primary w-full mt-4">Đóng</button>
      </div>
    </div>
  </div>

  <!-- ═══ PAYMENT MODAL ═══ -->
  <div id="paymentModal" class="customer-invoice-overlay hidden">
    <div class="customer-invoice-sheet">
      <div class="customer-invoice-header">
        <div class="customer-invoice-title">💰 Thu tiền</div>
        <button onclick="closePaymentModal()" class="customer-invoice-close">×</button>
      </div>
      <div class="customer-invoice-body">
        <div id="paymentModalInfo" class="mb-4 p-3 rounded-lg" style="background:var(--bg-soft);border:1px solid var(--border);"></div>
        <div class="mb-4">
          <div class="flex gap-2 mb-3">
            <button onclick="setPaymentFull()" id="btnPayFull" class="btn btn-primary flex-1" style="height:44px;background:var(--success);">Thu đủ</button>
            <button onclick="setPaymentPartial()" id="btnPayPartial" class="btn btn-ghost flex-1" style="height:44px;border:1px solid var(--border);">Nhập số</button>
          </div>
          <div id="paymentAmountInput" class="hidden mb-3">
            <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">💵 Số tiền khách trả</label>
            <input type="text" id="paymentAmount" value="0" inputmode="numeric"
              oninput="_onPaymentAmountInput(this)"
              style="width:100%;height:44px;padding:0 12px;border-radius:8px;border:2px solid var(--success);background:var(--card);color:var(--text-primary);font-size:16px;font-weight:700;text-align:center;outline:none;box-sizing:border-box;">
          </div>
          <div class="mb-3">
            <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">📝 Ghi chú (tùy chọn)</label>
            <input type="text" id="paymentNote" placeholder="VD: Khách thanh toán chuyển khoản"
              style="width:100%;height:44px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-primary);font-size:16px;outline:none;box-sizing:border-box;">
          </div>
        </div>
        <div id="paymentWarning" class="hidden mb-3 p-2 text-center rounded-lg" style="border:1px solid var(--danger);color:var(--danger);background:var(--red-dim);"></div>
        <div style="display:flex;gap:8px;">
          <button onclick="closePaymentModal()" class="btn btn-ghost flex-1" style="height:44px;border:1px solid var(--border);">Huỷ</button>
          <button onclick="submitCustomerPayment()" class="btn btn-primary flex-1" style="height:44px;background:var(--success);">💰 Xác nhận thu</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Get customer ID from URL
    const customerId = window.location.pathname.split('/').pop();
    let customerData = null;
    let selectedYear = new Date().getFullYear();
    let selectedMonth = new Date().getMonth() + 1;

    // Format VND
    function formatVND(amount) {
      if (amount === null || amount === undefined || amount === '') return '0 đ';
      const num = Number(amount);
      if (isNaN(num)) return '0 đ';
      return new Intl.NumberFormat('vi-VN').format(num) + ' đ';
    }

    // Format date
    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const date = new Date(dateStr);
      return date.toLocaleDateString('vi-VN');
    }

    // Tab switching
    function switchTab(tabName) {
      // Update tab buttons
      ['history', 'kegs', 'debt'].forEach(tab => {
        const btn = document.getElementById('tab-' + tab);
        const content = document.getElementById('tab-content-' + tab);
        if (tab === tabName) {
          btn.classList.remove('text-muted', 'border-transparent');
          btn.classList.add('text-primary', 'border-primary');
          content.classList.remove('hidden');
        } else {
          btn.classList.remove('text-primary', 'border-primary');
          btn.classList.add('text-muted', 'border-transparent');
          content.classList.add('hidden');
        }
      });
      
      // Load content if needed
      if (tabName === 'kegs') loadKegsHistory();
      if (tabName === 'debt') loadDebtHistory();
    }

    // Load kegs history
    async function loadKegsHistory() {
      const container = document.getElementById('kegsContent');
      container.innerHTML = '<div class="text-center py-8 text-muted">Đang tải...</div>';
      
      try {
        const res = await fetch(`/api/customers/${customerId}/keg-history`);
        const data = await res.json();
        
        if (!data.history || data.history.length === 0) {
          container.innerHTML = '<div class="text-center py-8 text-muted">Chưa có lịch sử vỏ bình</div>';
          return;
        }
        
        let html = `
          <div class="card stat-card--blue mb-4">
            <div class="sc-label"><span class="sc-icon">📦</span> Tổng vỏ bình</div>
            <div class="sc-value">${data.currentBalance || 0}</div>
            <div class="sc-sub">bình</div>
          </div>
        `;

        data.history.forEach(item => {
          const change = (item.deliver_kegs || 0) - (item.return_kegs || 0);
          const changeClass = change >= 0 ? 'text-warning' : 'text-danger';
          const changeText = change >= 0 ? `+${change}` : change;

          html += `
            <div class="card card--list-item mb-2">
              <div class="flex justify-between items-center">
                <div class="font-bold text-main">📅 ${formatDate(item.date)}</div>
                <div class="font-bold ${changeClass}">${changeText}</div>
              </div>
              <div class="mt-2 text-sm flex justify-between">
                <span class="text-warning">+${item.deliver_kegs || 0} giao</span>
                <span class="text-danger">-${item.return_kegs || 0} thu</span>
              </div>
              <div class="text-sm text-secondary mt-1">
                Còn lại: ${item.keg_balance_after || 0}
              </div>
            </div>
          `;
        });
        
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<div class="text-center py-8 text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    // ─── Payment Modal ───
    let _customerPaymentDebt = 0;

    function openCustomerPaymentModal(debtAmount) {
      _customerPaymentDebt = debtAmount || 0;
      _paymentCustomerId = customerId; // For _validatePaymentAmount
      _paymentCustomerDebt = _customerPaymentDebt;
      var infoEl = document.getElementById('paymentModalInfo');
      if (infoEl) {
        infoEl.innerHTML = `
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="color:var(--text-muted);font-size:13px;">Khách hàng:</span>
            <span style="font-weight:700;color:var(--text-primary);">${customerData ? customerData.name : ''}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);">
            <span style="color:var(--text-primary);font-size:14px;font-weight:600;">Tổng công nợ:</span>
            <span style="font-weight:800;color:var(--danger);font-size:18px;">${formatVND(_customerPaymentDebt)}</span>
          </div>
        `;
      }
      document.getElementById('paymentAmountInput').classList.add('hidden');
      document.getElementById('btnPayFull').style.background = 'var(--success)';
      document.getElementById('btnPayPartial').style.background = 'transparent';
      document.getElementById('btnPayPartial').style.border = '1px solid var(--border)';
      document.getElementById('btnPayPartial').style.color = 'var(--text-muted)';
      _setPaymentAmount(_customerPaymentDebt);
      document.getElementById('paymentNote').value = '';
      var modal = document.getElementById('paymentModal');
      if (modal) modal.classList.remove('hidden');
    }

    function setPaymentFull() {
      _setPaymentAmount(_customerPaymentDebt);
      document.getElementById('paymentAmountInput').classList.add('hidden');
      document.getElementById('btnPayFull').style.background = 'var(--success)';
      document.getElementById('btnPayPartial').style.background = 'transparent';
      document.getElementById('btnPayPartial').style.border = '1px solid var(--border)';
      document.getElementById('btnPayPartial').style.color = 'var(--text-muted)';
      var w = document.getElementById('paymentWarning');
      if (w) w.classList.add('hidden');
    }

    function setPaymentPartial() {
      document.getElementById('paymentAmountInput').classList.remove('hidden');
      var input = document.getElementById('paymentAmount');
      if (input) { input.focus(); input.select(); }
      document.getElementById('btnPayPartial').style.background = 'var(--success)';
      document.getElementById('btnPayPartial').style.color = '#fff';
      document.getElementById('btnPayFull').style.background = 'transparent';
      document.getElementById('btnPayFull').style.border = '1px solid var(--border)';
      document.getElementById('btnPayFull').style.color = 'var(--text-muted)';
    }

    function closePaymentModal() {
      var modal = document.getElementById('paymentModal');
      if (modal) modal.classList.add('hidden');
      _customerPaymentDebt = 0;
    }

    async function submitCustomerPayment() {
      var amount = _getPaymentAmount();
      var note = document.getElementById('paymentNote')?.value || '';
      var btn = document.querySelector('[onclick="submitCustomerPayment()"]');
      var w = document.getElementById('paymentWarning');
      if (amount <= 0) {
        if (w) { w.textContent = 'Số tiền phải lớn hơn 0'; w.style.color = 'var(--danger)'; w.classList.remove('hidden'); }
        return;
      }
      if (btn) { btn.disabled = true; btn.innerText = 'Đang xử lý...'; }
      try {
        var res = await fetch('/api/debts/payment', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Request-Id': Date.now() + '-' + Math.random().toString(36).substr(2, 9)
          },
          body: JSON.stringify({ customerId: customerId, amount: amount, note: note || 'Thu tiền từ trang khách hàng' })
        });
        var data = await res.json();
        if (data.success) {
          closePaymentModal();
          await loadDebtHistory();
          await loadCustomerStats();
          if (typeof showToast === 'function') showToast('Đã thu ' + formatVND(amount), 'success');
        } else {
          if (w) { w.textContent = data.error || 'Lỗi'; w.classList.remove('hidden'); }
          if (typeof showToast === 'function') showToast(data.error || 'Lỗi', 'error');
        }
      } catch (err) {
        if (w) { w.textContent = 'Lỗi kết nối'; w.classList.remove('hidden'); }
        if (typeof showToast === 'function') showToast('Lỗi kết nối', 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.innerText = '💰 Xác nhận thu'; }
      }
    }

    // Load debt history
    async function loadDebtHistory() {
      const container = document.getElementById('debtContent');
      container.innerHTML = '<div class="text-center py-8 text-muted">Đang tải...</div>';

      try {
        // Dùng API mới lấy đầy đủ thông tin
        const res = await fetch(`/api/debts/${customerId}`);
        const resp = await res.json();
        const data = resp.data;

        if (!data || !data.customer) {
          container.innerHTML = '<div class="text-center py-8 text-muted">Không có dữ liệu</div>';
          return;
        }

        const customer = data.customer;
        const orderDebts = data.orderDebts || [];
        const history = data.history || [];
        const currentDebt = customer.debt || 0;

        // ── Màu sắc theo mức nợ ──────────────────────────
        let debtColorClass = 'stat-card--success';
        let debtLabel = 'Không có công nợ';
        let debtIcon = '✅';

        if (currentDebt > 0) {
          const unpaidOrders = orderDebts.filter(od => od.status !== 'paid').length;
          if (currentDebt >= 5000000) {
            debtColorClass = 'stat-card--danger';
            debtLabel = `Nợ cao - ${unpaidOrders} đơn chưa trả`;
            debtIcon = '🔴';
          } else if (currentDebt >= 1000000) {
            debtColorClass = 'stat-card--amber';
            debtLabel = `${unpaidOrders} đơn chưa trả`;
            debtIcon = '🟡';
          } else {
            debtColorClass = 'stat-card--warning';
            debtLabel = `${unpaidOrders} đơn chưa trả`;
            debtIcon = '🟠';
          }
        }

        // ── Header card ───────────────────────────────────
        let html = `
          <div class="card ${debtColorClass} mb-4">
            <div class="sc-label"><span class="sc-icon">${debtIcon}</span> Công nợ hiện tại</div>
            <div class="sc-value">${formatVND(currentDebt)}</div>
            <div class="text-xs opacity-75 mt-1">${debtLabel}</div>
        `;

        if (currentDebt > 0) {
          // Nút thu nhanh
          const quickAmounts = [100000, 200000, 500000];
          html += `
            <div class="flex gap-2 mt-3 flex-wrap">
              ${quickAmounts.map(amt => `
                <button onclick="quickPayCustomer(${amt})" class="btn btn-sm flex-1" style="min-width:60px;font-size:12px;padding:6px 4px;">
                  +${formatVND(amt)}
                </button>
              `).join('')}
              <button onclick="quickPayCustomer(${currentDebt})" class="btn btn-sm flex-1" style="min-width:60px;font-size:12px;padding:6px 4px;background:var(--success);">
                Trả hết
              </button>
            </div>
            <div class="mt-2">
              <button onclick="openCustomerPaymentModal(${currentDebt})" class="btn btn-primary w-full" style="background:var(--success);height:40px;font-size:14px;">💰 Thu tiền tùy chọn</button>
            </div>
          `;
        }
        html += '</div>';

        // ── Danh sách đơn nợ ─────────────────────────────
        const unpaidOrders = orderDebts.filter(od => od.status !== 'paid');
        if (unpaidOrders.length > 0) {
          html += `
            <div class="text-sm font-semibold text-main mb-2 px-1">📋 Đơn hàng chưa thanh toán (${unpaidOrders.length})</div>
            <div class="space-y-2 mb-4">
          `;
          for (const od of unpaidOrders) {
            const pct = od.original_amount > 0 ? Math.round((od.paid_amount / od.original_amount) * 100) : 0;
            const statusColor = od.status === 'partial' ? 'border-l-yellow-500' : 'border-l-red-500';
            html += `
              <div class="card card--list-item ${statusColor} border-l-4">
                <div class="flex justify-between items-center mb-1">
                  <span class="text-sm font-medium">#${od.sale_id}</span>
                  <span class="text-xs text-muted">${formatDate(od.created_at)}</span>
                </div>
                <div class="flex justify-between items-center mb-1">
                  <span class="text-sm">Còn nợ:</span>
                  <span class="font-bold text-danger">${formatVND(od.remaining_amount)}</span>
                </div>
                <div class="w-full bg-bg rounded-full h-1.5">
                  <div class="h-1.5 rounded-full ${od.status === 'partial' ? 'bg-yellow-500' : 'bg-red-500'}" style="width:${pct}%"></div>
                </div>
                <div class="text-xs text-muted mt-1">Đã trả ${formatVND(od.paid_amount)} / ${formatVND(od.original_amount)} (${pct}%)</div>
              </div>
            `;
          }
          html += '</div>';
        }

        // ── Timeline lịch sử giao dịch ───────────────────
        if (history.length > 0) {
          html += `
            <div class="text-sm font-semibold text-main mb-2 px-1">📜 Lịch sử giao dịch</div>
            <div class="relative pl-5">
              <div class="absolute left-[7px] top-0 bottom-0 w-0.5 bg-border"></div>
          `;
          for (const tx of history.slice(0, 30)) {
            const isIncrease = tx.type === 'increase';
            const isCancel = tx.type === 'cancel';
            const isAdjust = tx.type === 'adjust';

            let dotColor = 'bg-yellow-500';
            let label = '';
            let amountText = '';
            let amountClass = 'text-danger';
            let dot = '●';

            if (isIncrease) {
              dotColor = 'bg-red-500';
              amountClass = 'text-danger';
              amountText = `+${formatVND(tx.amount)}`;
              label = tx.note || 'Ghi nợ';
            } else if (isCancel) {
              dotColor = 'bg-blue-500';
              amountClass = 'text-blue-500';
              amountText = formatVND(tx.amount);
              label = tx.note || 'Hoàn nợ';
            } else if (isAdjust) {
              dotColor = 'bg-purple-500';
              amountClass = tx.amount < 0 ? 'text-danger' : 'text-success';
              amountText = tx.amount > 0 ? `+${formatVND(tx.amount)}` : formatVND(tx.amount);
              label = tx.note || 'Điều chỉnh';
            } else {
              dotColor = 'bg-green-500';
              amountClass = 'text-success';
              amountText = formatVND(tx.amount);
              label = tx.note || 'Thanh toán';
            }

            html += `
              <div class="relative mb-3">
                <div class="absolute -left-[13px] top-1 w-3 h-3 rounded-full ${dotColor} border-2 border-card"></div>
                <div class="card card--list-item">
                  <div class="flex justify-between items-center">
                    <span class="text-xs text-muted">${formatDate(tx.created_at)}</span>
                    <span class="font-bold ${amountClass}">${amountText}</span>
                  </div>
                  <div class="text-xs text-secondary mt-0.5">${label}</div>
                  <div class="text-xs text-muted mt-0.5">Số dư: ${formatVND(tx.balance_after)}</div>
                </div>
              </div>
            `;
          }
          html += '</div>';
        }

        container.innerHTML = html;
      } catch (err) {
        console.error('loadDebtHistory error:', err);
        container.innerHTML = '<div class="text-center py-8 text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    // Thu nhanh
    window.quickPayCustomer = async function(amount) {
      if (amount <= 0) return;
      const note = prompt('Ghi chú (tùy chọn):', '');
      try {
        const res = await fetch('/api/debts/payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Request-Id': Date.now() + '-' + Math.random() },
          body: JSON.stringify({ customerId, amount, note: note || `Thu nhanh ${formatVND(amount)}` })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Đã thu ' + formatVND(amount), 'success');
          loadDebtHistory();
          loadCustomerDetail();
        } else {
          showToast(data.error || 'Lỗi', 'error');
        }
      } catch (e) {
        showToast('Lỗi kết nối', 'error');
      }
    };

    // Load customer data
    async function loadCustomerDetail() {
      // Render using layout.js functions
      const headerActions = `
        <button onclick="editCustomerInfo()" class="btn btn-ghost text-sm" title="Sửa">✏️</button>
      `;
      
      document.getElementById('app').innerHTML = 
        getHeaderWithActions('Chi tiết khách', '👤', headerActions) +
        getContent(`
          <!-- Stats Cards -->
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="card stat-card--blue">
              <div class="sc-label"><span class="sc-icon">📦</span> Vỏ đang giữ</div>
              <div class="sc-value" id="kegBalance">0</div>
            </div>
            <div class="card stat-card--green">
              <div class="sc-label"><span class="sc-icon">💰</span> Tổng doanh thu</div>
              <div class="sc-value text-xl" id="totalRevenue">0</div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="card stat-card--amber">
              <div class="sc-label"><span class="sc-icon">🍺</span> Tháng này</div>
              <div class="sc-value text-base" id="monthlyKegs">0</div>
              <div class="sc-sub">bình</div>
            </div>
            <div class="card stat-card--info">
              <div class="sc-label"><span class="sc-icon">🚚</span> Gần nhất</div>
              <div class="sc-value text-sm" id="lastSale">--</div>
            </div>
          </div>

          <!-- Month Filter -->
          <div class="card p-4 mb-3">
            <label class="block text-sm font-medium text-main mb-2">📅 Lọc theo tháng</label>
            <select id="monthFilter" onchange="onMonthChange()" class="bn-select w-full">
              ${getMonthOptions()}
            </select>
          </div>

          <!-- Fridge Info -->
          <div class="card p-4 mb-3 border-secondary">
            <div class="flex items-center justify-between mb-2">
              <div class="font-semibold text-secondary">❄️ Tủ lạnh</div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-bg rounded-lg p-3 text-center">
                <div class="text-2xl font-bold text-secondary" id="horizontalFridgeCount">0</div>
                <div class="text-xs text-secondary">Tủ nằm</div>
              </div>
              <div class="bg-bg rounded-lg p-3 text-center">
                <div class="text-2xl font-bold text-secondary" id="verticalFridgeCount">0</div>
                <div class="text-xs text-secondary">Tủ đứng</div>
              </div>
            </div>
          </div>

          <!-- Tab Buttons -->
          <div class="flex border-b border-muted mb-3">
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 px-4 text-center font-medium text-primary border-b-2 border-primary">
              📋 Lịch sử
            </button>
            <button onclick="switchTab('kegs')" id="tab-kegs" class="flex-1 py-2 px-4 text-center font-medium text-muted border-b-2 border-transparent">
              🍺 Vỏ bình
            </button>
            <button onclick="switchTab('debt')" id="tab-debt" class="flex-1 py-2 px-4 text-center font-medium text-muted border-b-2 border-transparent">
              💰 Công nợ
            </button>
          </div>

          <!-- Sales History Tab -->
          <div id="tab-content-history">
            <div id="salesHistory" class="space-y-3">
              <div class="text-center py-8 text-muted">Đang tải...</div>
            </div>
          </div>

          <!-- Kegs Tab -->
          <div id="tab-content-kegs" class="hidden">
            <div id="kegsContent" class="space-y-3">
              <div class="text-center py-8 text-muted">Đang tải...</div>
            </div>
          </div>

          <!-- Debt Tab -->
          <div id="tab-content-debt" class="hidden">
            <div id="debtContent" class="space-y-3">
              <div class="text-center py-8 text-muted">Đang tải...</div>
            </div>
          </div>
        `) +
        getBottomNav('/customers');

      // Load customer info
      await loadCustomerInfo();
      
      // Load stats
      await loadCustomerStats();
      
      // Load sales history
      await loadSalesHistory();
    }

    // Get month options for select
    function getMonthOptions() {
      const now = new Date();
      let options = '<option value="">Tất cả</option>';
      
      for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const value = `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
        const label = `${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
        options += `<option value="${value}" ${value === `${selectedYear}-${selectedMonth.toString().padStart(2, '0')}` ? 'selected' : ''}>${label}</option>`;
      }
      return options;
    }

    // Load customer basic info
    async function loadCustomerInfo() {
      try {
        const res = await fetch(`/api/customers/${customerId}`);
        const data = await res.json();
        
        if (data) {
          customerData = data;
          // Update page title and header via document title
          document.title = data.name + ' - Beer POS';
          // Store customer name for display
          window.__customerName = data.name;
          window.__customerPhone = data.phone || 'Chưa có SĐT';

          // Display fridge info
          document.getElementById('horizontalFridgeCount').textContent = data.horizontal_fridge || 0;
          document.getElementById('verticalFridgeCount').textContent = data.vertical_fridge || 0;
        }
      } catch (err) {
        console.error('Error loading customer:', err);
      }
    }

    // Load customer stats
    async function loadCustomerStats() {
      try {
        const res = await fetch(`/api/customers/${customerId}/stats?year=${selectedYear}&month=${selectedMonth}`);
        const data = await res.json();
        
        document.getElementById('kegBalance').textContent = data.kegBalance || 0;
        document.getElementById('totalRevenue').textContent = formatVND(data.totalRevenue || 0);
        document.getElementById('monthlyKegs').textContent = data.monthlyKegs || 0;
        
        if (data.lastSaleDaysAgo !== null) {
          let daysText = '';
          if (data.lastSaleDaysAgo === 0) daysText = 'Hôm nay';
          else if (data.lastSaleDaysAgo === 1) daysText = 'Hôm qua';
          else daysText = `${data.lastSaleDaysAgo} ngày trước`;
          document.getElementById('lastSale').textContent = daysText;
        } else {
          document.getElementById('lastSale').textContent = 'Chưa có';
        }
      } catch (err) {
        console.error('Error loading stats:', err);
      }
    }

    // Load sales history
    async function loadSalesHistory() {
      const container = document.getElementById('salesHistory');
      container.innerHTML = '<div class="text-center py-8 text-muted">Đang tải...</div>';
      
      try {
        const filter = document.getElementById('monthFilter').value;
        let url = `/api/customers/${customerId}/sales`;
        if (filter) {
          const [year, month] = filter.split('-');
          url += `?year=${year}&month=${month}`;
        }
        
        const res = await fetch(url);
        const data = await res.json();
        
        // Show monthly totals if filtering by month
        let monthlySummaryHtml = '';
        if (filter && (data.monthlyTotal > 0 || data.monthlyQty > 0) && data.sales.length > 0) {
          monthlySummaryHtml = `
            <div class="card stat-card--blue mb-4">
              <div class="sc-label"><span class="sc-icon">📊</span> Tổng tháng ${filter}</div>
              <div class="sc-value">${formatVND(data.monthlyTotal)}</div>
              <div class="sc-sub">${data.monthlyQty} bình</div>
            </div>
          `;
        }
        
        if (data.sales.length === 0) {
          container.innerHTML = '<div class="text-center py-8 text-muted">Chưa có lịch sử giao hàng</div>';
          return;
        }
        
        let html = monthlySummaryHtml;
        data.sales.forEach((sale, index) => {
          const kegChange = (sale.deliver_kegs || 0) - (sale.return_kegs || 0);
          const isLast = index === data.sales.length - 1;
          const isReplacement = sale.type === 'replacement';
          
          // Style for replacement orders
          const dateClass = isReplacement ? 'text-warning' : 'text-primary';
          const totalClass = isReplacement ? 'text-warning' : 'text-primary';
          const dotClass = isReplacement ? 'bg-warning' : 'bg-primary';
          const cardClass = isReplacement ? 'bg-warning/5' : '';

          html += `
            <div class="flex gap-3">
              <!-- Timeline line -->
              <div class="flex flex-col items-center">
                <div class="w-3 h-3 ${dotClass} rounded-full"></div>
                ${!isLast ? '<div class="w-0.5 bg-muted flex-1 min-h-[60px]"></div>' : ''}
              </div>

              <!-- Timeline content -->
              <div class="flex-1 pb-4">
                <div class="card card--list-item ${cardClass}">
                  <div class="flex justify-between items-center mb-2">
                    <div class="text-sm font-semibold ${dateClass}">📅 ${formatDate(sale.date)}${isReplacement ? ' 🔁' : ''}</div>
                    <div class="money ${totalClass}"><span class="value text-sm font-bold tabular-nums">${isReplacement ? '0' : formatVND(sale.total)}</span><span class="unit">đ</span></div>
                  </div>
                  <div class="grid grid-cols-2 gap-2 text-sm">
                    <div class="bg-primary/5 rounded-lg p-2">
                      <div class="text-primary">🍺 Bia</div>
                      <div class="font-bold text-main">${sale.item_count || 0}</div>
                    </div>
                    <div class="bg-secondary/10 rounded-lg p-2">
                      <div class="text-secondary">📦 Vỏ còn</div>
                      <div class="font-bold text-main">${sale.keg_balance_after || 0}</div>
                    </div>
                  </div>
                  <div class="mt-2 pt-2 border-t border-muted flex justify-between text-sm">
                    <span class="text-warning">+${sale.deliver_kegs || 0} giao</span>
                    <span class="text-danger">-${sale.return_kegs || 0} thu</span>
                  </div>
                  <button onclick="viewInvoice(${sale.id})" class="btn btn-secondary btn-sm w-full mt-3">
                    👁 Xem hóa đơn
                  </button>
                </div>
              </div>
            </div>
          `;
        });
        
        container.innerHTML = html;
      } catch (err) {
        console.error('Error loading sales:', err);
        container.innerHTML = '<div class="text-center py-8 text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    // Month filter change
    function onMonthChange() {
      const filter = document.getElementById('monthFilter').value;
      if (filter) {
        const [year, month] = filter.split('-');
        selectedYear = parseInt(year);
        selectedMonth = parseInt(month);
      } else {
        selectedYear = new Date().getFullYear();
        selectedMonth = new Date().getMonth() + 1;
      }
      loadCustomerStats();
      loadSalesHistory();
    }

    // Edit customer info
    function editCustomerInfo() {
      if (!customerData) return;
      window.location.href = '/customers?edit=' + customerData.id;
    }

    // Invoice Modal
    let invoiceModal = null;

    async function viewInvoice(saleId) {
      try {
        const res = await fetch('/api/sales/' + saleId);
        const data = await res.json();
        if (!res.ok || (data && data.error && data.id == null)) {
          throw new Error(data.error || 'Not found');
        }
        console.log('[viewInvoice] sale data:', data);
        console.log('[viewInvoice] items:', data.items || data.products);
        console.log('[viewInvoice] customer_name:', data.customer_name);
        showInvoiceModal(data);
      } catch (err) {
        console.error(err);
        alert('Không thể tải hóa đơn');
      }
    }

    function showInvoiceModal(sale) {
      const modal = document.getElementById('customerInvoiceModal');
      if (!modal) return;
      if (!sale || !sale.id) {
        console.error('[showInvoiceModal] Invalid sale data:', sale);
        return;
      }

      const items = (sale.items || sale.products) || [];
      console.log('[showInvoiceModal] sale:', sale);
      console.log('[showInvoiceModal] items count:', items.length, items);
      console.log('[showInvoiceModal] customer_name:', sale.customer_name);

      const customerName = sale.customer_name || sale.customerName || sale.customer?.name || 'Khách lẻ';
      const saleDate = sale.date || sale.created_at || '';
      const totalAmount = sale.totalAmount != null ? sale.totalAmount : (sale.total || 0);
      const formattedDate = saleDate ? formatDate(saleDate) : '—';

      const itemsHtml = items.length > 0 ? items.map(item => {
        const name = item.name || item.product_name || item.productName || 'SP';
        const qty = Number(item.quantity != null ? item.quantity : item.qty) || 0;
        const price = Number(item.price) || 0;
        return `
        <div class="flex justify-between py-2 border-b">
          <div>
            <div class="font-medium">${name}</div>
            <div class="text-sm text-secondary">${qty} x ${formatVND(price)}</div>
          </div>
          <div class="font-bold">${formatVND(qty * price)}</div>
        </div>
      `;
      }).join('') : '<div class="text-center py-6 text-secondary text-sm">Không có dòng sản phẩm trên hóa đơn.</div>';

      document.getElementById('invoiceContent').innerHTML = `
        <div class="text-center mb-4">
          <div class="text-lg font-bold text-main">HÓA ĐƠN #${sale.id}</div>
          <div class="text-sm text-secondary">${formattedDate}</div>
        </div>
        <div class="card p-3 mb-4">
          <div class="font-medium text-main">${customerName}</div>
        </div>
        <div class="mb-4">
          ${itemsHtml}
        </div>
        <div class="flex justify-between py-2 border-b border-muted">
          <span class="text-main">Tổng cộng:</span>
          <div class="money text-money"><span class="value text-2xl font-bold tabular-nums">${formatVND(totalAmount)}</span><span class="unit">đ</span></div>
        </div>
        ${sale.type === 'replacement' ? '<div class="text-center py-2 text-warning font-bold">🔁 Đổi bia lỗi</div>' : ''}
        ${((sale.bottleGiven != null ? sale.bottleGiven : sale.deliver_kegs) || (sale.bottleReceived != null ? sale.bottleReceived : sale.return_kegs)) ? `
        <div class="card p-3 mt-4">
          <div class="text-sm text-secondary font-medium mb-1">📦 Vỏ bình</div>
          <div class="flex justify-between text-sm">
            <span class="text-warning">Giao: +${sale.bottleGiven != null ? sale.bottleGiven : (sale.deliver_kegs || 0)}</span>
            <span class="text-danger">Thu: -${sale.bottleReceived != null ? sale.bottleReceived : (sale.return_kegs || 0)}</span>
          </div>
        </div>
        ` : ''}
      `;

      modal.classList.remove('hidden');
    }

    function closeInvoiceModal() {
      const modal = document.getElementById('customerInvoiceModal');
      if (modal) {
        modal.classList.add('hidden');
      }
    }

    // Bind close buttons
    document.getElementById('btnCloseInvoice').addEventListener('click', closeInvoiceModal);
    document.getElementById('btnCloseInvoice2').addEventListener('click', closeInvoiceModal);

    // Initialize
    loadCustomerDetail();
  </script>
