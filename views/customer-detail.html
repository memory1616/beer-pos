  <!-- NO-FLICKER: Apply theme BEFORE first paint to prevent flash -->
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>

  <style>
    /* ============================================================
       BINANCE MOBILE + CRM — CUSTOMER DETAIL REFACTORED
       All business logic preserved. UI redesigned.
    ============================================================ */

    /* ── OVERRIDE PAGE PADDING ── */
    #app {
      padding-top: calc(var(--header-height) + var(--safe-area-top));
      padding-bottom: calc(var(--bottomnav-height) + var(--safe-area-bottom));
    }
    .page-content {
      padding-top: 0 !important;
      padding-left: max(12px, env(safe-area-inset-left, 0px));
      padding-right: max(12px, env(safe-area-inset-right, 0px));
    }

    /* ============================================================
       1. HERO CUSTOMER CARD
    ============================================================ */
    .cd-hero {
      background: linear-gradient(135deg, #1e2329 0%, #161a1e 100%);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    [data-theme="light"] .cd-hero {
      background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
      border-color: #e0e0e0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .cd-hero::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(252,213,53,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .cd-hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cd-hero-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FCD535 0%, #F0B90B 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(252,213,53,0.3);
    }
    .cd-hero-info {
      flex: 1;
      min-width: 0;
      padding-left: 14px;
    }
    .cd-hero-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cd-hero-phone {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 3px;
    }
    .cd-hero-phone::before {
      content: '📱';
      font-size: 11px;
    }
    .cd-hero-sales {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cd-hero-sales::before {
      content: '👔';
      font-size: 11px;
    }
    .cd-hero-sales span {
      color: #3b82f6;
      font-weight: 600;
    }
    .cd-hero-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .cd-hero-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .cd-hero-btn:active {
      transform: scale(0.92);
    }
    .cd-hero-btn-call {
      background: var(--success-dim);
      color: var(--success);
    }
    .cd-hero-btn-zalo {
      background: #e0f2fe;
      color: #0068ff;
    }
    [data-theme="dark"] .cd-hero-btn-zalo {
      background: rgba(0,104,255,0.15);
    }
    .cd-hero-btn-edit {
      background: var(--bg-hover);
      color: var(--text-secondary);
    }
    .cd-hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .cd-hero-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }
    .cd-hero-badge-vip {
      background: linear-gradient(135deg, #FCD535, #F0B90B);
      color: #1E2329;
    }
    .cd-hero-badge-new {
      background: var(--info-dim);
      color: var(--info);
      border: 1px solid rgba(59,122,254,0.3);
    }
    .cd-hero-badge-debt {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(246,70,93,0.3);
    }
    .cd-hero-badge-sleep {
      background: var(--bg-hover);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .cd-hero-meta {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cd-hero-meta-item {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ============================================================
       2. QUICK ACTION BAR
    ============================================================ */
    .cd-quick-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .cd-quick-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 60px;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    [data-theme="light"] .cd-quick-btn {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .cd-quick-btn:active {
      transform: scale(0.96);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .cd-quick-btn-icon {
      font-size: 20px;
      line-height: 1;
    }
    .cd-quick-btn-money { background: var(--success-dim); border-color: rgba(14,203,129,0.2); }
    .cd-quick-btn-order { background: var(--accent-dim); border-color: rgba(252,213,53,0.2); }
    .cd-quick-btn-keg { background: var(--info-dim); border-color: rgba(59,122,254,0.2); }
    .cd-quick-btn-history { background: var(--warning-dim); border-color: rgba(240,185,11,0.2); }

    /* ============================================================
       3. KPI DASHBOARD
    ============================================================ */
    .cd-kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .cd-kpi-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    [data-theme="light"] .cd-kpi-card {
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .cd-kpi-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .cd-kpi-icon-debt { background: var(--danger-dim); }
    .cd-kpi-icon-keg { background: var(--info-dim); }
    .cd-kpi-icon-monthly { background: var(--accent-dim); }
    .cd-kpi-icon-revenue { background: var(--success-dim); }
    .cd-kpi-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 2px;
      letter-spacing: -0.5px;
    }
    .cd-kpi-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cd-kpi-value.danger { color: var(--danger); }
    .cd-kpi-value.warning { color: var(--warning); }
    .cd-kpi-value.success { color: var(--success); }
    .cd-kpi-value.accent { color: var(--primary); }
    .cd-kpi-pulse {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: cd-pulse 2s infinite;
    }
    .cd-kpi-pulse.danger { background: var(--danger); }
    .cd-kpi-pulse.warning { background: var(--warning); }
    .cd-kpi-pulse.success { background: var(--success); }
    @keyframes cd-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.5); }
    }
    /* Number counter animation */
    .cd-kpi-value { transition: color 0.3s ease; }

    /* ============================================================
       4. CUSTOMER HEALTH CARD
    ============================================================ */
    .cd-health {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .cd-health-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cd-health-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .cd-health-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--bg-hover);
    }
    .cd-health-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cd-health-dot.good { background: var(--success); box-shadow: 0 0 8px rgba(14,203,129,0.5); }
    .cd-health-dot.monitor { background: var(--warning); box-shadow: 0 0 8px rgba(240,185,11,0.5); }
    .cd-health-dot.urgent { background: var(--danger); box-shadow: 0 0 8px rgba(246,70,93,0.5); animation: cd-pulse 1.5s infinite; }
    .cd-health-label {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.2;
    }
    .cd-health-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 1px;
    }
    .cd-health-status-bar {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .cd-health-status-bar.good { background: var(--success-dim); color: var(--success); }
    .cd-health-status-bar.monitor { background: var(--warning-dim); color: var(--warning); }
    .cd-health-status-bar.urgent { background: var(--danger-dim); color: var(--danger); }

    /* ============================================================
       5. PROMOTION SECTION — COMPACT
    ============================================================ */
    .cd-promo-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .cd-promo-header {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cd-promo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .cd-promo-item:last-child { border-bottom: none; padding-bottom: 0; }
    .cd-promo-item:first-of-type { padding-top: 0; }
    .cd-promo-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cd-promo-icon {
      font-size: 16px;
    }
    .cd-promo-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .cd-promo-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .cd-promo-status {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-align: center;
      min-width: 70px;
    }
    .cd-promo-status.on { background: var(--success-dim); color: var(--success); }
    .cd-promo-status.off { background: var(--danger-dim); color: var(--danger); }
    .cd-promo-status.expired { background: var(--bg-hover); color: var(--text-muted); }

    /* Toggle Switch */
    .cd-toggle {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }
    .cd-toggle input { opacity: 0; width: 0; height: 0; }
    .cd-toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--border-strong);
      border-radius: 13px;
      transition: all 0.25s ease;
    }
    .cd-toggle-slider::before {
      content: '';
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: all 0.25s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .cd-toggle input:checked + .cd-toggle-slider { background: var(--success); }
    .cd-toggle input:checked + .cd-toggle-slider::before { transform: translateX(18px); }
    .cd-toggle input:disabled + .cd-toggle-slider { opacity: 0.4; cursor: not-allowed; }

    /* ============================================================
       6. EQUIPMENT ACCORDION
    ============================================================ */
    .cd-equipment {
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .cd-equipment-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .cd-equipment-header:hover { background: var(--bg-hover); }
    .cd-equipment-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cd-equipment-arrow {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease;
      color: var(--text-muted);
      font-size: 12px;
    }
    .cd-equipment.open .cd-equipment-arrow { transform: rotate(180deg); }
    .cd-equipment-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .cd-equipment.open .cd-equipment-content { max-height: 200px; }
    .cd-equipment-body {
      padding: 0 16px 14px;
    }
    .cd-equip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .cd-equip-item {
      background: var(--bg-hover);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .cd-equip-count {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .cd-equip-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ============================================================
       7. SALES ASSIGNMENT — MINIMAL
    ============================================================ */
    .cd-sales-assign {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .cd-sales-assign-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cd-sales-assign-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--info-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .cd-sales-assign-label {
      font-size: 11px;
      color: var(--text-muted);
    }
    .cd-sales-assign-name {
      font-size: 13px;
      font-weight: 600;
      color: #3b82f6;
    }

    /* ============================================================
       8. MONTH FILTER
    ============================================================ */
    .cd-filter {
      background: var(--card);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .cd-filter select {
      width: 100%;
      height: 36px;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      padding: 0 10px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .cd-filter select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* ============================================================
       9. STICKY TAB BAR
    ============================================================ */
    .cd-tabs-wrapper {
      position: sticky;
      top: calc(var(--header-height) + var(--safe-area-top));
      z-index: 100;
      background: var(--bg);
      padding: 10px 0;
      margin: 0 -12px;
      padding-left: 12px;
      padding-right: 12px;
    }
    .cd-tabs {
      display: flex;
      background: var(--card);
      border-radius: 14px;
      padding: 4px;
      gap: 2px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    [data-theme="light"] .cd-tabs {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .cd-tab-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 9px 6px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .cd-tab-btn.active {
      background: var(--primary);
      color: #1E2329;
      box-shadow: 0 2px 8px rgba(252,213,53,0.3);
    }
    .cd-tab-btn:active { transform: scale(0.96); }
    .cd-tab-btn-icon { font-size: 14px; }
    .cd-tab-btn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--danger);
      flex-shrink: 0;
      animation: cd-pulse 2s infinite;
    }
    .cd-tab-btn.active .cd-tab-btn-dot { background: #1E2329; }

    /* ============================================================
       10. TAB CONTENTS
    ============================================================ */
    .cd-tab-content {
      padding-top: 12px;
    }
    .cd-tab-pane { display: none; }
    .cd-tab-pane.active { display: block; }

    /* ── ORDER TAB: TIMELINE ── */
    .cd-order-timeline {
      position: relative;
      padding-left: 20px;
    }
    .cd-order-timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 8px;
      bottom: 0;
      width: 2px;
      background: var(--border);
      border-radius: 1px;
    }
    .cd-order-item {
      position: relative;
      margin-bottom: 12px;
    }
    .cd-order-dot {
      position: absolute;
      left: -17px;
      top: 14px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--card);
      box-shadow: 0 0 0 2px var(--border);
      background: var(--primary);
    }
    .cd-order-dot.paid { background: var(--success); box-shadow: 0 0 0 2px var(--success); }
    .cd-order-dot.unpaid { background: var(--danger); box-shadow: 0 0 0 2px var(--danger); }
    .cd-order-dot.partial { background: var(--warning); box-shadow: 0 0 0 2px var(--warning); }
    .cd-order-dot.replace { background: var(--info); box-shadow: 0 0 0 2px var(--info); }
    .cd-order-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .cd-order-card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .cd-order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cd-order-date {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cd-order-badge {

          <label class="cd-payment-input-label">Số tiền khách trả</label>
          <input type="text" id="paymentAmount" value="0" inputmode="numeric"
            oninput="_onPaymentAmountInput(this)"
            class="cd-payment-input">
        </div>
        <div class="cd-payment-input-group">
          <label class="cd-payment-input-label">Ghi chú (tùy chọn)</label>
          <input type="text" id="paymentNote" placeholder="VD: Khách thanh toán chuyển khoản"
            class="cd-payment-note">
        </div>
        <div id="paymentWarning" class="cd-payment-warning hidden"></div>
        <div style="display:flex;gap:8px;margin-top:14px;">
          <button onclick="closePaymentModal()" class="cd-payment-cancel">Huỷ</button>
          <button onclick="submitCustomerPayment()" class="cd-payment-confirm">Xác nhận thu</button>
        </div>
        <div class="cd-quick-pay-row mt-3" style="display:flex;gap:6px;">
          <button onclick="setPaymentFull()" id="btnPayFull" class="cd-quick-pay-btn green" style="flex:1;">Thu đủ</button>
          <button onclick="setPaymentPartial()" id="btnPayPartial" class="cd-quick-pay-btn" style="flex:1;">Nhập số</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════
    // ALL EXISTING JS LOGIC — PRESERVED AS-IS
    // ══════════════════════════════════════════════════════

    const customerId = window.location.pathname.split('/').pop();
    let customerData = null;
    let selectedYear = new Date().getFullYear();
    let selectedMonth = new Date().getMonth() + 1;
    window.__customerPromoEnabled = true;

    function formatVND(amount) {
      if (amount === null || amount === undefined || amount === '') return '0 đ';
      const num = Number(amount);
      if (isNaN(num)) return '0 đ';
      return new Intl.NumberFormat('vi-VN').format(num) + ' đ';
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const date = new Date(dateStr);
      return date.toLocaleDateString('vi-VN');
    }

    // ── Tab Switching (Binance Tab Bar) ──────────────────────
    let __activeTab = 'history';
    let __tabsLoaded = { history: true, kegs: false, debt: false, reward: false };

    function switchTab(tabName) {
      __activeTab = tabName;

      // Update tab buttons
      document.querySelectorAll('.cd-tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });

      // Update tab panes
      document.querySelectorAll('.cd-tab-pane').forEach(pane => {
        pane.classList.toggle('active', pane.dataset.tab === tabName);
      });

      // Lazy load tab content
      if (tabName === 'kegs' && !__tabsLoaded.kegs) {
        __tabsLoaded.kegs = true;
        loadKegsHistory();
      }
      if (tabName === 'debt' && !__tabsLoaded.debt) {
        __tabsLoaded.debt = true;
        loadDebtHistory();
      }
      if (tabName === 'reward' && !__tabsLoaded.reward) {
        __tabsLoaded.reward = true;
        loadRewardHistory();
      }

      // Scroll to tabs if needed (mobile UX)
      const tabWrapper = document.querySelector('.cd-tabs-wrapper');
      if (tabWrapper) {
        tabWrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // ── Load Kegs History ──────────────────────────────────
    async function loadKegsHistory() {
      const container = document.getElementById('kegsContent');
      if (!container) return;
      container.innerHTML = '<div class="text-center py-8 text-muted">Đang tải...</div>';

      try {
        const res = await fetch(`/api/customers/${customerId}/keg-history`);
        const data = await res.json();

        if (!data.history || data.history.length === 0) {
          container.innerHTML = '<div class="text-center py-8 text-muted">Chưa có lịch sử vỏ bình</div>';
          return;
        }

        let html = `
          <div class="cd-kegs-summary">
            <div class="cd-kegs-summary-icon">📦</div>
            <div class="cd-kegs-summary-count" id="kegsTotalCount">${data.currentBalance || 0}</div>
            <div class="cd-kegs-summary-label">Vỏ bình đang giữ</div>
          </div>
          <div class="cd-kegs-timeline">
        `;

        data.history.forEach(item => {
          const change = (item.deliver_kegs || 0) - (item.return_kegs || 0);
          const changeClass = change >= 0 ? 'deliver' : 'return';
          const changeText = change >= 0 ? `+${change}` : change;

          html += `
            <div class="cd-kegs-item cd-animate-up">
              <div class="cd-kegs-dot"></div>
              <div class="cd-kegs-card">
                <div class="flex justify-between items-center">
                  <span class="text-sm font-bold text-main">📅 ${formatDate(item.date)}</span>
                  <span class="font-bold ${change >= 0 ? 'text-success' : 'text-danger'}">${changeText}</span>
                </div>
                <div class="cd-kegs-row">
                  <span class="deliver">+${item.deliver_kegs || 0} giao</span>
                  <span class="return">-${item.return_kegs || 0} thu</span>
                </div>
                <div class="cd-kegs-balance">Còn lại: <strong>${item.keg_balance_after || 0}</strong></div>
              </div>
            </div>
          `;
        });

        html += '</div>';
        container.innerHTML = html;

        // Animate counter
        animateCounter(document.getElementById('kegsTotalCount'), 0, data.currentBalance || 0, 800);
      } catch (err) {
        container.innerHTML = '<div class="text-center py-8 text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    // ── Number Counter Animation ───────────────────────────
    function animateCounter(el, start, end, duration) {
      if (!el) return;
      const startTime = performance.now();
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(start + (end - start) * eased);
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    // ── Payment Modal ──────────────────────────────────────
    let _customerPaymentDebt = 0;
    let _paymentCustomerId = null;
    let _paymentCustomerDebt = 0;

    function _getPaymentAmount() {
      var el = document.getElementById('paymentAmount');
      return el ? parseInt(el.value.replace(/[^0-9]/g, '')) || 0 : 0;
    }

    function _setPaymentAmount(amount) {
      var el = document.getElementById('paymentAmount');
      if (el) el.value = amount || 0;
    }

    function _onPaymentAmountInput(el) {
      var raw = parseInt((el.value || '').replace(/[^0-9]/g, '')) || 0;
      if (raw > _paymentCustomerDebt) {
        var w = document.getElementById('paymentWarning');
        if (w) { w.textContent = 'Số tiền vượt quá công nợ!'; w.classList.remove('hidden'); }
      } else {
        var w2 = document.getElementById('paymentWarning');
        if (w2) w2.classList.add('hidden');
      }
    }

    function openCustomerPaymentModal(debtAmount) {
      _customerPaymentDebt = debtAmount || 0;
      _paymentCustomerId = customerId;
      _paymentCustomerDebt = _customerPaymentDebt;
      var infoEl = document.getElementById('paymentModalInfo');
      if (infoEl) {
        infoEl.innerHTML = `
          <div class="cd-payment-info-row">
            <span style="color:var(--text-muted);font-size:12px;">Khách hàng</span>
            <span style="font-weight:700;color:var(--text-primary);">${customerData ? customerData.name : ''}</span>
          </div>
          <div class="cd-payment-info-row" style="padding-top:8px;margin-top:4px;border-top:1px solid var(--border);">
            <span style="font-size:13px;font-weight:600;">Tổng công nợ</span>
            <span style="font-weight:800;color:var(--danger);font-size:18px;">${formatVND(_customerPaymentDebt)}</span>
          </div>
        `;
      }
      document.getElementById('paymentAmountInput').classList.add('hidden');
      var btnPayFull = document.getElementById('btnPayFull');
      var btnPayPartial = document.getElementById('btnPayPartial');
      if (btnPayFull) { btnPayFull.classList.add('green'); btnPayFull.style.background = ''; }
      if (btnPayPartial) { btnPayPartial.classList.remove('green'); btnPayPartial.style.background = ''; }
      _setPaymentAmount(_customerPaymentDebt);
      document.getElementById('paymentNote').value = '';
      var w = document.getElementById('paymentWarning');
      if (w) w.classList.add('hidden');
      var modal = document.getElementById('paymentModal');
      if (modal) modal.classList.remove('hidden');
    }

    function setPaymentFull() {
      _setPaymentAmount(_customerPaymentDebt);
      document.getElementById('paymentAmountInput').classList.add('hidden');
      var btnPayFull = document.getElementById('btnPayFull');
      var btnPayPartial = document.getElementById('btnPayPartial');
      if (btnPayFull) { btnPayFull.classList.add('green'); }
      if (btnPayPartial) { btnPayPartial.classList.remove('green'); }
      var w = document.getElementById('paymentWarning');
      if (w) w.classList.add('hidden');
    }

    function setPaymentPartial() {
      document.getElementById('paymentAmountInput').classList.remove('hidden');
      var input = document.getElementById('paymentAmount');
      if (input) { input.focus(); input.select(); }
      var btnPayFull = document.getElementById('btnPayFull');
      var btnPayPartial = document.getElementById('btnPayPartial');
      if (btnPayPartial) { btnPayPartial.classList.add('green'); }
      if (btnPayFull) { btnPayFull.classList.remove('green'); }
    }

    function closePaymentModal() {
      var modal = document.getElementById('paymentModal');
      if (modal) modal.classList.add('hidden');
      _customerPaymentDebt = 0;
    }

    async function submitCustomerPayment() {
      var amount = _getPaymentAmount();
      var note = document.getElementById('paymentNote')?.value || '';
      var btn = document.querySelector('[onclick="submitCustomerPayment()"]');
      var w = document.getElementById('paymentWarning');
      if (amount <= 0) {
        if (w) { w.textContent = 'Số tiền phải lớn hơn 0'; w.classList.remove('hidden'); }
        return;
      }
      if (btn) { btn.disabled = true; btn.innerText = 'Đang xử lý...'; }
      try {
        var res = await fetch('/api/debts/payment', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Request-Id': Date.now() + '-' + Math.random().toString(36).substr(2, 9)
          },
          body: JSON.stringify({ customerId: customerId, amount: amount, note: note || 'Thu tiền từ trang khách hàng' })
        });
        var data = await res.json();
        if (data.success) {
          closePaymentModal();
          if (__tabsLoaded.debt) await loadDebtHistory();
          await loadCustomerStats();
          if (typeof showToast === 'function') showToast('Đã thu ' + formatVND(amount), 'success');
          else alert('Đã thu ' + formatVND(amount));
        } else {
          if (w) { w.textContent = data.error || 'Lỗi'; w.classList.remove('hidden'); }
          if (typeof showToast === 'function') showToast(data.error || 'Lỗi', 'error');
        }
      } catch (err) {
        if (w) { w.textContent = 'Lỗi kết nối'; w.classList.remove('hidden'); }
        if (typeof showToast === 'function') showToast('Lỗi kết nối', 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.innerText = 'Xác nhận thu'; }
      }
    }

    // ── Load Debt History (Mobile Banking Style) ───────────
    async function loadDebtHistory() {
      const container = document.getElementById('debtContent');
      if (!container) return;
      container.innerHTML = '<div class="text-center py-8 text-muted">Đang tải...</div>';

      try {
        const res = await fetch(`/api/debts/${customerId}`);
        const resp = await res.json();
        const data = resp.data;

        if (!data || !data.customer) {
          container.innerHTML = '<div class="text-center py-8 text-muted">Không có dữ liệu</div>';
          return;
        }

        const customer = data.customer;
        const orderDebts = data.orderDebts || [];
        const history = data.history || [];
        const currentDebt = customer.debt || 0;

        let isGreen = currentDebt === 0;
        let headerClass = isGreen ? 'cd-debt-header-green' : '';

        let html = `
          <div class="cd-debt-header ${headerClass}">
            <div class="cd-debt-header-label">${isGreen ? '✅' : '💰'} Tổng công nợ</div>
            <div class="cd-debt-header-amount">${formatVND(currentDebt)}</div>
            <div class="cd-debt-header-sub">${isGreen ? 'Không có công nợ' : (orderDebts.filter(od => od.status !== 'paid').length) + ' đơn chưa thanh toán'}</div>
        `;

        if (currentDebt > 0) {
          html += `
            <button onclick="openCustomerPaymentModal(${currentDebt})" class="cd-debt-collect-btn">
              💰 Thu tiền ngay
            </button>
            <div class="cd-quick-pay-row mt-2" style="display:flex;gap:6px;">
              ${[100000, 200000, 500000].map(amt => `
                <button onclick="quickPayCustomer(${amt})" class="cd-quick-pay-btn" style="flex:1;height:36px;font-size:11px;">+${formatVND(amt)}</button>
              `).join('')}
              <button onclick="quickPayCustomer(${currentDebt})" class="cd-quick-pay-btn green" style="flex:1;height:36px;font-size:11px;">Hết nợ</button>
            </div>
          `;
        }
        html += '</div>';

        // Order debts
        const unpaidOrders = orderDebts.filter(od => od.status !== 'paid');
        if (unpaidOrders.length > 0) {
          html += `
            <div class="cd-debt-orders-title">📋 Đơn hàng chưa thanh toán (${unpaidOrders.length})</div>
          `;
          for (const od of unpaidOrders) {
            const pct = od.original_amount > 0 ? Math.round((od.paid_amount / od.original_amount) * 100) : 0;
            const cardClass = od.status === 'partial' ? 'partial' : 'unpaid';
            html += `
              <div class="cd-debt-order-card ${cardClass}">
                <div class="flex justify-between items-center mb-2">
                  <span class="text-sm font-bold text-main">#${od.sale_id}</span>
                  <span class="text-xs text-muted">${formatDate(od.created_at)}</span>
                </div>
                <div class="flex justify-between items-center mb-2">
                  <span class="text-sm text-muted">Còn nợ</span>
                  <span class="font-bold text-danger" style="font-size:15px;">${formatVND(od.remaining_amount)}</span>
                </div>
                <div style="height:4px;background:var(--bg-hover);border-radius:2px;overflow:hidden;margin-bottom:4px;">
                  <div style="height:4px;border-radius:2px;width:${pct}%;background:${od.status === 'partial' ? 'var(--warning)' : 'var(--danger)'};"></div>
                </div>
                <div class="text-xs text-muted">Đã trả ${formatVND(od.paid_amount)} / ${formatVND(od.original_amount)} (${pct}%)</div>
              </div>
            `;
          }
        }

        // Transaction timeline
        if (history.length > 0) {
          html += `
            <div class="text-sm font-bold text-main mb-3" style="margin-top:14px;">📜 Lịch sử giao dịch</div>
            <div class="cd-debt-tx-timeline">
          `;
          for (const tx of history.slice(0, 30)) {
            let dotClass = 'decrease';
            let amountClass = 'text-success';
            let amountText = formatVND(tx.amount);
            let label = tx.note || 'Thanh toán';

            if (tx.type === 'increase') {
              dotClass = 'increase';
              amountClass = 'text-danger';
              amountText = '+' + formatVND(tx.amount);
              label = tx.note || 'Ghi nợ';
            } else if (tx.type === 'cancel') {
              dotClass = 'cancel';
              amountClass = 'text-info';
              label = tx.note || 'Hoàn nợ';
            } else if (tx.type === 'adjust') {
              dotClass = 'adjust';
              amountClass = tx.amount < 0 ? 'text-danger' : 'text-success';
              amountText = tx.amount > 0 ? '+' + formatVND(tx.amount) : formatVND(tx.amount);
              label = tx.note || 'Điều chỉnh';
            }

            html += `
              <div class="cd-debt-tx-item">
                <div class="cd-debt-tx-dot ${dotClass}"></div>
                <div class="cd-debt-tx-card">
                  <div class="flex justify-between items-center">
                    <span class="cd-debt-tx-date">${formatDate(tx.created_at)}</span>
                    <span class="cd-debt-tx-amount ${dotClass === 'decrease' ? '' : dotClass}">${amountText}</span>
                  </div>
                  <div class="cd-debt-tx-label">${label}</div>
                  <div class="cd-debt-tx-balance">Số dư: ${formatVND(tx.balance_after)}</div>
                </div>
              </div>
            `;
          }
          html += '</div>';
        }

        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<div class="text-center py-8 text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    // Quick pay
    window.quickPayCustomer = async function(amount) {
      if (amount <= 0) return;
      var note = '';
      try { note = prompt('Ghi chú (tùy chọn):', '') || ''; } catch(e) { note = ''; }
      var btn = null;
      try {
        var btns = document.querySelectorAll('[onclick*="quickPayCustomer"]');
        btn = Array.from(btns).find(function(b) { return b && b.onclick; });
        if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
      } catch(e) {}
      try {
        const res = await fetch('/api/debts/payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Request-Id': Date.now() + '-' + Math.random() },
          body: JSON.stringify({ customerId, amount, note: note || 'Thu nhanh ' + formatVND(amount) })
        });
        const data = await res.json();
        if (data.success) {
          if (typeof showToast === 'function') showToast('Đã thu ' + formatVND(amount), 'success');
          else alert('Đã thu ' + formatVND(amount));
          if (__tabsLoaded.debt) loadDebtHistory();
          loadCustomerStats();
        } else {
          if (typeof showToast === 'function') showToast(data.error || 'Lỗi', 'error');
          else alert(data.error || 'Lỗi');
        }
      } catch (e) {
        if (typeof showToast === 'function') showToast('Lỗi kết nối', 'error');
        else alert('Lỗi kết nối');
      } finally {
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
      }
    };

    // ── Reward Section ──────────────────────────────────────
    async function loadRewardStatus() {
      const container = document.getElementById('rewardContent');
      if (!container) return;
      container.innerHTML = '<div class="text-center py-4 text-muted">Đang tải...</div>';
      try {
        const res = await fetch('/api/promotions/reward/status/' + customerId);
        const resp = await res.json();
        if (!resp.success) { container.innerHTML = '<div class="text-center py-4 text-muted">Không có dữ liệu</div>'; return; }
        renderRewardStatus(resp.data);
      } catch (e) {
        container.innerHTML = '<div class="text-center py-4 text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    function renderRewardStatus(s) {
      const container = document.getElementById('rewardContent');
      if (!container) return;

      var badgeIcon = '🏆';
      var badgeLabel = 'Chưa đạt mốc';
      var tierInfo = '';
      var progressBar = '';

      if (s.tier === 'BONUS_20L') {
        badgeIcon = '🏆';
        badgeLabel = 'Đã đạt mốc 500L';
        tierInfo = '<div style="font-size:18px;font-weight:800;color:var(--success);">Thưởng 20L</div>';
      } else if (s.tier === 'BONUS_10L') {
        badgeIcon = '🎯';
        badgeLabel = 'Đạt mốc 300L';
        tierInfo = '<div style="font-size:18px;font-weight:800;color:var(--warning);">Thưởng 10L</div>';
      }

      if (s.tier !== 'NONE') {
        tierInfo = '<div style="font-size:18px;font-weight:800;color:var(--warning);">Thưởng ' + s.liters + 'L</div>';
        if (s.claimed) {
          tierInfo += '<div style="font-size:12px;color:var(--success);margin-top:4px;">Đã nhận thưởng</div>';
        } else {
          tierInfo += '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Thưởng gắn vào đơn đầu tháng sau</div>';
        }
      }

      if (s.nextTierLiters && s.litersToNext > 0 && s.tier !== 'NONE') {
        var pct = s.progressToNext || 0;
        progressBar = '<div class="cd-reward-progress"><div class="cd-reward-progress-labels"><span>Đã mua: <strong>' + s.monthlyLiters + 'L</strong></span><span>Cần ' + s.nextTierLiters + 'L</span></div><div class="cd-reward-progress-bar"><div class="cd-reward-progress-fill" style="width:' + pct + '%;"></div></div></div>';
      } else if (s.tier === 'NONE') {
        var toNext = s.litersToNext || 0;
        var pct = s.progressToNext || 0;
        progressBar = '<div class="cd-reward-progress"><div class="cd-reward-progress-labels"><span>Đã mua: <strong>' + s.monthlyLiters + 'L</strong></span><span>Cần ' + toNext + 'L nữa</span></div><div class="cd-reward-progress-bar"><div class="cd-reward-progress-fill" style="width:' + pct + '%;"></div></div></div>';
      }

      container.innerHTML = `
        <div class="cd-reward-main">
          <div class="cd-reward-main-icon">${badgeIcon}</div>
          <div class="cd-reward-main-title">${badgeLabel}</div>
          ${tierInfo}
          <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">${s.monthlyLiters}L tháng này</div>
          ${progressBar}
        </div>
      `;
    }

    async function loadRewardHistory() {
      const container = document.getElementById('rewardHistoryContent');
      if (!container) return;
      container.innerHTML = '<div class="text-center py-8 text-muted">Đang tải...</div>';
      try {
        const res = await fetch('/api/promotions/reward/history/' + customerId);
        const resp = await res.json();
        if (!resp.success || !resp.data || resp.data.length === 0) {
          container.innerHTML = '<div class="text-center py-8 text-muted">Chưa có lịch sử nhận thưởng</div>';
          return;
        }
        let html = '';
        resp.data.forEach(function(r) {
          var d = r.claimed_at ? new Date(r.claimed_at).toLocaleDateString('vi-VN') : 'N/A';
          html += '<div class="cd-reward-history-item"><div><div class="cd-reward-history-tier">' + r.reward_tier + '</div><div class="cd-reward-history-date">Ngày: ' + d + '</div></div><div class="cd-reward-history-liters">' + r.reward_liters + 'L</div></div>';
        });
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = '<div class="text-center py-8 text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    // ── Main Render ─────────────────────────────────────────
    async function loadCustomerDetail() {
      const headerActions = `<button onclick="editCustomerInfo()" class="btn btn-ghost text-sm" style="padding:6px 8px;" title="Sửa">✏️</button>`;

      document.getElementById('app').innerHTML =
        getHeaderWithActions('Chi tiết khách', '👤', headerActions) +
        getContent(`
          <!-- ═══ SKELETON LOADING ═══ -->
          <div id="cdSkeletonLoading">
            <div class="cd-skeleton-card cd-skeleton-hero cd-skeleton"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
              <div class="cd-skeleton-card cd-skeleton-kpi cd-skeleton"></div>
              <div class="cd-skeleton-card cd-skeleton-kpi cd-skeleton"></div>
              <div class="cd-skeleton-card cd-skeleton-kpi cd-skeleton"></div>
              <div class="cd-skeleton-card cd-skeleton-kpi cd-skeleton"></div>
            </div>
          </div>

          <!-- ═══ MAIN CONTENT (hidden until loaded) ═══ -->

    // ── Quick Actions ────────────────────────────────────────
    function quickCollect() {

        openCustomerPaymentModal(debt);
      } else {
        if (typeof showToast === 'function') showToast('Không có công nợ', 'info');

    function createOrder() {
      window.location.href = '/sale?customer=' + customerId;
    }

    function callCustomer() {
      const phone = customerData && customerData.phone ? customerData.phone.replace(/\D/g, '') : '';
      if (phone) window.location.href = 'tel:' + phone;
    }

    function openZalo() {
      const phone = customerData && customerData.phone ? customerData.phone.replace(/\D/g, '') : '';
      if (phone) window.location.href = 'https://zalo.me/' + phone;
    }

    // ── Month Options ─────────────────────────────────────────
    function getMonthOptions() {
      const now = new Date();
      let options = '';
      for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const value = `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
        const label = `${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
        options += `<option value="${value}" ${value === `${selectedYear}-${selectedMonth.toString().padStart(2, '0')}` ? 'selected' : ''}>${label}</option>`;
      }
      return options;
    }

    // ── Load Customer Info ─────────────────────────────────────
    async function loadCustomerInfo() {
      try {
        const res = await fetch(`/api/customers/${customerId}`);
        const data = await res.json();
        if (data) {
          customerData = data;
          document.title = data.name + ' - Beer POS';
          window.__customerName = data.name;
          window.__customerPhone = data.phone || 'Chưa có SĐT';

          // Update Hero Card
          const heroName = document.getElementById('heroName');
          const heroPhone = document.getElementById('heroPhone');
          const heroAvatar = document.getElementById('heroAvatar');
          const heroLastSale = document.getElementById('heroLastSale');
          const heroBadges = document.getElementById('heroBadges');

          if (heroName) heroName.textContent = data.name || 'Khách hàng';
          if (heroPhone) heroPhone.textContent = data.phone || 'Chưa có SĐT';
          if (heroAvatar) heroAvatar.textContent = (data.name || 'K').charAt(0).toUpperCase();
          if (heroLastSale) {
            const days = data.last_sale_days_ago;
            if (days === 0) heroLastSale.textContent = 'Hôm nay';
            else if (days === 1) heroLastSale.textContent = 'Hôm qua';
            else if (days) heroLastSale.textContent = days + ' ngày trước';
            else heroLastSale.textContent = 'Chưa mua';
          }

          // Badges
          let badges = '';
          if (data.is_vip) badges += '<span class="cd-hero-badge cd-hero-badge-vip">⭐ VIP</span>';
          if (data.is_new) badges += '<span class="cd-hero-badge cd-hero-badge-new">🆕 Mới</span>';
          if (data.debt > 0) badges += '<span class="cd-hero-badge cd-hero-badge-debt">💸 Nợ</span>';
          if (data.last_sale_days_ago > 30) badges += '<span class="cd-hero-badge cd-hero-badge-sleep">😴 Ngủ 30+ ngày</span>';
          if (heroBadges) heroBadges.innerHTML = badges;

          // Fridge
          document.getElementById('horizontalFridgeCount').textContent = data.horizontal_fridge || 0;
          document.getElementById('verticalFridgeCount').textContent = data.vertical_fridge || 0;
        }
      } catch (err) {}
    }

    // ── Load Stats ────────────────────────────────────────────
    async function loadCustomerStats() {
      try {
        const res = await fetch(`/api/customers/${customerId}/stats?year=${selectedYear}&month=${selectedMonth}`);
        const data = await res.json();

        const kegBalance = data.kegBalance || 0;
        const totalRevenue = data.totalRevenue || 0;
        const monthlyKegs = data.monthlyKegs || 0;
        const currentDebt = data.currentDebt || 0;

        window.__currentDebt = currentDebt;

        // KPI Cards
        const kpiDebtEl = document.getElementById('kpiDebt');
        const kpiKegsEl = document.getElementById('kpiKegs');
        const kpiMonthlyEl = document.getElementById('kpiMonthly');
        const kpiRevenueEl = document.getElementById('kpiRevenue');

        if (kpiDebtEl) {
          kpiDebtEl.textContent = formatVND(currentDebt);
          kpiDebtEl.className = 'cd-kpi-value cd-counter';
          if (currentDebt >= 5000000) kpiDebtEl.classList.add('danger');
          else if (currentDebt > 0) kpiDebtEl.classList.add('warning');
          else kpiDebtEl.classList.add('success');
        }
        if (kpiKegsEl) {
          kpiKegsEl.textContent = kegBalance;
          kpiKegsEl.className = 'cd-kpi-value cd-counter';
        }
        if (kpiMonthlyEl) {
          kpiMonthlyEl.textContent = monthlyKegs;
          kpiMonthlyEl.className = 'cd-kpi-value cd-counter';
        }
        if (kpiRevenueEl) {
          kpiRevenueEl.textContent = formatVND(totalRevenue);
          kpiRevenueEl.className = 'cd-kpi-value cd-counter success';
        }

        // Health Card
        updateHealthCard(currentDebt, kegBalance, monthlyKegs, data);

        // FAB visibility
        const fab = document.getElementById('cdFab');
        if (fab) {
          if (currentDebt > 0) {
            fab.classList.remove('hidden');
          } else {
            fab.classList.add('hidden');
          }
        }

        // Debt tab dot
        const debtDot = document.getElementById('debtTabDot');
        if (debtDot) {
          debtDot.style.display = currentDebt > 0 ? 'block' : 'none';
        }
      } catch (err) {}
    }

    function updateHealthCard(debt, kegs, monthly, data) {
      // Debt dot
      const debtDot = document.getElementById('healthDebtDot');
      const debtVal = document.getElementById('healthDebt');
      if (debtDot) {
        debtDot.className = 'cd-health-dot';
        if (debt === 0) debtDot.classList.add('good');
        else if (debt < 1000000) debtDot.classList.add('monitor');
        else debtDot.classList.add('urgent');
      }
      if (debtVal) debtVal.textContent = debt === 0 ? '✅ Không nợ' : formatVND(debt);

      // Kegs dot
      const kegDot = document.getElementById('healthKegDot');
      const kegVal = document.getElementById('healthKegs');
      if (kegDot) {
        kegDot.className = 'cd-health-dot';
        if (kegs === 0) kegDot.classList.add('good');
        else if (kegs <= 20) kegDot.classList.add('monitor');
        else kegDot.classList.add('urgent');
      }
      if (kegVal) kegVal.textContent = kegs + ' bình';

      // Monthly dot
      const monthlyDot = document.getElementById('healthMonthlyDot');
      const monthlyVal = document.getElementById('healthMonthly');
      if (monthlyDot) {
        monthlyDot.className = 'cd-health-dot';
        if (monthly > 50) monthlyDot.classList.add('good');
        else if (monthly > 0) monthlyDot.classList.add('monitor');
        else monthlyDot.classList.add('urgent');
      }
      if (monthlyVal) monthlyVal.textContent = monthly > 0 ? monthly + ' bình' : 'Chưa mua';

      // Reward dot
      const rewardDot = document.getElementById('healthRewardDot');
      const rewardVal = document.getElementById('healthReward');
      if (rewardDot && rewardVal) {
        const rewardTier = window.__rewardTier || 'NONE';
        rewardDot.className = 'cd-health-dot';
        if (rewardTier !== 'NONE') {
          rewardDot.classList.add('good');
          rewardVal.textContent = '🎉 Đạt';
        } else {
          rewardDot.classList.add('monitor');
          rewardVal.textContent = 'Chưa đạt';
        }
      }

      // Status bar
      const statusBar = document.getElementById('healthStatusBar');
      const statusIcon = document.getElementById('healthStatusIcon');
      const statusText = document.getElementById('healthStatusText');

      let status = 'good';
      let icon = '🟢';
      let text = 'Khách hàng tốt';

      if (debt >= 5000000) { status = 'urgent'; icon = '🔴'; text = 'Cần xử lý: Nợ cao!'; }
      else if (debt > 0) { status = 'monitor'; icon = '🟡'; text = 'Cần theo dõi: Có công nợ'; }
      else if (kegs > 30) { status = 'monitor'; icon = '🟡'; text = 'Vỏ bình nhiều, cần thu'; }
      else if (monthly === 0) { status = 'monitor'; icon = '🟡'; text = 'Chưa mua tháng này'; }
      else if (debt === 0 && monthly > 0) { status = 'good'; icon = '🟢'; text = 'Tốt: Mua đều, không nợ'; }

      if (statusBar) { statusBar.className = 'cd-health-status-bar ' + status; }
      if (statusIcon) statusIcon.textContent = icon;
      if (statusText) statusText.textContent = text;
    }

    // ── Promotion Toggles ────────────────────────────────────
    async function loadPromoToggleStatus() {
      const container = document.getElementById('promoTogglesSection');
      if (!container) return;

      try {
        var res = await fetch('/api/promotions/customer/' + customerId + '/overview');
        var data = await res.json();

        var promotionEnabled = true;
        var newShopEnabled = true;
        var rewardEnabled = true;
        var systemNewShopEnabled = true;
        var systemRewardEnabled = true;
        var newShopInfo = null;

        if (data && data.data) {
          promotionEnabled = data.data.promotionEnabled == 1;
          newShopEnabled = data.data.newShopEnabled == 1;
          rewardEnabled = data.data.rewardEnabled == 1;
          systemNewShopEnabled = data.data.systemNewShopEnabled == 1;
          systemRewardEnabled = data.data.systemRewardEnabled == 1;
          newShopInfo = data.data.newShop;
          window.__newShopSettings = data.data.newShopSettings || null;
          window.__rewardTiers = data.data.rewardTiers || [];
        }

        var tiers = window.__rewardTiers || [];
        window.__customerPromoEnabled = promotionEnabled;
        window.__customerNewShopEnabled = newShopEnabled;
        window.__customerRewardEnabled = rewardEnabled;

        const newShopDisabled = !systemNewShopEnabled;
        const rewardDisabled = !systemRewardEnabled;

        let newShopStatus = 'Bật';
        let newShopColor = 'var(--success)';
        if (!promotionEnabled) {
          newShopStatus = 'CTKM tắt';
          newShopColor = 'var(--text-muted)';
        } else if (newShopDisabled) {
          newShopStatus = 'Hết hiệu lực';
          newShopColor = 'var(--text-muted)';
        } else if (!newShopEnabled) {
          newShopStatus = 'Đang tắt';
          newShopColor = 'var(--danger)';
        } else if (newShopInfo && newShopInfo.eligible) {
          newShopStatus = newShopInfo.daysRemaining > 0 ? 'Còn ' + newShopInfo.daysRemaining + ' ngày' : 'Hết ưu đãi';
          newShopColor = newShopInfo.daysRemaining > 0 ? 'var(--warning)' : 'var(--text-muted)';
        }

        let rewardStatus = 'Bật';
        let rewardColor = 'var(--success)';
        if (!promotionEnabled) {
          rewardStatus = 'CTKM tắt';
          rewardColor = 'var(--text-muted)';
        } else if (rewardDisabled) {
          rewardStatus = 'Hết hiệu lực';
          rewardColor = 'var(--text-muted)';
        } else if (!rewardEnabled) {
          rewardStatus = 'Đang tắt';
          rewardColor = 'var(--danger)';
        }

        let rewardDesc = 'Chưa có cài đặt';
        if (tiers.length > 0) {
          rewardDesc = tiers.map(function(t) {
            return 'Đạt ' + t.threshold + 'L: tặng ' + t.reward + 'L';
          }).join(' | ');
        }

        let newShopDesc = '';
        if (newShopInfo && newShopInfo.eligible && newShopInfo.daysRemaining > 0) {
          newShopDesc = 'Mua ' + (window.__newShopSettings ? window.__newShopSettings.goldBuy : newShopInfo.buyGold) + 'L vàng + ' + (window.__newShopSettings ? window.__newShopSettings.goldFree : newShopInfo.freeGold) + 'L | Mua ' + (window.__newShopSettings ? window.__newShopSettings.blackBuy : newShopInfo.buyBlack) + 'L đen + ' + (window.__newShopSettings ? window.__newShopSettings.blackFree : newShopInfo.freeBlack) + 'L';
        }

        container.innerHTML = `
          <!-- 🔥 Quán mới -->
          <div class="cd-promo-item">
            <div class="cd-promo-label">
              <span class="cd-promo-icon">🔥</span>
              <div>
                <div class="cd-promo-name">Quán mới</div>
                ${newShopDesc ? '<div class="cd-promo-desc">' + newShopDesc + '</div>' : ''}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="cd-promo-status ${newShopDisabled || !promotionEnabled ? 'expired' : (!newShopEnabled ? 'off' : 'on')}" style="color:${newShopColor};background:${newShopDisabled || !promotionEnabled ? 'var(--bg-hover)' : (!newShopEnabled ? 'var(--danger-dim)' : 'var(--success-dim)')};">${newShopStatus}</span>
              <label class="cd-toggle" style="${newShopDisabled ? 'opacity:0.4;' : ''}">
                <input type="checkbox" id="toggleNewShopEnabled" ${newShopEnabled && !newShopDisabled ? 'checked' : ''}
                  onchange="togglePromotionType('newShop')" ${newShopDisabled ? 'disabled' : ''}>
                <span class="cd-toggle-slider"></span>
              </label>
            </div>
          </div>
          <!-- 🏆 Thưởng doanh số -->
          <div class="cd-promo-item">
            <div class="cd-promo-label">
              <span class="cd-promo-icon">🏆</span>
              <div>
                <div class="cd-promo-name">Thưởng doanh số</div>
                <div class="cd-promo-desc">${rewardDesc}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="cd-promo-status ${rewardDisabled || !promotionEnabled ? 'expired' : (!rewardEnabled ? 'off' : 'on')}" style="color:${rewardColor};background:${rewardDisabled || !promotionEnabled ? 'var(--bg-hover)' : (!rewardEnabled ? 'var(--danger-dim)' : 'var(--success-dim)')};">${rewardStatus}</span>
              <label class="cd-toggle" style="${rewardDisabled ? 'opacity:0.4;' : ''}">
                <input type="checkbox" id="toggleRewardEnabled" ${rewardEnabled && !rewardDisabled ? 'checked' : ''}
                  onchange="togglePromotionType('reward')" ${rewardDisabled ? 'disabled' : ''}>
                <span class="cd-toggle-slider"></span>
              </label>
            </div>
          </div>
        `;
      } catch (e) {
        container.innerHTML = '<div class="text-center py-4 text-danger">Lỗi tải khuyến mãi</div>';
      }
    }

    async function togglePromotionType(type) {
      var toggle = document.getElementById('toggle' + (type === 'newShop' ? 'NewShop' : 'Reward') + 'Enabled');
      if (!toggle) return;
      var enabled = toggle.checked;

      try {
        var bodyObj = {};
        if (type === 'newShop') bodyObj.newShopEnabled = enabled;
        else bodyObj.rewardEnabled = enabled;

        var res = await fetch('/api/promotions/customer/' + customerId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyObj)
        });
        var data = await res.json();
        if (data.success) {
          if (type === 'newShop') {
            window.__customerNewShopEnabled = enabled;
            if (typeof showToast === 'function') showToast('Đã ' + (enabled ? 'bật' : 'tắt') + ' KM quán mới', 'success');
          } else {
            window.__customerRewardEnabled = enabled;
            if (typeof showToast === 'function') showToast('Đã ' + (enabled ? 'bật' : 'tắt') + ' thưởng doanh số', 'success');
          }
          await loadPromoToggleStatus();
        } else {
          toggle.checked = !enabled;
          if (typeof showToast === 'function') showToast(data.error || 'Lỗi', 'error');
        }
      } catch (e) {
        toggle.checked = !enabled;
        if (typeof showToast === 'function') showToast('Lỗi kết nối', 'error');
      }
    }

    // ── Sales Assignment ─────────────────────────────────────
    async function loadSalesAssignment() {
      // Sales is shown in hero card now
      const statusEl = document.getElementById('heroSales');
      if (!statusEl) return;
      try {
        const res = await fetch(`/api/sales-staff/customer/${customerId}`);
        const data = await res.json();
        if (data.success && data.data) {
          statusEl.textContent = data.data.name || '—';
        } else {
          statusEl.textContent = 'Chưa gán';
        }
      } catch (e) {
        statusEl.textContent = '—';
      }
    }

    async function openSalesAssignmentModal() {
      try {
        const [staffRes, customerRes] = await Promise.all([
          fetch('/api/sales-staff'),
          fetch(`/api/sales-staff/customer/${customerId}`)
        ]);
        const staffData = await staffRes.json();
        const customerData = await customerRes.json();
        const currentSalesId = customerData.success && customerData.data ? customerData.data.id : null;

        var options = '<option value="">-- Không gán sales --</option>';
        if (staffData.success && staffData.data) {
          staffData.data.forEach(function(s) {
            options += '<option value="' + s.id + '"' + (s.id === currentSalesId ? ' selected' : '') + '>' + s.name + '</option>';
          });
        }

        var html = '<div class="card p-4 mb-3">' +
          '<div class="font-bold mb-3">👔 Gán Sales phụ trách</div>' +
          '<select id="salesAssignmentSelect" class="bn-select w-full">' + options + '</select>' +
          '<div class="text-xs text-muted mt-2">Khi gán sales, nhân viên sẽ nhận hoa hồng mở cửa hàng (1 lần).</div>' +
          '</div>' +
          '<div class="flex gap-2 mt-4">' +
          '<button onclick="closeModal()" class="btn btn-ghost flex-1">Hủy</button>' +
          '<button onclick="submitSalesAssignment()" class="btn btn-primary flex-1">Lưu</button>' +
          '</div>';
        showModal('salesModal', html);
      } catch (e) {
        if (typeof showToast === 'function') showToast('Lỗi tải dữ liệu', 'error');
      }
    }

    async function submitSalesAssignment() {
      var sel = document.getElementById('salesAssignmentSelect');
      var salesId = sel && sel.value ? parseInt(sel.value) : null;
      try {
        const res = await fetch(`/api/customers/${customerId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sales_id: salesId })
        });
        const data = await res.json();
        if (data.success) {
          closeModal();
          loadSalesAssignment();
          if (typeof showToast === 'function') showToast('Đã cập nhật sales!', 'success');
        } else {
          if (typeof showToast === 'function') showToast(data.error || 'Lỗi', 'error');
        }
      } catch (e) {
        if (typeof showToast === 'function') showToast('Lỗi kết nối', 'error');
      }
    }

    // ── Monthly Beer Detail ──────────────────────────────────
    async function loadMonthlyBeerDetail(filter) {
      if (!filter) return;
      const [year, month] = filter.split('-');
      try {
        const res = await fetch(`/api/customers/${customerId}/monthly-beer-detail?year=${year}&month=${month}`);
        const resp = await res.json();
        if (!resp.success) return;

        const data = resp.data;
        const s = data.summary;

        const detailContainer = document.getElementById('monthlyBeerDetail');
        if (detailContainer && (s.gold > 0 || s.black > 0 || s.pet > 0 || s.box > 0)) {
          detailContainer.innerHTML = `
            <div class="cd-beer-detail">
              <div class="cd-beer-detail-title">🍺 Chi tiết sản lượng tháng</div>
              ${s.gold > 0 ? `
                <div class="cd-beer-row">
                  <div class="cd-beer-row-label"><span>🍺</span> Bia vàng</div>
                  <div class="cd-beer-row-val">${s.gold} L</div>
                </div>
              ` : ''}
              ${s.black > 0 ? `
                <div class="cd-beer-row">
                  <div class="cd-beer-row-label"><span>⚫</span> Bia đen</div>
                  <div class="cd-beer-row-val">${s.black} L</div>
                </div>
              ` : ''}
              ${s.pet > 0 ? `
                <div class="cd-beer-row">
                  <div class="cd-beer-row-label"><span>🍶</span> Chai nhựa</div>
                  <div class="cd-beer-row-val" style="color:var(--text-muted);">${s.pet} L</div>
                </div>
              ` : ''}
              ${s.box > 0 ? `
                <div class="cd-beer-row">
                  <div class="cd-beer-row-label"><span>📦</span> Thùng/hộp</div>
                  <div class="cd-beer-row-val" style="color:var(--text-muted);">${s.box} L</div>
                </div>
              ` : ''}
              <div class="cd-beer-total">
                <span>Tổng cộng</span>
                <span class="cd-beer-total-val">${s.total} L</span>
              </div>
            </div>
          `;
        }
      } catch (err) {}
    }

    // ── Load Sales History (Timeline) ───────────────────────
    async function loadSalesHistory() {
      const container = document.getElementById('salesHistory');
      if (!container) return;
      container.innerHTML = '<div class="text-center py-8 text-muted">Đang tải...</div>';

      const detailContainer = document.getElementById('monthlyBeerDetail');
      if (detailContainer) detailContainer.innerHTML = '';

      try {
        const filter = document.getElementById('monthFilter').value;
        let url = `/api/customers/${customerId}/sales`;
        if (filter) {
          const [year, month] = filter.split('-');
          url += `?year=${year}&month=${month}`;
        }

        const res = await fetch(url);
        const data = await res.json();

        if (data.sales.length === 0) {
          container.innerHTML = '<div class="text-center py-8 text-muted">Chưa có lịch sử giao hàng</div>';
          return;
        }

        let html = '';
        data.sales.forEach((sale, index) => {
          const isLast = index === data.sales.length - 1;
          const isReplacement = sale.type === 'replacement';

          let dotClass = 'paid';
          let badgeClass = 'paid';
          let badgeText = 'Đã TT';
          if (sale.debt > 0) {
            if (sale.paid_amount > 0) { dotClass = 'partial'; badgeClass = 'partial'; badgeText = 'Còn nợ'; }
            else { dotClass = 'unpaid'; badgeClass = 'unpaid'; badgeText = 'Chưa TT'; }
          }
          if (isReplacement) { dotClass = 'replace'; badgeClass = 'replace'; badgeText = 'Đổi hàng'; }

          html += `
            <div class="cd-order-item cd-animate-up">
              <div class="cd-order-dot ${dotClass}"></div>
              <div class="cd-order-card">
                <div class="cd-order-header">
                  <div class="cd-order-date">📅 ${formatDate(sale.date)}</div>
                  <span class="cd-order-badge ${badgeClass}">${badgeText}</span>
                </div>
                <div class="cd-order-total">${isReplacement ? '0 đ' : formatVND(sale.total)}</div>
                <div class="cd-order-stats">
                  <div class="cd-order-stat">
                    <div class="cd-order-stat-icon">🍺</div>
                    <div class="cd-order-stat-val">${sale.item_count || 0}</div>
                    <div class="cd-order-stat-lbl">Bia</div>
                  </div>
                  <div class="cd-order-stat">
                    <div class="cd-order-stat-icon">📦</div>
                    <div class="cd-order-stat-val">${sale.keg_balance_after || 0}</div>
                    <div class="cd-order-stat-lbl">Vỏ còn</div>
                  </div>
                  <div class="cd-order-stat">
                    <div class="cd-order-stat-icon">💰</div>
                    <div class="cd-order-stat-val" style="font-size:12px;">${sale.debt > 0 ? formatVND(sale.debt) : 'Hết nợ'}</div>
                    <div class="cd-order-stat-lbl">Nợ</div>
                  </div>
                </div>
                <div class="cd-order-keg-row">
                  <span class="give">+${sale.deliver_kegs || 0} giao</span>
                  <span class="take">-${sale.return_kegs || 0} thu</span>
                </div>
                <button onclick="viewInvoice(${sale.id})" class="btn btn-secondary btn-sm w-full mt-3" style="height:36px;font-size:13px;">
                  👁 Xem hóa đơn
                </button>
              </div>
            </div>
          `;
        });

        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<div class="text-center py-8 text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    // ── Month Change ─────────────────────────────────────────
    function onMonthChange() {
      const filter = document.getElementById('monthFilter').value;
      if (filter) {
        const [year, month] = filter.split('-');
        selectedYear = parseInt(year);
        selectedMonth = parseInt(month);
      } else {
        selectedYear = new Date().getFullYear();
        selectedMonth = new Date().getMonth() + 1;
      }
      loadCustomerStats();
      loadSalesHistory();
      loadRewardStatus();
      loadMonthlyBeerDetail(document.getElementById('monthFilter').value);
    }

    // ── Edit Customer ────────────────────────────────────────
    function editCustomerInfo() {
      if (!customerData) return;
      window.location.href = '/customers?edit=' + customerData.id;
    }

    // ── Invoice Modal ────────────────────────────────────────
    async function viewInvoice(saleId) {
      try {
        const res = await fetch('/api/sales/' + saleId);
        const data = await res.json();
        if (!res.ok || (data && data.error && data.id == null)) {
          throw new Error(data.error || 'Not found');
        }
        showInvoiceModal(data);
      } catch (err) {
        alert('Không thể tải hóa đơn');
      }
    }

    function showInvoiceModal(sale) {
      const modal = document.getElementById('customerInvoiceModal');
      if (!modal || !sale || !sale.id) return;

      const items = (sale.items || sale.products) || [];
      const customerName = sale.customer_name || sale.customerName || sale.customer?.name || 'Khách lẻ';
      const saleDate = sale.date || sale.created_at || '';
      const totalAmount = sale.totalAmount != null ? sale.totalAmount : (sale.total || 0);
      const formattedDate = saleDate ? formatDate(saleDate) : '—';

      const itemsHtml = items.length > 0 ? items.map(item => {
        const name = item.name || item.product_name || item.productName || 'SP';
        const qty = Number(item.quantity != null ? item.quantity : item.qty) || 0;
        const price = Number(item.price) || 0;
        return `<div class="flex justify-between py-2 border-b"><div><div class="font-medium">${name}</div><div class="text-sm text-secondary">${qty} x ${formatVND(price)}</div></div><div class="font-bold">${formatVND(qty * price)}</div></div>`;
      }).join('') : '<div class="text-center py-6 text-secondary text-sm">Không có dòng sản phẩm trên hóa đơn.</div>';

      document.getElementById('invoiceContent').innerHTML = `
        <div class="text-center mb-4">
          <div class="text-lg font-bold text-main">HÓA ĐƠN #${sale.id}</div>
          <div class="text-sm text-secondary">${formattedDate}</div>
        </div>
        <div class="card p-3 mb-4">
          <div class="font-medium text-main">${customerName}</div>
        </div>
        <div class="mb-4">${itemsHtml}</div>
        <div class="flex justify-between py-2 border-b border-muted">
          <span class="text-main">Tổng cộng:</span>
          <div class="money text-money"><span class="value text-2xl font-bold tabular-nums">${formatVND(totalAmount)}</span><span class="unit">đ</span></div>
        </div>
        ${sale.type === 'replacement' ? '<div class="text-center py-2 text-warning font-bold">🔁 Đổi bia lỗi</div>' : ''}
        ${((sale.bottleGiven != null ? sale.bottleGiven : sale.deliver_kegs) || (sale.bottleReceived != null ? sale.bottleReceived : sale.return_kegs)) ? `
        <div class="card p-3 mt-4">
          <div class="text-sm text-secondary font-medium mb-1">📦 Vỏ bình</div>
          <div class="flex justify-between text-sm">
            <span class="text-warning">Giao: +${sale.bottleGiven != null ? sale.bottleGiven : (sale.deliver_kegs || 0)}</span>
            <span class="text-danger">Thu: -${sale.bottleReceived != null ? sale.bottleReceived : (sale.return_kegs || 0)}</span>
          </div>
        </div>
        ` : ''}
      `;

      modal.classList.remove('hidden');
    }

    function closeInvoiceModal() {
      const modal = document.getElementById('customerInvoiceModal');
      if (modal) modal.classList.add('hidden');
    }

    document.getElementById('btnCloseInvoice').addEventListener('click', closeInvoiceModal);
    document.getElementById('btnCloseInvoice2').addEventListener('click', closeInvoiceModal);

    // ── Init ─────────────────────────────────────────────────
    loadCustomerDetail();
  </script>
