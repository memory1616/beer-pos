  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>

  <script>
    // ── State ─────────────────────────────────────────────
    var currentSettings = null;
    var qrAccounts = [];
    var editingQRId = null;
    var hasChanges = false;

    // ── Helpers ───────────────────────────────────────────
    function escHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Init ─────────────────────────────────────────────
    async function initPage() {
      var loading = document.getElementById('qrLoading');
      var content = document.getElementById('qrSettingsContent');
      if (loading) loading.classList.remove('hidden');
      if (content) content.classList.add('hidden');
      try {
        await Promise.all([loadSettings(), loadQRAccounts()]);
      } finally {
        if (loading) loading.classList.add('hidden');
        if (content) content.classList.remove('hidden');
      }
    }

    // ── Load QR Pool ─────────────────────────────────────
    async function loadQRAccounts() {
      try {
        var res = await fetch('/api/settings/qr-accounts', { cache: 'no-store', credentials: 'same-origin' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        qrAccounts = Array.isArray(data) ? data : [];
        renderQRList();
        console.log('[QR] Loaded', qrAccounts.length, 'accounts');
      } catch (e) {
        qrAccounts = [];
        renderQRList();
        console.error('loadQRAccounts:', e);
        // Show visible debug message in UI
        var list = document.getElementById('qrAccountList');
        if (list) {
          list.innerHTML = '<div class="empty-pool" style="color:var(--danger,#ef4444);">⚠️ Lỗi tải QR accounts: ' + (e.message || e) + '<br><small>Mở DevTools (F12) → Console để xem chi tiết</small></div>';
        }
      }
    }

    function renderQRList() {
      var list = document.getElementById('qrAccountList');
      if (!list) return;
      if (!qrAccounts || qrAccounts.length === 0) {
        list.innerHTML = '<div class="empty-pool">Chưa có tài khoản QR nào. Bấm <strong>+ Thêm tài khoản QR</strong> bên dưới để tạo.</div>';
        return;
      }
      var html = '';
      qrAccounts.forEach(function(qr, idx) {
        var isActive = qr.active === 1;
        var isFirst = idx === 0;
        var isLast = idx === qrAccounts.length - 1;
        html += '<div class="qr-card ' + (isActive ? '' : 'inactive') + '" data-id="' + qr.id + '">';
        html += '  <div class="qr-card-header">';
        html += '    <div class="qr-card-icon ' + (isActive ? '' : 'inactive') + '">&#127974;</div>';
        html += '    <div class="qr-card-title">';
        html += '      <div class="qr-card-label">' + escHtml(qr.label) + '</div>';
        html += '      <div class="qr-card-meta">' + escHtml(qr.bank_code) + ' &middot; ' + escHtml(qr.account_no) + (isFirst ? ' &middot; <span class="badge default">Mặc định</span>' : '') + '</div>';
        html += '    </div>';
        html += '    <div class="qr-card-actions">';
        html += '      <button class="qr-card-btn" title="Lên" onclick="moveQRAccount(' + qr.id + ', -1)"' + (isFirst ? ' disabled style="opacity:0.3;cursor:not-allowed;"' : '') + '>&#9650;</button>';
        html += '      <button class="qr-card-btn" title="Xuống" onclick="moveQRAccount(' + qr.id + ', 1)"' + (isLast ? ' disabled style="opacity:0.3;cursor:not-allowed;"' : '') + '>&#9660;</button>';
        html += '      <button class="qr-card-btn ' + (isActive ? 'active-on' : '') + '" title="Bật/Tắt" onclick="toggleQRActive(' + qr.id + ')">' + (isActive ? '&#10004;' : '&#10005;') + '</button>';
        html += '      <button class="qr-card-btn" title="Sửa" onclick="openQRForm(' + qr.id + ')">&#9998;</button>';
        html += '      <button class="qr-card-btn danger" title="Xoá" onclick="deleteQRAccount(' + qr.id + ')">&#128465;</button>';
        html += '    </div>';
        html += '  </div>';
        html += '  <div class="qr-card-row"><span>Chủ TK:</span> <strong>' + escHtml(qr.account_name) + '</strong></div>';
        html += '  <div class="qr-card-row"><span>Nội dung:</span> <strong>' + escHtml(qr.default_content || 'Thanh toan HD {invoice_id}') + '</strong></div>';
        if (isActive) {
          var qrUrl = 'https://img.vietqr.io/image/' + encodeURIComponent(qr.bank_code) + '-' + encodeURIComponent(qr.account_no) + '-' + encodeURIComponent(qr.template || 'compact2') + '.png?amount=100000&addInfo=Preview&accountName=' + encodeURIComponent((qr.account_name || '').toUpperCase());
          html += '  <div class="qr-card-preview"><img src="' + qrUrl + '" alt="QR" onerror="this.style.display=\'none\'"></div>';
        }
        html += '</div>';
      });
      list.innerHTML = html;
    }

    async function moveQRAccount(id, dir) {
      var idx = qrAccounts.findIndex(function(q) { return q.id === id; });
      if (idx < 0) return;
      var newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= qrAccounts.length) return;
      // Swap
      var tmp = qrAccounts[idx];
      qrAccounts[idx] = qrAccounts[newIdx];
      qrAccounts[newIdx] = tmp;
      // Persist
      var items = qrAccounts.map(function(q) { return { id: q.id }; });
      try {
        var res = await fetch('/api/settings/qr-accounts/reorder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: items })
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        await loadQRAccounts();
        if (typeof showToast === 'function') showToast('Đã sắp xếp lại', 'success');
        // Notify other tabs
        if (window.qrSocket) window.qrSocket.emit('request:refetch', { entities: ['qr_accounts'] });
      } catch (e) {
        if (typeof showToast === 'function') showToast('Lỗi: ' + e.message, 'error');
        await loadQRAccounts();
      }
    }

    async function toggleQRActive(id) {
      try {
        var res = await fetch('/api/settings/qr-accounts/' + id + '/toggle', { method: 'POST' });
        var data = await res.json();
        if (data.success) {
          await loadQRAccounts();
          if (typeof showToast === 'function') showToast('Đã cập nhật trạng thái', 'success');
          if (window.qrSocket) window.qrSocket.emit('request:refetch', { entities: ['qr_accounts'] });
        } else {
          throw new Error(data.error || 'Lỗi');
        }
      } catch (e) {
        if (typeof showToast === 'function') showToast('Lỗi: ' + e.message, 'error');
      }
    }

    async function deleteQRAccount(id) {
      var qr = qrAccounts.find(function(q) { return q.id === id; });
      if (!qr) return;
      if (!confirm('Xoá tài khoản QR "' + qr.label + '"?\nSTK: ' + qr.account_no + ' - ' + qr.bank_code)) return;
      try {
        var res = await fetch('/api/settings/qr-accounts/' + id, { method: 'DELETE' });
        var data = await res.json();
        if (data.success) {
          await loadQRAccounts();
          if (typeof showToast === 'function') showToast('Đã xoá', 'success');
          if (window.qrSocket) window.qrSocket.emit('request:refetch', { entities: ['qr_accounts'] });
        } else {
          throw new Error(data.error || 'Lỗi');
        }
      } catch (e) {
        if (typeof showToast === 'function') showToast('Lỗi: ' + e.message, 'error');
      }
    }

    // ── Modal ────────────────────────────────────────────
    function openQRForm(id) {
      editingQRId = id || null;
      var modal = document.getElementById('qrModal');
      var title = document.getElementById('qrModalTitle');
      var lbl = document.getElementById('qrFormLabel');
      var bank = document.getElementById('qrFormBank');
      var accNo = document.getElementById('qrFormAccountNo');
      var accName = document.getElementById('qrFormAccountName');
      var content = document.getElementById('qrFormContent');
      var template = document.getElementById('qrFormTemplate');
      var weight = document.getElementById('qrFormWeight');
      var active = document.getElementById('qrFormActive');
      var preview = document.getElementById('qrFormPreview');

      if (id) {
        var qr = qrAccounts.find(function(q) { return q.id === id; });
        if (!qr) return;
        title.textContent = 'Sửa tài khoản QR';
        lbl.value = qr.label || '';
        bank.value = qr.bank_code || '';
        accNo.value = qr.account_no || '';
        accName.value = qr.account_name || '';
        content.value = qr.default_content || 'Thanh toan HD {invoice_id}';
        template.value = qr.template || 'compact2';
        weight.value = qr.weight || 1;
        active.checked = qr.active === 1;
      } else {
        title.textContent = 'Thêm tài khoản QR';
        lbl.value = '';
        bank.value = '';
        accNo.value = '';
        accName.value = '';
        content.value = 'Thanh toan HD {invoice_id}';
        template.value = 'compact2';
        weight.value = 1;
        active.checked = true;
      }
      preview.style.display = 'none';
      if (modal) modal.classList.add('show');
      setTimeout(function() { lbl && lbl.focus(); }, 50);
    }

    function closeQRForm() {
      var modal = document.getElementById('qrModal');
      if (modal) modal.classList.remove('show');
      editingQRId = null;
    }

    function previewQRInForm() {
      var bank = (document.getElementById('qrFormBank').value || '').trim();
      var accNo = (document.getElementById('qrFormAccountNo').value || '').trim();
      var accName = (document.getElementById('qrFormAccountName').value || '').trim();
      var template = document.getElementById('qrFormTemplate').value;
      var preview = document.getElementById('qrFormPreview');
      var img = document.getElementById('qrFormPreviewImg');
      if (!bank || !accNo || !accName) {
        preview.style.display = 'none';
        return;
      }
      var url = 'https://img.vietqr.io/image/' + encodeURIComponent(bank.toUpperCase()) + '-' + encodeURIComponent(accNo) + '-' + encodeURIComponent(template) + '.png?amount=100000&addInfo=Preview&accountName=' + encodeURIComponent(accName.toUpperCase());
      img.src = url;
      img.onload = function() { preview.style.display = ''; };
      img.onerror = function() { preview.style.display = 'none'; };
    }

    async function saveQRAccountForm() {
      var btn = document.getElementById('qrFormSave');
      btn.disabled = true;
      var oldText = btn.textContent;
      btn.textContent = 'Đang lưu...';
      try {
        var payload = {
          label: (document.getElementById('qrFormLabel').value || '').trim(),
          bank_code: (document.getElementById('qrFormBank').value || '').trim().toUpperCase(),
          account_no: (document.getElementById('qrFormAccountNo').value || '').trim(),
          account_name: (document.getElementById('qrFormAccountName').value || '').trim().toUpperCase(),
          template: document.getElementById('qrFormTemplate').value,
          default_content: (document.getElementById('qrFormContent').value || '').trim() || 'Thanh toan HD {invoice_id}',
          weight: parseInt(document.getElementById('qrFormWeight').value) || 0,
          active: document.getElementById('qrFormActive').checked ? 1 : 0
        };
        var url = '/api/settings/qr-accounts' + (editingQRId ? '/' + editingQRId : '');
        var res = await fetch(url, {
          method: editingQRId ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        var data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || ('HTTP ' + res.status));
        closeQRForm();
        await loadQRAccounts();
        if (typeof showToast === 'function') showToast('Đã lưu tài khoản QR', 'success');
        if (window.qrSocket) window.qrSocket.emit('request:refetch', { entities: ['qr_accounts'] });
      } catch (e) {
        if (typeof showToast === 'function') showToast('Lỗi: ' + e.message, 'error');
        else alert('Lỗi: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    }

    // Live preview
    document.addEventListener('input', function(e) {
      if (e.target && e.target.closest && e.target.closest('#qrModal')) {
        previewQRInForm();
      }
    });
    document.addEventListener('change', function(e) {
      if (e.target && e.target.closest && e.target.closest('#qrModal')) {
        previewQRInForm();
      }
    });

    // ── Load fallback settings (QR mặc định) ────────────
    async function loadSettings() {
      try {
        var res = await fetch('/api/settings/qr-config', { cache: 'no-store' });
        var data = await res.json();
        if (data) {
          currentSettings = data;
          renderSettings(currentSettings);
        }
      } catch (e) {
        currentSettings = {
          qrAccountNo: '',
          qrAccountName: '',
          qrBankCode: 'ICB',
          qrDefaultContent: 'Thanh toan HD {invoice_id}',
          qrTemplate: 'compact2'
        };
        renderSettings(currentSettings);
      }
    }

    function renderSettings(s) {
      var el;
      el = document.getElementById('qrAccountNo');
      if (el) el.value = s.qrAccountNo || '';
      el = document.getElementById('qrAccountName');
      if (el) el.value = s.qrAccountName || '';
      el = document.getElementById('qrBankCode');
      if (el) el.value = s.qrBankCode || 'ICB';
      el = document.getElementById('qrDefaultContent');
      if (el) el.value = s.qrDefaultContent || 'Thanh toan HD {invoice_id}';
      el = document.getElementById('qrTemplate');
      if (el) el.value = s.qrTemplate || 'compact2';

      previewAccountName();

      hasChanges = false;
      var saveBtn = document.getElementById('saveBtn');
      if (saveBtn) saveBtn.disabled = true;
    }

    function previewAccountName() {
      var accountNo = document.getElementById('qrAccountNo')?.value || '';
      var accountName = document.getElementById('qrAccountName')?.value || '';
      var bankCode = document.getElementById('qrBankCode')?.value || '';
      var preview = document.getElementById('accountPreview');
      var previewName = document.getElementById('previewName');
      var previewBank = document.getElementById('previewBank');

      if (accountName || accountNo) {
        if (preview) preview.style.display = 'flex';
        if (previewName) previewName.textContent = accountName || 'Chưa nhập tên';
        if (previewBank) previewBank.textContent = (bankCode ? bankCode.toUpperCase() + ' - ' : '') + (accountNo || 'Chưa nhập STK');
      } else {
        if (preview) preview.style.display = 'none';
      }
    }

    function onSettingsChanged() {
      hasChanges = true;
      var saveBtn = document.getElementById('saveBtn');
      if (saveBtn) saveBtn.disabled = false;
    }

    async function saveSettings() {
      var btn = document.getElementById('saveBtn');
      var statusEl = document.getElementById('saveStatus');
      if (!btn || !statusEl) return;

      btn.disabled = true;
      btn.innerHTML = '⏳ Đang lưu...';
      statusEl.classList.add('hidden');

      try {
        var payload = {
          qrAccountNo: document.getElementById('qrAccountNo').value.trim(),
          qrAccountName: document.getElementById('qrAccountName').value.trim().toUpperCase(),
          qrBankCode: document.getElementById('qrBankCode').value.trim().toUpperCase(),
          qrDefaultContent: document.getElementById('qrDefaultContent').value.trim(),
          qrTemplate: document.getElementById('qrTemplate').value
        };

        var res = await fetch('/api/settings/qr-config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        var data = await res.json();
        if (data.success) {
          currentSettings = payload;
          hasChanges = false;
          btn.innerHTML = '✓ Đã lưu!';
          btn.style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
          statusEl.classList.remove('hidden');
          statusEl.style.color = 'var(--success)';
          statusEl.textContent = 'Cài đặt QR mặc định đã được lưu thành công!';

          if (window.qrSocket) {
            window.qrSocket.emit('request:refetch', { entities: ['qr_settings'] });
          }

          setTimeout(function() {
            btn.innerHTML = '💾 Lưu cài đặt';
            btn.style.background = '';
            btn.disabled = false;
            statusEl.classList.add('hidden');
          }, 2000);
        } else {
          throw new Error(data.error || 'Lỗi không xác định');
        }
      } catch (e) {
        btn.innerHTML = '💾 Lưu cài đặt';
        btn.disabled = false;
        statusEl.classList.remove('hidden');
        statusEl.style.color = 'var(--danger)';
        statusEl.textContent = 'Lỗi: ' + (e.message || 'Không thể lưu');
        if (typeof showToast === 'function') showToast('Lỗi: ' + (e.message || 'Không thể lưu'), 'error');
      }
    }

    window.addEventListener('beforeunload', function(e) {
      if (hasChanges) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // ── Socket.IO: realtime refresh ─────────────────────
    function initSocket() {
      if (typeof io === 'undefined') return;
      try {
        var socket = io();
        window.qrSocket = socket;

        socket.on('refetch:now', function(data) {
          var entities = data && data.entities;
          if (!entities) return;
          if (entities.indexOf('all') !== -1 ||
              entities.indexOf('qr_settings') !== -1 ||
              entities.indexOf('qr_accounts') !== -1) {
            loadQRAccounts();
            loadSettings();
          }
        });
      } catch (e) {
        // Silent socket init fail
      }
    }
  </script>

  <script>
    (async () => {
      await loadVersion();
      document.getElementById('app').innerHTML =
        getHeader('Cài đặt QR', '&#128179;') +
        getContent(QR_SETTINGS_HTML) +
        getBottomNav('/dashboard');
      await initPage();
      initSocket();
    })();
  </script>
