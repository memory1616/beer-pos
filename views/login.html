<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- NO-FLICKER: Apply theme BEFORE first paint to prevent flash -->
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Đăng nhập - Beer POS</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0B0E11">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <!-- Login page design system -->
  <link rel="stylesheet" href="/css/unified.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo-wrap">
        <div class="login-logo">🍺</div>
        <h1 class="login-title">Beer POS Pro</h1>
        <p class="login-subtitle">Vui lòng đăng nhập để tiếp tục</p>
      </div>

      <!-- Error Message (hidden by default) -->
      <div id="errorMsg" class="login-error" role="alert" aria-live="polite"></div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form" autocomplete="on" novalidate>
        <div class="login-field">
          <label class="login-label" for="username">Tên đăng nhập</label>
          <input
            type="text"
            id="username"
            name="username"
            class="login-input"
            placeholder="Nhập tên đăng nhập"
            autocomplete="username"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            inputmode="text"
          >
        </div>

        <div class="login-field">
          <label class="login-label" for="password">Mật khẩu</label>
          <input
            type="password"
            id="password"
            name="password"
            class="login-input"
            placeholder="Nhập mật khẩu"
            autocomplete="current-password"
            inputmode="text"
          >
        </div>

        <!-- Options row -->
        <div class="login-options">
          <label class="login-remember">
            <input type="checkbox" id="rememberMe">
            <span>Ghi nhớ đăng nhập</span>
          </label>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn" class="login-btn">
          <span>Đăng nhập</span>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        Beer POS Pro &copy; 2026
      </div>
    </div>
  </div>

  <!-- Login logic -->
  <script src="/js/login.js"></script>
</body>
</html>
