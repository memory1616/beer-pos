<!DOCTYPE html>
<html lang="vi">
<head>
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Phân tích</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0B0E11">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="preload" href="/js/layout.js?v=20260410-binance" as="script">
  <link rel="preload" href="/css/unified.css?v=20260414" as="style">
  <link rel="stylesheet" href="/css/unified.css?v=20260414">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js?v=20260410-binance"></script>
  <style>
    .animate-fade { animation: fade 0.3s ease-in; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .chart-container { height: 200px; }
    .page-analytics { padding-bottom: 100px; }
  </style>
</head>
<body class="bg-main text-primary body--app">
  <div id="app"></div>

  <script src="/js/vendor/chart.umd.min.js"></script>
  <script>
    requireAuth();
    (async () => {
      await loadVersion();

      document.getElementById('app').innerHTML =
        getHeader('Phân tích', '📊') +
        getContent(`
          <div class="page-analytics">
            <!-- Stats -->
            <div class="grid grid-cols-2 gap-3 mb-4">
              <div class="kpi-card">
                <div class="kpi-card-label">💰 Hôm nay</div>
                <div class="kpi-card-value gold" id="todayRevenue">—</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-card-label">📈 Lợi nhuận HT</div>
                <div class="kpi-card-value green" id="todayProfit">—</div>
              </div>
              <div class="kpi-card col-span-2">
                <div class="kpi-card-label">🧾 Tháng này</div>
                <div class="kpi-card-value gold" id="monthRevenue">—</div>
              </div>
            </div>

            <!-- Chart -->
            <div class="mb-4">
              <div class="card">
                <div class="section-title">📈 Doanh thu 6 tháng</div>
                <div class="chart-container">
                  <canvas id="revenueChart"></canvas>
                </div>
              </div>
            </div>

            <!-- Top Products -->
            <div class="mb-4">
              <div class="section-title">🏆 Top sản phẩm</div>
              <div class="card">
                <div id="topProductsList">
                  <div class="text-muted text-center py-4">Đang tải...</div>
                </div>
              </div>
            </div>

            <!-- Top Customers -->
            <div class="mb-4">
              <div class="section-title">👑 Top khách hàng</div>
              <div class="card">
                <div id="topCustomersList">
                  <div class="text-muted text-center py-4">Đang tải...</div>
                </div>
              </div>
            </div>
          </div>
        `) +
        getBottomNav('/analytics');

      // Load data after layout rendered
      loadData();
    })();

    function fmtVND(n) {
      return new Intl.NumberFormat('vi-VN').format(n || 0) + ' đ';
    }

    let chartInstance = null;

    async function loadData() {
      try {
        const res = await fetch('/analytics/summary', { headers: { 'Cache-Control': 'no-cache' } });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        document.getElementById('todayRevenue').textContent = fmtVND(data.today?.revenue);
        document.getElementById('todayProfit').textContent = fmtVND(data.today?.profit);
        document.getElementById('monthRevenue').textContent = fmtVND(data.month?.revenue);

        // Top products
        const prodEl = document.getElementById('topProductsList');
        if (data.topProducts && data.topProducts.length > 0) {
          prodEl.innerHTML = data.topProducts.map((p, i) => `
            <div class="top-item">
              <div class="top-item-rank">${i + 1}</div>
              <div class="top-item-info">
                <div class="top-item-name">${p.name}</div>
              </div>
              <div class="top-item-value">
                <div class="green font-semibold">${p.qty} bình</div>
              </div>
            </div>
          `).join('');
        } else {
          prodEl.innerHTML = '<div class="text-muted text-center py-4">Chưa có dữ liệu</div>';
        }

        // Top customers
        const custEl = document.getElementById('topCustomersList');
        if (data.topCustomers && data.topCustomers.length > 0) {
          custEl.innerHTML = data.topCustomers.map((c, i) => `
            <div class="top-item">
              <div class="top-item-rank">${i + 1}</div>
              <div class="top-item-info">
                <div class="top-item-name">${c.name}</div>
              </div>
              <div class="top-item-value">
                <div class="green font-semibold">${fmtVND(c.revenue)}</div>
              </div>
            </div>
          `).join('');
        } else {
          custEl.innerHTML = '<div class="text-muted text-center py-4">Chưa có dữ liệu</div>';
        }

        // Chart
        const monthly = data.monthly || [];
        const ctx = document.getElementById('revenueChart');
        if (!ctx) return;
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: monthly.map(d => d.month),
            datasets: [{
              label: 'Doanh thu',
              data: monthly.map(d => d.revenue),
              backgroundColor: 'rgba(252,213,53,0.8)',
              borderRadius: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
          }
        });

      } catch (err) {
        console.error('[Analytics] loadData error:', err);
      }
    }
  </script>

  <!-- PERFORMANCE: sync.js non-blocking -->
  <script>
    var _ric = window.requestIdleCallback || function(cb) { return setTimeout(cb, 200); };
    _ric(function() {
      var s = document.createElement('script');
      s.src = '/sync.js?v=20260408';
      document.head.appendChild(s);
    }, { timeout: 8000 });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(function (reg) {
        if (!reg) {
          navigator.serviceWorker.register('/sw.js?v=20260422a').catch(function () {});
        }
      });
    }
  </script>
</body>
</html>
