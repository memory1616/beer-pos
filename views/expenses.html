<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chi phí</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  
  <!-- PERFORMANCE: Preload layout.js for first paint -->
  <link rel="preload" href="/js/layout.js?v=20260424-clean" as="script">
  <link rel="preload" href="/css/unified.css?v=20260424-clean" as="style">

  <link rel="stylesheet" href="/css/unified.css?v=20260424-clean">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260424-clean"></script>

  <!-- CLS Prevention: Skeleton styles (matches layout.js header dimensions) -->
  <style>
    .skeleton-header-fixed {
      position: fixed; top: 0; left: 0; right: 0;
      height: calc(56px + env(safe-area-inset-top, 0px));
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; padding-top: env(safe-area-inset-top, 0px);
      z-index: 50; box-sizing: border-box;
    }
    .skeleton-nav-fixed {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(64px + env(safe-area-inset-bottom, 0px));
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      border-top-width: 3px;
      border-top-color: var(--primary);
      display: grid; grid-template-columns: repeat(5, 1fr);
      z-index: 50; padding-bottom: env(safe-area-inset-bottom, 0px);
      box-sizing: border-box;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton-bar {
      height: 16px; width: 80px;
      background: linear-gradient(90deg, var(--card-soft, #f3f4f6) 25%, var(--bg-hover, #e5e7eb) 50%, var(--card-soft, #f3f4f6) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px;
    }
    .skeleton-btn {
      width: 32px; height: 32px;
      background: linear-gradient(90deg, var(--card-soft, #f3f4f6) 25%, var(--bg-hover, #e5e7eb) 50%, var(--card-soft, #f3f4f6) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px;
    }
    .skeleton-shimmer {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 8px;
    }
    .skeleton-shimmer-bar.tall { height: 14px; width: 20px; background: linear-gradient(90deg, var(--card-soft, #f3f4f6) 25%, var(--bg-hover, #e5e7eb) 50%, var(--card-soft, #f3f4f6) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    .skeleton-shimmer-bar.wide { height: 10px; width: 40px; background: linear-gradient(90deg, var(--card-soft, #f3f4f6) 25%, var(--bg-hover, #e5e7eb) 50%, var(--card-soft, #f3f4f6) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    [data-theme="dark"] .skeleton-header-fixed { background: rgba(30, 41, 59, 0.92); }
    [data-theme="dark"] .skeleton-nav-fixed { background: rgba(30, 41, 59, 0.92); }
    [data-theme="dark"] .skeleton-bar, [data-theme="dark"] .skeleton-btn, [data-theme="dark"] .skeleton-shimmer-bar {
      background: linear-gradient(90deg, var(--card) 25%, var(--card-soft) 50%, var(--card) 75%);
      background-size: 200% 100%;
    }
  </style>

  <!-- Load data via /expenses/data API instead of inline script -->
  <style>
    .cat-tab { background: var(--card-soft, var(--card)); color: var(--text-muted); }
    .cat-tab.active { background: var(--green); color: white; }
  </style>
</head>
<body class="bg-bg text-main body--app">

  <!-- CLS Prevention: Skeleton rendered immediately -->
  <div id="skeleton">
    <header class="skeleton-header">
      <div style="display:flex;align-items:center;gap:8px;"><div class="skeleton-bar"></div></div>
      <div style="display:flex;gap:8px;"><div class="skeleton-btn"></div></div>
    </header>
    <nav class="skeleton-nav">
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
    </nav>
  </div>

  <!-- Header rendered via JS from layout.js -->
  <div id="app"></div>

  <!-- Add/Edit Expense Modal -->
  <div id="expenseModal" class="modal-overlay-v2 hidden center" style="z-index:10000">
    <div class="modal-sheet-v2" style="max-width:400px;margin:auto;">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title" id="modalTitle">Thêm chi phí</div>
        <button type="button" onclick="hideExpenseModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <form id="expenseForm" onsubmit="saveExpense(event)">
          <input type="hidden" id="expenseId">
          <div class="space-y-3">
            <div>
              <label class="field-label">Số tiền (đ)</label>
              <input type="text" inputmode="numeric" id="expenseAmount" required autocomplete="off" class="field-input" style="height:48px;font-size:16px;" placeholder="VD: 10.000" oninput="onExpenseAmountInput(this)">
            </div>
            <div>
              <label class="field-label">Danh mục</label>
              <select id="expenseCategory" class="field-input" style="height:48px;font-size:16px;">
                <!-- options rendered dynamically by rebuildExpenseCategorySelect() -->
              </select>
            </div>
            <div>
              <label class="field-label">Ghi chú</label>
              <input type="text" id="expenseNote" class="field-input" style="height:48px;font-size:16px;" placeholder="Mô tả chi phí...">
            </div>
          </div>
          <div class="flex gap-2 mt-4">
            <button type="button" onclick="hideExpenseModal()" class="flex-1 btn btn-ghost" style="height:44px;">Hủy</button>
            <button type="submit" class="flex-1 btn btn-primary" style="height:44px;">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Add Category Modal -->
  <div id="categoryModal" class="modal-overlay-v2 hidden center" style="z-index:10002">
    <div class="modal-sheet-v2" style="max-width:400px;margin:auto;">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title">Thêm loại chi phí</div>
        <button type="button" onclick="hideCategoryModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <form id="categoryForm" onsubmit="saveCategory(event)">
          <div class="mb-4">
            <label class="field-label">Biểu tượng</label>
            <div id="emojiPicker" class="flex flex-wrap gap-1 p-2 rounded-lg max-h-32 overflow-y-auto" style="background:var(--card);border:1px solid var(--border);"></div>
            <input type="hidden" id="categoryIcon" value="📋">
          </div>
          <div class="mb-4">
            <label class="field-label">Tên loại chi phí</label>
            <input type="text" id="categoryName" required class="field-input" style="height:48px;font-size:16px;" placeholder="VD: Xăng xe máy, Điện thoại..." minlength="2">
          </div>
          <div class="flex gap-2 mt-4">
            <button type="button" onclick="hideExpenseModal()" class="flex-1 btn btn-ghost" style="height:44px;">Hủy</button>
            <button type="submit" class="flex-1 btn btn-primary" style="height:44px;">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Load realtime state + expenses JS -->
  <!-- realtime.js auto-loaded by layout.js -->
  <script src="/js/expenses.js?v=20260425-ux"></script>

  <script>
    // Set initial month BEFORE rendering layout (so we can use the value)
    var now = new Date();
    var initialMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

    // Remove skeleton placeholder first
    var skeleton = document.getElementById('skeleton');
    if (skeleton) skeleton.remove();

    // Header actions: total amount display
    var headerActions = '<span id="headerTotal" class="money text-money font-bold tabular-nums" style="font-size:14px;color:var(--color-money);">0đ</span>';

    document.getElementById('app').innerHTML =
      getHeaderWithActions('Chi phí', '💸', headerActions) +
      getContent(`
        <!-- Month/Year filter -->
        <div class="flex items-center gap-2 mb-4">
          <button onclick="switchMonth(-1)" class="btn btn-ghost btn-sm">←</button>
          <input type="month" id="filterMonth" value="${initialMonth}" class="flex-1 border border-muted rounded-lg px-3 py-2 text-sm" onchange="loadExpenses(this.value)">
          <button onclick="switchMonth(1)" class="btn btn-ghost btn-sm">→</button>
          <button onclick="showAddExpense()" class="btn btn-primary btn-sm">+ Thêm</button>
        </div>

        <!-- Category tabs -->
        <div class="flex items-center gap-2 mb-4 overflow-x-auto pb-1">
          <div class="flex gap-2 shrink-0" id="categoryTabs">
            <button onclick="filterCategory('all')" class="cat-tab active px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="all">Tất cả</button>
            <button onclick="filterCategory('fuel')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="fuel" data-icon="⛽">⛽ Xăng</button>
            <button onclick="filterCategory('food')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="food" data-icon="🍜">🍜 Ăn uống</button>
            <button onclick="filterCategory('repair')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="repair" data-icon="🔧">🔧 Sửa chữa</button>
            <button onclick="filterCategory('other')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="other" data-icon="📦">📦 Khác</button>
          </div>
          <button onclick="showAddCategoryModal()" class="btn btn-ghost btn-sm shrink-0 text-primary" title="Thêm loại chi phí">+ Thêm loại</button>
        </div>

        <!-- Summary cards -->
        <div id="summaryCards" class="grid grid-cols-2 gap-2 mb-4"></div>

        <!-- Expenses list -->
        <div id="expensesList" class="space-y-2">
          <div class="text-center text-muted py-8">Đang tải...</div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden text-center py-12">
          <div class="text-4xl mb-3">📋</div>
          <div class="text-muted">Chưa có chi phí nào</div>
        </div>
      `) +
      getBottomNav('/expenses');

    // Initialize after layout is rendered
    loadExpenses(initialMonth);
  </script>
</body>
</html>
