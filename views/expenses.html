<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- NO-FLICKER: Apply theme BEFORE first paint to prevent flash -->
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chi phí</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">

  <!-- PERFORMANCE: Preload layout.js for first paint -->
  <link rel="preload" href="/js/layout.js?v=20260410-binance" as="script">
  <link rel="preload" href="/css/unified.css?v=20260412-app-shell" as="style">

  <link rel="stylesheet" href="/css/unified.css?v=20260412-app-shell">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260410-binance"></script>

  <style>
    /* Page-specific styles */
    .page-expenses {
      padding-bottom: 100px;
    }

    /* Total card */
    .total-card {
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark, #dc2626) 100%);
      border-radius: 16px;
      padding: 20px;
      color: white;
      margin-bottom: 16px;
    }
    .total-card-label {
      font-size: 12px;
      opacity: 0.85;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .total-card-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
    }

    /* Month selector */
    .month-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .month-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-main);
      flex-shrink: 0;
    }
    .month-btn:active {
      transform: scale(0.95);
      background: var(--bg-hover);
    }
    .month-input {
      flex: 1;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--text-main);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      padding: 0 8px;
    }
    .month-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Category chips scroll */
    .cat-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 16px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-chip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      min-width: 72px;
    }
    .cat-chip:active { transform: scale(0.96); }
    .cat-chip.active {
      border-color: var(--red);
      background: var(--red-dim, rgba(239,68,68,0.1));
    }
    .cat-chip-icon { font-size: 20px; }
    .cat-chip-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .cat-chip.active .cat-chip-label { color: var(--red); }
    .cat-chip-amount { font-size: 13px; font-weight: 600; color: var(--text-main); margin-top: 2px; }
    .cat-chip.active .cat-chip-amount { color: var(--red); }

    /* Expense list */
    .expense-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      transition: transform 0.15s;
    }
    .expense-item:active { transform: scale(0.99); }
    .expense-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--bg-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .expense-info { flex: 1; min-width: 0; }
    .expense-cat { font-size: 14px; font-weight: 600; color: var(--text-main); }
    .expense-note { font-size: 12px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .expense-amount {
      font-size: 15px;
      font-weight: 700;
      color: var(--red);
      flex-shrink: 0;
    }
    .expense-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .expense-action-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--bg-hover);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
      color: var(--text-muted);
    }
    .expense-action-btn:active {
      transform: scale(0.9);
    }
    .expense-action-btn.delete:hover { background: var(--red-dim, rgba(239,68,68,0.15)); }

    /* FAB */
    .fab-expense {
      position: fixed;
      bottom: 84px;
      right: 16px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark, #dc2626) 100%);
      color: white;
      border: none;
      font-size: 28px;
      font-weight: 300;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(239,68,68,0.4);
      transition: all 0.2s;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fab-expense:active { transform: scale(0.92); }

    /* Add/Edit Modal */
    .modal-overlay-v2 .modal-sheet-v2 {
      max-height: 85vh;
    }
    .modal-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    .modal-field {
      margin-bottom: 16px;
    }
    .modal-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      height: 48px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text-main);
      font-size: 16px;
      padding: 0 14px;
      box-sizing: border-box;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .modal-input:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }
    .modal-select {
      width: 100%;
      height: 48px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text-main);
      font-size: 14px;
      padding: 0 14px;
      cursor: pointer;
    }
    .modal-select:focus {
      outline: none;
      border-color: var(--red);
    }
    .modal-btn-cancel {
      flex: 1;
      height: 48px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-btn-save {
      flex: 1;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark, #dc2626) 100%);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Category modal */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
      padding: 8px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      max-height: 140px;
      overflow-y: auto;
    }
    .emoji-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .emoji-btn:hover { background: var(--bg-hover); }
    .emoji-btn.selected {
      background: var(--red-dim, rgba(239,68,68,0.15));
      transform: scale(1.1);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; color: var(--text-muted); }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
  </style>
</head>
<body class="bg-main text-primary body--app">

  <!-- CLS Prevention: Skeleton rendered immediately -->
  <div id="skeleton">
    <header class="skeleton-header-fixed">
      <div style="display:flex;align-items:center;gap:8px;"><div class="skeleton-bar"></div></div>
      <div style="display:flex;gap:8px;"><div class="skeleton-btn"></div></div>
    </header>
    <nav class="skeleton-nav-fixed">
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
    </nav>
  </div>

  <!-- Header rendered via JS from layout.js -->
  <div id="app"></div>

  <!-- FAB: Add expense -->
  <button onclick="showAddExpense()" class="fab-expense">+</button>

  <!-- Add/Edit Expense Modal -->
  <div id="expenseModal" class="modal-overlay-v2 hidden center" style="z-index:10000">
    <div class="modal-sheet-v2">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title" id="modalTitle">Thêm chi phí</div>
        <button type="button" onclick="hideExpenseModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <form id="expenseForm" onsubmit="saveExpense(event)">
          <input type="hidden" id="expenseId">

          <div class="modal-section-title">Thông tin</div>

          <div class="modal-field">
            <label class="modal-label">Số tiền</label>
            <input type="text" inputmode="numeric" id="expenseAmount" required autocomplete="off" class="modal-input" placeholder="0" oninput="onExpenseAmountInput(this)">
          </div>

          <div class="modal-field">
            <label class="modal-label">Danh mục</label>
            <select id="expenseCategory" class="modal-select">
              <!-- options rendered dynamically -->
            </select>
          </div>

          <div class="modal-field">
            <label class="modal-label">Ghi chú</label>
            <input type="text" id="expenseNote" class="modal-input" placeholder="Mô tả chi phí...">
          </div>

          <div class="flex gap-3 mt-6">
            <button type="button" onclick="hideExpenseModal()" class="modal-btn-cancel">Hủy</button>
            <button type="submit" class="modal-btn-save">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Add Category Modal -->
  <div id="categoryModal" class="modal-overlay-v2 hidden center" style="z-index:10002">
    <div class="modal-sheet-v2">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title">Thêm loại chi phí</div>
        <button type="button" onclick="hideCategoryModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <form id="categoryForm" onsubmit="saveCategory(event)">
          <div class="modal-field">
            <label class="modal-label">Biểu tượng</label>
            <div id="emojiPicker" class="emoji-grid"></div>
            <input type="hidden" id="categoryIcon" value="📋">
          </div>

          <div class="modal-field">
            <label class="modal-label">Tên loại chi phí</label>
            <input type="text" id="categoryName" required class="modal-input" placeholder="VD: Xăng xe máy" minlength="2" maxlength="30">
          </div>

          <div class="flex gap-3 mt-6">
            <button type="button" onclick="hideCategoryModal()" class="modal-btn-cancel">Hủy</button>
            <button type="submit" class="modal-btn-save">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Load realtime state + expenses JS -->
  <script src="/js/expenses.js?v=20260411-redesign"></script>

  <script>
    // Set initial month BEFORE rendering layout
    var now = new Date();
    var initialMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

    // Remove skeleton placeholder
    var skeleton = document.getElementById('skeleton');
    if (skeleton) skeleton.remove();

    // Header actions: total amount
    var headerActions = '<span id="headerTotal" class="money text-money font-bold tabular-nums" style="font-size:14px;color:var(--red);">0đ</span>';

    document.getElementById('app').innerHTML =
      getHeaderWithActions('Chi phí', '💸', headerActions) +
      getContent(`
        <div class="page-expenses">
          <!-- Total card -->
          <div class="total-card">
            <div class="total-card-label">Tổng chi tháng</div>
            <div class="total-card-value" id="monthTotal">0 đ</div>
          </div>

          <!-- Month selector -->
          <div class="month-selector">
            <button onclick="switchMonth(-1)" class="month-btn">←</button>
            <input type="month" id="filterMonth" value="${initialMonth}" class="month-input" onchange="loadExpenses(this.value)">
            <button onclick="switchMonth(1)" class="month-btn">→</button>
          </div>

          <!-- Category chips (scrollable) -->
          <div class="cat-scroll" id="categoryChips"></div>

          <!-- Expenses list -->
          <div id="expensesList"></div>

          <!-- Empty state -->
          <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">📋</div>
            <div class="empty-text">Chưa có chi phí nào</div>
          </div>
        </div>
      `) +
      getBottomNav('/expenses');

    // Initialize after layout is rendered
    loadExpenses(initialMonth);
  </script>
</body>
</html>
