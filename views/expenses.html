<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chi phí</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js"></script>
  <!-- Load data via /expenses/data API instead of inline script -->
</head>
<body class="bg-bg text-main min-h-screen pb-24">

  <header class="sticky top-0 bg-card/90 backdrop-blur border-b border-muted shadow-sm z-50 pb-safe">
    <div class="flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2">
        <a href="/" class="text-muted">←</a>
        <span class="font-bold text-main">Chi phí</span>
      </div>
      <div>
        <span id="totalAmount" class="money text-money font-bold tabular-nums">0đ</span>
      </div>
    </div>
    <!-- Month/Year filter -->
    <div class="flex items-center gap-2 px-4 pb-3">
      <button onclick="switchMonth(-1)" class="btn btn-ghost btn-sm">←</button>
      <input type="month" id="filterMonth" class="flex-1 border border-muted rounded-lg px-3 py-2 text-sm" onchange="loadExpenses(this.value)">
      <button onclick="switchMonth(1)" class="btn btn-ghost btn-sm">→</button>
      <button onclick="showAddExpense()" class="btn btn-primary btn-sm">+ Thêm</button>
    </div>
  </header>

  <main class="p-4 max-w-md mx-auto pt-14">
    <!-- Category tabs -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
      <button onclick="filterCategory('all')" class="cat-tab active px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="all">Tất cả</button>
      <button onclick="filterCategory('fuel')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="fuel">⛽ Xăng</button>
      <button onclick="filterCategory('food')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="food">🍜 Ăn uống</button>
      <button onclick="filterCategory('repair')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="repair">🔧 Sửa chữa</button>
      <button onclick="filterCategory('other')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="other">📦 Khác</button>
    </div>

    <!-- Summary cards -->
    <div id="summaryCards" class="grid grid-cols-2 gap-2 mb-4">
      <!-- Filled by JS -->
    </div>

    <!-- Expenses list -->
    <div id="expensesList" class="space-y-2">
      <div class="text-center text-muted py-8">Đang tải...</div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-12">
      <div class="text-4xl mb-3">📋</div>
      <div class="text-muted">Chưa có chi phí nào</div>
    </div>
  </main>

  ${getBottomNav('/expenses')}

  <!-- Add/Edit Expense Modal -->
  <div id="expenseModal" class="fixed inset-0 bg-overlay hidden items-center justify-center p-4" style="z-index:10000">
    <div class="card p-6 max-w-sm w-full" style="z-index:10001">
      <h2 id="modalTitle" class="text-xl font-bold mb-4">Thêm chi phí</h2>
      <form id="expenseForm" onsubmit="saveExpense(event)">
        <input type="hidden" id="expenseId">
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-main mb-1">Số tiền (đ)</label>
            <input type="number" id="expenseAmount" required class="w-full border border-muted rounded-lg px-3 py-2" min="0" step="1000" placeholder="0">
          </div>
          <div>
            <label class="block text-sm font-medium text-main mb-1">Danh mục</label>
            <select id="expenseCategory" class="w-full border border-muted rounded-lg px-3 py-2">
              <option value="fuel">⛽ Xăng</option>
              <option value="food">🍜 Ăn uống</option>
              <option value="repair">🔧 Sửa chữa</option>
              <option value="other">📦 Khác</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-main mb-1">Ghi chú</label>
            <input type="text" id="expenseNote" class="w-full border border-muted rounded-lg px-3 py-2" placeholder="Mô tả chi phí...">
          </div>
        </div>
        <div class="flex gap-2 mt-6">
          <button type="button" onclick="hideExpenseModal()" class="flex-1 btn btn-ghost">Hủy</button>
          <button type="submit" class="flex-1 btn btn-primary">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <style>
    .cat-tab { background: var(--bg-secondary, #1f2937); color: var(--text-muted, #9ca3af); }
    .cat-tab.active { background: var(--accent, #10b981); color: white; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .bottomnav { max-width: 500px; margin: auto; }
  </style>

  <!-- Load expenses JS -->
  <script src="/js/expenses.js"></script>

  <!-- Initialize on load: fetch data from API -->
  <script>
    (function() {
      var monthInput = document.getElementById('filterMonth');
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, '0');
      monthInput.value = y + '-' + m;
      loadExpenses(monthInput.value);
    })();
  </script>
</body>
</html>
