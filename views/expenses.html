<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- NO-FLICKER: Apply theme BEFORE first paint to prevent flash -->
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chi phí</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  
  <!-- PERFORMANCE: Preload layout.js for first paint -->
  <link rel="preload" href="/js/layout.js?v=20260410-binance" as="script">
  <link rel="preload" href="/css/unified.css?v=20260412-app-shell" as="style">

  <link rel="stylesheet" href="/css/unified.css?v=20260412-app-shell">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260410-binance"></script>

  <style>
    .cat-tab { background: var(--card-soft, var(--card)); color: var(--text-muted); }
    .cat-tab.active { background: var(--green); color: white; }
  </style>
</head>
<body class="bg-bg text-main body--app">

  <!-- CLS Prevention: Skeleton rendered immediately -->
  <div id="skeleton">
    <header class="skeleton-header-fixed">
      <div style="display:flex;align-items:center;gap:8px;"><div class="skeleton-bar"></div></div>
      <div style="display:flex;gap:8px;"><div class="skeleton-btn"></div></div>
    </header>
    <nav class="skeleton-nav-fixed">
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
      <div class="skeleton-shimmer"><div class="skeleton-shimmer-bar tall"></div><div class="skeleton-shimmer-bar wide"></div></div>
    </nav>
  </div>

  <!-- Header rendered via JS from layout.js -->
  <div id="app"></div>

  <!-- Add/Edit Expense Modal -->
  <div id="expenseModal" class="modal-overlay-v2 hidden center" style="z-index:10000">
    <div class="modal-sheet-v2">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title" id="modalTitle">Thêm chi phí</div>
        <button type="button" onclick="hideExpenseModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <form id="expenseForm" onsubmit="saveExpense(event)">
          <input type="hidden" id="expenseId">
          <div class="space-y-3">
            <div>
              <label class="field-label">Số tiền (đ)</label>
              <input type="text" inputmode="numeric" id="expenseAmount" required autocomplete="off" class="bn-input bn-input--lg" placeholder="VD: 10.000" oninput="onExpenseAmountInput(this)">
            </div>
            <div>
              <label class="field-label">Danh mục</label>
              <select id="expenseCategory" class="bn-select bn-input--lg">
                <!-- options rendered dynamically by rebuildExpenseCategorySelect() -->
              </select>
            </div>
            <div>
              <label class="field-label">Ghi chú</label>
              <input type="text" id="expenseNote" class="bn-input bn-input--lg" placeholder="Mô tả chi phí...">
            </div>
          </div>
          <div class="flex gap-2 mt-4">
            <button type="button" onclick="hideExpenseModal()" class="btn btn-ghost flex-1">Hủy</button>
            <button type="submit" class="btn btn-primary flex-1">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Add Category Modal -->
  <div id="categoryModal" class="modal-overlay-v2 hidden center" style="z-index:10002">
    <div class="modal-sheet-v2">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title">Thêm loại chi phí</div>
        <button type="button" onclick="hideCategoryModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <form id="categoryForm" onsubmit="saveCategory(event)">
          <div class="mb-4">
            <label class="field-label">Biểu tượng</label>
            <div id="emojiPicker" class="flex flex-wrap gap-1 p-2 rounded-lg max-h-32 overflow-y-auto bg-card border border-muted"></div>
            <input type="hidden" id="categoryIcon" value="📋">
          </div>
          <div class="mb-4">
            <label class="field-label">Tên loại chi phí</label>
            <input type="text" id="categoryName" required class="bn-input bn-input--lg" placeholder="VD: Xăng xe máy, Điện thoại..." minlength="2">
          </div>
          <div class="flex gap-2 mt-4">
            <button type="button" onclick="hideExpenseModal()" class="btn btn-ghost flex-1">Hủy</button>
            <button type="submit" class="btn btn-primary flex-1">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Load realtime state + expenses JS -->
  <!-- realtime.js auto-loaded by layout.js -->
  <script src="/js/expenses.js?v=20260410-binance"></script>

  <script>
    // Set initial month BEFORE rendering layout (so we can use the value)
    var now = new Date();
    var initialMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

    // Remove skeleton placeholder first
    var skeleton = document.getElementById('skeleton');
    if (skeleton) skeleton.remove();

    // Header actions: total amount display
    var headerActions = '<span id="headerTotal" class="money text-money font-bold tabular-nums" style="font-size:14px;color:var(--color-money);">0đ</span>';

    document.getElementById('app').innerHTML =
      getHeaderWithActions('Chi phí', '💸', headerActions) +
      getContent(`
        <!-- Month/Year filter -->
        <div class="flex items-center gap-2 mb-4">
          <button onclick="switchMonth(-1)" class="btn btn-ghost btn-sm">←</button>
          <input type="month" id="filterMonth" value="${initialMonth}" class="flex-1 border border-muted rounded-lg px-3 py-2 text-sm" onchange="loadExpenses(this.value)">
          <button onclick="switchMonth(1)" class="btn btn-ghost btn-sm">→</button>
          <button onclick="showAddExpense()" class="btn btn-primary btn-sm">+ Thêm</button>
        </div>

        <!-- Category tabs -->
        <div class="flex items-center gap-2 mb-4 overflow-x-auto pb-1">
          <div class="flex gap-2 shrink-0" id="categoryTabs">
            <button onclick="filterCategory('all')" class="cat-tab active px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="all">Tất cả</button>
            <button onclick="filterCategory('fuel')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="fuel" data-icon="⛽">⛽ Xăng</button>
            <button onclick="filterCategory('food')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="food" data-icon="🍜">🍜 Ăn uống</button>
            <button onclick="filterCategory('repair')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="repair" data-icon="🔧">🔧 Sửa chữa</button>
            <button onclick="filterCategory('other')" class="cat-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-cat="other" data-icon="📦">📦 Khác</button>
          </div>
          <button onclick="showAddCategoryModal()" class="btn btn-ghost btn-sm shrink-0 text-primary" title="Thêm loại chi phí">+ Thêm loại</button>
        </div>

        <!-- Summary cards -->
        <div id="summaryCards" class="grid grid-cols-2 gap-2 mb-4"></div>

        <!-- Expenses list -->
        <div id="expensesList" class="space-y-2">
          <div class="text-center text-muted py-8">Đang tải...</div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden text-center py-12">
          <div class="text-4xl mb-3">📋</div>
          <div class="text-muted">Chưa có chi phí nào</div>
        </div>
      `) +
      getBottomNav('/expenses');

    // Initialize after layout is rendered
    loadExpenses(initialMonth);
  </script>
</body>
</html>
