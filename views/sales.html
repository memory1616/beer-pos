<!DOCTYPE html>
<html lang="vi">
<head>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bán hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css">
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260402"></script>
  <script>requireAuth();</script>
  <style>
    .animate-fade { animation: fade 0.3s ease-in; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    canvas { width: 100% !important; height: auto !important; }
    .skeleton { background: linear-gradient(90deg, var(--color-bg-hover) 25%, var(--color-card-hover) 50%, var(--color-bg-hover) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    button, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .card { transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s; }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .card.active { border: 2px solid var(--color-primary) !important; background: rgba(245,158,11,0.05) !important; }
    #sellBtn.active { animation: pulse 0.4s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body class="bg-main text-primary min-h-screen pb-20">
  <div id="app"></div>

  <!-- Invoice Modal - Full screen -->
  <div id="invoiceModal" class="fixed inset-0 bg-overlay hidden items-center justify-center z-50">
    <div class="card w-full h-full relative overflow-y-auto flex flex-col" style="max-width: 100vw !important; border-radius: 0 !important; padding: 24px; box-shadow: none; border: none;">
      <button onclick="closeInvoice()" class="absolute top-4 right-4 text-muted hover:text-main text-2xl font-bold w-8 h-8 flex items-center justify-center rounded-full hover:bg-bg-hover z-10">&times;</button>
      <div class="text-center mb-3">
        <div class="text-xl font-bold text-main">HÓA ĐƠN</div>
        <div id="invoiceTotal" class="money text-money mt-2" style="font-size: 36px; font-weight: 700;">0 <span class="unit">đ</span></div>
      </div>
      <div id="invoiceContent" class="text-sm invoice-pos-content flex-1 overflow-y-auto px-2"></div>
      <div class="mt-4 pt-4 border-t border-muted text-center flex-shrink-0">
        <p class="text-sm font-medium text-main mb-2">Phương thức thanh toán</p>
        <img id="qrCode" src="" class="w-48 mx-auto" alt="QR Code">
        <p class="text-xs text-muted mt-2">Quét QR thanh toán</p>
      </div>
    </div>
  </div>
  <style>
    .invoice-pos-content .invoice-item { padding: 10px 0; border-bottom: 1px solid var(--color-border); }
    .invoice-pos-content .invoice-item .invoice-name { font-weight: 600; color: var(--color-text); }
    .invoice-pos-content .invoice-item .invoice-row { display: flex; justify-content: space-between; align-items: baseline; color: var(--color-text-secondary); font-size: 0.875rem; margin-top: 2px; }
    .invoice-pos-content .invoice-item .invoice-total { font-weight: 600; color: var(--color-text); }
  </style>

  <!-- Keg Modal -->
  <div id="kegModal" class="fixed inset-0 bg-overlay hidden items-center justify-center z-50 p-4">
    <div class="card w-full max-w-md p-6 relative shadow-xl">
      <button onclick="closeKegModal()" class="absolute top-4 right-4 text-muted hover:text-main text-2xl font-bold w-8 h-8 flex items-center justify-center rounded-full hover:bg-bg-hover">&times;</button>
      <div class="text-center mb-4">
        <div class="text-xl font-bold text-main">📦 Cập nhật vỏ bình</div>
      </div>

      <div class="card p-4 mb-4 border-warning">
        <div class="text-center">
          <div class="text-xs font-semibold text-warning mb-1">Bia đã bán</div>
          <div class="text-3xl font-bold text-primary" id="kegBeerQuantity">0</div>
        </div>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-main mb-2">📦 Giao vỏ</label>
          <div class="flex gap-2 items-center">
            <button onclick="addKegDeliver(10)" class="btn btn-sm btn-secondary">+10</button>
            <button onclick="addKegDeliver(20)" class="btn btn-sm btn-secondary">+20</button>
            <input type="number" id="kegDeliver" value="0" class="flex-1 min-w-0 border-2 border-primary rounded-xl px-3 py-3 text-center text-lg font-bold focus:border-primary focus:outline-none" inputmode="numeric"
              oninput="updateKegModalPreview()" onchange="updateKegModalPreview()">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-main mb-2">🔄 Thu vỏ</label>
          <div class="flex gap-2 items-center">
            <button onclick="addKegReturn(10)" class="btn btn-sm btn-warning">+10</button>
            <button onclick="addKegReturn(20)" class="btn btn-sm btn-warning">+20</button>
            <button onclick="returnAllKegs()" class="btn btn-sm btn-danger">Hết</button>
            <input type="number" id="kegReturn" value="0" class="flex-1 min-w-0 border-2 border-primary rounded-xl px-3 py-3 text-center text-lg font-bold focus:border-primary focus:outline-none" inputmode="numeric"
              oninput="updateKegModalPreview()" onchange="updateKegModalPreview()">
          </div>
        </div>

        <div class="card p-4">
          <div class="flex justify-between mb-2">
            <span class="text-muted">Vỏ hiện tại:</span>
            <span class="font-bold text-main" id="kegCurrentBalance">0</span>
          </div>
          <div class="flex justify-between">
            <span class="text-muted">Sau khi giao/thu:</span>
            <span class="font-bold text-success" id="kegNewBalance">0</span>
          </div>
        </div>

        <div id="kegModalWarning" class="hidden card p-3 border-danger text-center text-sm">
          ⚠️ Số vỏ thu lớn hơn số vỏ khách đang giữ
        </div>
      </div>

      <button onclick="saveKegUpdate()" id="kegSaveBtn" class="btn btn-primary w-full h-14 mt-4">
        💾 Lưu
      </button>
    </div>
  </div>

  <!-- Collect Keg Modal -->
  <div id="collectKegModal" class="fixed inset-0 bg-overlay hidden items-center justify-center z-50 p-4">
    <div class="card w-full max-w-sm p-6 shadow-xl">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-lg text-warning">Thu vỏ</h3>
        <button onclick="closeCollectKegModal()" class="text-2xl text-muted hover:text-main w-8 h-8 flex items-center justify-center rounded-full hover:bg-bg-hover">&times;</button>
      </div>

      <div id="collectKegInfo" class="card p-3 mb-4 text-center text-sm text-warning border-warning"></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-main mb-2">Số vỏ thu về</label>
        <input type="number" id="collectKegQty"
          class="w-full border-2 border-primary rounded-xl px-4 py-3 text-center text-2xl font-bold focus:border-primary focus:outline-none"
          min="0" inputmode="numeric"
          oninput="updateCollectKegPreview()" onchange="updateCollectKegPreview()">
        <div class="text-xs text-muted mt-1 text-center">Nhập số vỏ thu về (tối đa = số vỏ còn lại)</div>
      </div>

      <div class="flex gap-3">
        <button onclick="closeCollectKegModal()" class="btn btn-ghost flex-1 h-14">Huỷ</button>
        <button onclick="submitCollectKeg()" class="btn btn-warning flex-1 h-14">Xác nhận</button>
      </div>
    </div>
  </div>

  <!-- Đổi bia lỗi Modal -->
  <div id="replacementModal" class="fixed inset-0 bg-overlay hidden items-center justify-center z-50 p-4">
    <div class="card w-full max-w-md min-w-0 p-6 relative shadow-xl">
      <button onclick="closeReplacementModal()" class="absolute top-4 right-4 text-muted hover:text-main text-2xl font-bold w-8 h-8 flex items-center justify-center rounded-full hover:bg-bg-hover">&times;</button>
      <div class="text-xl font-bold text-main mb-4">🔄 Đổi bia lỗi</div>
      <div class="space-y-4">
        <div id="giftGuestRow" class="hidden">
          <label class="block text-xs font-semibold text-warning mb-2">👤 Tên khách tặng</label>
          <input type="text" id="giftGuestName" placeholder="Nhập tên khách (không bắt buộc)" class="w-full border-2 border-primary rounded-xl px-4 py-3 focus:border-primary focus:outline-none">
        </div>
        <div id="replacementCustomerRow">
          <label class="block text-xs font-semibold text-warning mb-2">👤 Khách hàng</label>
          <select id="replacementCustomer" onchange="loadReplacementProducts()" class="w-full border-2 border-primary rounded-xl px-4 py-3 focus:border-primary focus:outline-none">
            <option value="">-- Chọn khách hàng --</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-warning mb-2">📦 Sản phẩm</label>
          <select id="replacementProduct" class="w-full border-2 border-primary rounded-xl px-4 py-3 focus:border-primary focus:outline-none">
            <option value="">-- Chọn sản phẩm --</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-warning mb-2">Số lượng</label>
          <input type="number" id="replacementQty" value="1" min="1" class="w-full border-2 border-primary rounded-xl px-4 py-3 text-center text-xl font-bold focus:border-primary focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-warning mb-2">Lý do</label>
          <select id="replacementReason" class="w-full border-2 border-primary rounded-xl px-4 py-3 focus:border-primary focus:outline-none">
            <option value="Bia hư">Bia hư</option>
            <option value="Bia chua">Bia chua</option>
            <option value="Bia hết hạn">Bia hết hạn</option>
            <option value="Khác">Khác</option>
          </select>
        </div>
        <div class="card p-3 border-warning">
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" id="giftKegs" onchange="toggleGiftMode()" class="w-5 h-5 mt-0.5 accent-warning self-start">
            <span class="text-sm font-semibold text-main leading-snug break-words">
              🎁 Tặng uống thử (khách mới — vỏ keg vào kho vỏ rỗng ngay)
            </span>
          </label>
        </div>
      </div>
      <button type="button" onclick="submitReplacement()" class="btn btn-warning w-full h-14 mt-4">Xác nhận đổi</button>
    </div>
  </div>

  <!-- Load Sales JS -->
  <script src="/js/utils.js"></script>
  <script src="/js/sales.js?v=20260404"></script>

  <script>
    async function loadData() {
      try {
        const res = await fetch('/sale/data');
        const data = await res.json();

        try {
          initSalesPage(data);
        } catch (e) {
          console.error('Init error:', e);
        }

        const loading = document.getElementById('loading');
        const contentSection = document.getElementById('contentSection');
        if (loading) loading.classList.add('hidden');
        if (contentSection) contentSection.classList.remove('hidden');

      } catch (err) {
        console.error('Failed to load data:', err);
        const loading = document.getElementById('loading');
        if (loading) loading.innerHTML = '<div class="text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    async function bootSalePage() {
      await loadVersion();
      document.getElementById('app').innerHTML =
        getHeader('Bán hàng', '🍺') +
        getContent(`
        <div id="loading" class="text-center py-8">
          <div class="spinner mx-auto"></div>
          <div class="text-muted mt-2">Đang tải...</div>
        </div>

        <div id="contentSection" class="hidden">
          <div class="card mb-4">
            <label class="block text-xs font-semibold text-warning mb-2">👤 Chọn khách hàng (không bắt buộc)</label>
            <select id="customerSelect" onchange="updatePrices()" class="w-full border-2 border-primary rounded-xl px-4 py-3 text-lg focus:border-primary focus:ring-2 focus:ring-primary text-main">
              <option value="">📋 Khách lẻ (giá thường)</option>
            </select>
          </div>

          <div class="card mb-4">
            <h3 class="font-bold text-base text-main mb-3">📦 Sản phẩm</h3>
            <div id="saleProducts" class="space-y-3 mb-3">
            </div>
            <div class="border-t-2 border-primary pt-3 mt-3">
              <div class="flex justify-between items-center mb-3">
                <span class="font-bold text-main">Tổng tiền:</span>
                <span id="totalAmount" class="money text-money text-2xl">0 <span class="unit">đ</span></span>
              </div>
              <div id="saleCartPreview" class="mb-3 px-3 py-2 min-h-[3.5rem] flex flex-col justify-center text-main" aria-live="polite">
              </div>
              <button type="button" onclick="submitSale()" id="sellBtn" class="btn btn-primary w-full h-14 mb-2" disabled>
                <span class="mr-2">✔</span> Bán hàng
              </button>
              <button type="button" onclick="openReplacementModal()" class="btn btn-ghost w-full h-14 mb-2 text-danger border-danger hover:bg-danger/10">
                <span class="mr-2">🔄</span> Đổi bia lỗi
              </button>
              <button type="button" onclick="updateSale()" id="updateBtn" class="btn btn-warning w-full h-14 hidden">
                <span class="mr-2">💾</span> Cập nhật
              </button>
              <button type="button" onclick="cancelEdit()" id="cancelEditBtn" class="btn btn-ghost w-full h-14 hidden">
                Huỷ
              </button>
            </div>
          </div>

          <div class="card mb-4">
            <h3 class="font-bold text-base text-main mb-3">📋 Lịch sử bán hàng</h3>
            <div id="salesHistoryList">
            </div>
          </div>
        </div>
        `) +
        getBottomNav('/sale');
      await loadData();
    }
    bootSalePage();
  </script>

  <script src="/js/vendor/dexie.min.js"></script>
  <script src="/db.js"></script>
  <script src="/js/debug.js"></script>
  <script>
  if (!isLoggedIn()) { window.location.href = '/login'; }
  if ('serviceWorker' in navigator) {
    if (!navigator.serviceWorker.controller) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log('[SW] Registration failed:', err));
    }
  }
  </script>
  <script src="/sync.js"></script>
</body>
</html>
