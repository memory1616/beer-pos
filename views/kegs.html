<!DOCTYPE html>
<html lang="vi">
<head>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Quản lý vỏ - Bia Tươi Gia Huy</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#059669">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/unified.css?v=20260424-clean">
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260424-clean"></script>
  <script src="/js/utils.js"></script>
  <script>requireAuth();</script>
  <style>
    .animate-fade { animation: fade 0.3s ease-in; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    button, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    button:active { transform: scale(0.96); }
    .action-btn { transition: all 0.2s; }
    .action-btn:active { transform: scale(0.95); }
    .badge-deliver { background: var(--green-dim); color: var(--green); }
    .badge-collect { background: rgba(37,99,235,0.15); color: var(--info); }
    .badge-import { background: rgba(139,92,246,0.15); color: #7c3aed; }
    .badge-adjust { background: var(--primary-dim); color: var(--primary-hover); }
    .badge-sell_empty { background: rgba(236,72,153,0.15); color: #db2777; }
    .delta-up { color: var(--green); }
    .delta-down { color: var(--red); }
    .delta-neutral { color: var(--text-secondary); }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-main text-primary body--app">
  <div id="app"></div>

  <!-- ========== MODALS ========== -->
  <div id="deliverModal" class="fixed inset-0 bg-overlay z-50 hidden items-center justify-center p-4">
    <div class="bg-card rounded-xl w-full max-w-sm">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title">📦 Giao vỏ cho khách</div>
        <button onclick="closeModal('deliverModal')" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <div class="card mb-3" style="background:var(--green-dim);border-color:var(--green);">
          <div class="text-xs mb-1" style="color:var(--text-muted);">Vỏ sẵn có:</div>
          <div class="font-bold green" id="deliverAvailQty">-</div>
        </div>
        <div>
          <label class="field-label">Khách hàng</label>
          <select id="deliverCustomer" class="field-input" style="height:48px;font-size:16px;">
            <option value="">-- Chọn khách hàng --</option>
          </select>
        </div>
        <div>
          <label class="field-label">Số lượng vỏ</label>
          <div class="flex items-center gap-2">
            <input type="number" id="deliverQty" min="1" value="1" class="field-input" style="height:48px;font-size:20px;font-weight:600;text-align:center;border-color:var(--green);">
            <div class="flex gap-1">
              <button onclick="adjustQty('deliverQty', -1)" class="btn btn-ghost" style="width:40px;height:48px;font-size:18px;padding:0;">−</button>
              <button onclick="adjustQty('deliverQty', 1)" class="btn btn-ghost" style="width:40px;height:48px;font-size:18px;padding:0;">+</button>
            </div>
          </div>
        </div>
        <div>
          <label class="field-label">Ghi chú</label>
          <input type="text" id="deliverNote" class="field-input" style="height:44px;font-size:15px;" placeholder="VD: Theo đơn hàng">
        </div>
        <button onclick="submitDeliver()" class="btn" style="width:100%;height:48px;background:var(--green);color:#fff;font-weight:600;border-radius:var(--radius-md);">Xác nhận giao</button>
      </div>
    </div>
  </div>

  <div id="collectModal" class="modal-overlay-v2 hidden center">
    <div class="bg-card rounded-xl w-full max-w-sm animate-fade">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title" style="color:var(--info);">🔄 Thu vỏ rỗng</div>
        <button onclick="closeModal('collectModal')" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <div class="card mb-3" style="background:rgba(59,130,246,0.12);border-color:var(--info);">
          <div class="text-xs mb-1" style="color:var(--text-muted);">Vỏ khách đang giữ:</div>
          <div class="font-bold" style="color:var(--info);" id="collectAvailQty">-</div>
        </div>
        <div>
          <label class="field-label">Khách hàng</label>
          <select id="collectCustomer" class="field-input" style="height:48px;font-size:16px;" onchange="updateCollectAvail()">
            <option value="">-- Chọn khách hàng --</option>
          </select>
        </div>
        <div>
          <label class="field-label">Số lượng vỏ</label>
          <div class="flex items-center gap-2">
            <input type="number" id="collectQty" min="1" value="1" class="field-input" style="height:48px;font-size:20px;font-weight:600;text-align:center;border-color:var(--info);">
            <div class="flex gap-1">
              <button onclick="adjustQty('collectQty', -1)" class="btn btn-ghost" style="width:40px;height:48px;font-size:18px;padding:0;">−</button>
              <button onclick="adjustQty('collectQty', 1)" class="btn btn-ghost" style="width:40px;height:48px;font-size:18px;padding:0;">+</button>
            </div>
          </div>
        </div>
        <div>
          <label class="field-label">Ghi chú</label>
          <input type="text" id="collectNote" class="field-input" style="height:44px;font-size:15px;" placeholder="VD: Thu vỏ từ khách">
        </div>
        <button onclick="submitCollect()" class="btn" style="width:100%;height:48px;background:var(--info);color:#fff;font-weight:600;border-radius:var(--radius-md);">Xác nhận thu</button>
      </div>
    </div>
  </div>

  <div id="importModal" class="modal-overlay-v2 hidden center">
    <div class="bg-card rounded-xl w-full max-w-sm animate-fade">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title">🏭 Nhập vỏ từ nhà máy</div>
        <button onclick="closeModal('importModal')" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <div class="card mb-3 text-center" style="background:var(--primary-dim);border-color:var(--primary);">
          <span class="text-muted text-xs">Vỏ rỗng hiện có: </span>
          <span class="font-bold" style="color:var(--primary-hover);" id="importAvailEmpty">-</span>
        </div>
        <div>
          <label class="field-label">Đổi vỏ (trả rỗng → lấy đầy)</label>
          <input type="number" id="importExchanged" min="0" value="0" class="field-input" style="height:48px;font-size:18px;font-weight:600;text-align:center;" oninput="updateImportTotal()">
        </div>
        <div>
          <label class="field-label">Mua vỏ mới</label>
          <input type="number" id="importPurchased" min="0" value="0" class="field-input" style="height:48px;font-size:18px;font-weight:600;text-align:center;" oninput="updateImportTotal()">
        </div>
        <div class="card text-center" style="background:var(--primary-dim);border-color:var(--primary);">
          <span class="text-muted text-xs">Tổng nhập: </span>
          <span class="font-bold" style="color:var(--primary-hover);" id="importTotalDisplay">0 vỏ</span>
        </div>
        <div>
          <label class="field-label">Ghi chú</label>
          <input type="text" id="importNote" class="field-input" style="height:44px;font-size:15px;" placeholder="VD: Nhập từ Bia Sài Gòn">
        </div>
        <button onclick="submitImport()" class="btn btn-secondary" style="width:100%;height:48px;font-weight:600;border-radius:var(--radius-md);">Xác nhận nhập</button>
      </div>
    </div>
  </div>

  <div id="adjustModal" class="modal-overlay-v2 hidden center">
    <div class="bg-card rounded-xl w-full max-w-sm animate-fade">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title" style="color:var(--primary-hover);">⚙️ Điều chỉnh vỏ rỗng</div>
        <button onclick="closeModal('adjustModal')" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <div class="card mb-3" style="background:var(--primary-dim);border-color:var(--primary);">
          <div class="flex justify-between mb-1">
            <span class="text-muted text-sm">Vỏ rỗng hiện tại:</span>
            <span class="font-bold" style="color:var(--primary-hover);" id="currentEmptyDisplay">-</span>
          </div>
          <div class="text-xs" style="color:var(--text-muted);">Dùng khi thực tế khác sổ sách</div>
        </div>
        <div>
          <label class="field-label">Số lượng vỏ rỗng mới</label>
          <input type="number" id="adjustQty" min="0" value="0" class="field-input" style="height:48px;font-size:20px;font-weight:600;text-align:center;">
        </div>
        <div>
          <label class="field-label">Ghi chú</label>
          <input type="text" id="adjustNote" class="field-input" style="height:44px;font-size:15px;" placeholder="VD: Kiểm kê kho vỏ">
        </div>
        <button onclick="submitAdjust()" class="btn" style="width:100%;height:48px;background:var(--primary);color:var(--bg);font-weight:600;border-radius:var(--radius-md);">Cập nhật</button>
      </div>
    </div>
  </div>

  <div id="historyModal" class="modal-overlay-v2 hidden center" style="padding:8px;">
    <div class="modal-sheet-v2" style="max-width:480px;margin:auto;max-height:92vh;">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title">📋 Lịch sử giao dịch vỏ</div>
        <button onclick="closeModal('historyModal')" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="px-3 pt-2 flex-shrink-0">
        <div class="flex gap-2 overflow-x-auto pb-2">
          <button onclick="setHistoryFilter('all')" id="filterAll" class="px-3 py-1 rounded-full text-xs font-semibold bg-success/20 text-success whitespace-nowrap">Tất cả</button>
          <button onclick="setHistoryFilter('deliver')" id="filterDeliver" class="px-3 py-1 rounded-full text-xs font-semibold bg-bg text-muted whitespace-nowrap">📦 Giao</button>
          <button onclick="setHistoryFilter('collect')" id="filterCollect" class="px-3 py-1 rounded-full text-xs font-semibold bg-bg text-muted whitespace-nowrap">🔄 Thu</button>
          <button onclick="setHistoryFilter('import')" id="filterImport" class="px-3 py-1 rounded-full text-xs font-semibold bg-bg text-muted whitespace-nowrap">🏭 Nhập</button>
          <button onclick="setHistoryFilter('adjust')" id="filterAdjust" class="px-3 py-1 rounded-full text-xs font-semibold bg-bg text-muted whitespace-nowrap">⚙️ Điều chỉnh</button>
        </div>
        <div class="flex gap-2 mb-2">
          <select id="historyCustomerFilter" class="flex-1 border border-muted rounded-lg px-2 py-1 text-xs" onchange="loadHistory()">
            <option value="">-- Tất cả khách --</option>
          </select>
          <select id="historyPageSize" class="border border-muted rounded-lg px-2 py-1 text-xs" onchange="loadHistory()">
            <option value="20">20 dòng</option>
            <option value="50" selected>50 dòng</option>
            <option value="100">100 dòng</option>
          </select>
        </div>
      </div>
      <div class="px-3 pb-2 flex-shrink-0">
        <div class="grid grid-cols-4 gap-2 text-center">
          <div class="card stat-card--success p-2">
            <div class="text-xs text-muted mb-0.5">Đã giao</div>
            <div class="text-sm font-bold text-success" id="summaryDelivered">-</div>
          </div>
          <div class="card stat-card--info p-2">
            <div class="text-xs text-muted mb-0.5">Đã thu</div>
            <div class="text-sm font-bold text-info" id="summaryCollected">-</div>
          </div>
          <div class="card stat-card--emerald p-2">
            <div class="text-xs text-muted mb-0.5">Đã nhập</div>
            <div class="text-sm font-bold text-success" id="summaryImported">-</div>
          </div>
          <div class="card stat-card--warning p-2">
            <div class="text-xs text-muted mb-0.5">Điều chỉnh</div>
            <div class="text-sm font-bold text-warning" id="summaryAdjusted">-</div>
          </div>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto px-3 pb-3" id="historyListContainer">
        <div id="historyList"></div>
        <div class="flex justify-between items-center mt-3 pt-2 border-t border-muted" id="historyPagination">
          <button onclick="changeHistoryPage(-1)" id="historyPrevBtn" class="btn btn-secondary px-3 h-9 text-xs" disabled>← Trước</button>
          <span class="text-xs text-muted" id="historyPageInfo">Trang 1/1</span>
          <button onclick="changeHistoryPage(1)" id="historyNextBtn" class="btn btn-secondary px-3 h-9 text-xs" disabled>Sau →</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== STATE ==========
    var kegState = {};
    var customers = [];
    var historyFilter = 'all';
    var historyPage = 1;
    var historyTotalPages = 1;

    // ========== LOADING ==========
    async function loadState() {
      try {
        var res = await fetch('/api/kegs/state');
        kegState = await res.json();
        renderStats();
      } catch (e) {
        showToast('Lỗi tải trạng thái vỏ', 'error');
      }
    }

    async function loadCustomers() {
      try {
        var res = await fetch('/api/customers');
        customers = await res.json();
        populateCustomerSelects();
      } catch (e) {
        console.error('Load customers error:', e);
      }
    }

    async function syncKegs() {
      try {
        var res = await fetch('/api/kegs/sync');
        var data = await res.json();
        if (data.success) {
          kegState = data.after;
          renderStats();
          showToast('Đã đồng bộ dữ liệu vỏ!', 'success');
        }
      } catch (e) {
        showToast('Lỗi đồng bộ', 'error');
      }
    }

    async function loadRecentLog() {
      try {
        var res = await fetch('/api/kegs/history?limit=20');
        var json = await res.json();
        renderLog(json.data || []);
      } catch (e) {
        console.error('Load log error:', e);
      }
    }

    // ========== RENDER ==========
    function renderStats() {
      var inv = kegState.inventory || 0;
      var empty = kegState.emptyCollected || 0;
      var hold = kegState.customerHolding || 0;
      var balance = inv + empty - hold;
      var set = function(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };
      set('statInventory', inv);
      set('statEmpty', empty);
      set('statHolding', hold);
      set('statBalance', balance);
      set('currentEmptyDisplay', empty + ' vỏ');
      set('deliverAvailQty', inv + ' vỏ');
      set('collectAvailQty', 'Chọn khách');
      set('importAvailEmpty', empty + ' vỏ');
      var warn = document.getElementById('balanceWarning');
      if (warn) {
        if (inv <= 5) {
          warn.classList.remove('hidden');
          var wmsg = document.getElementById('balanceWarningMsg');
          if (wmsg) wmsg.textContent = 'Chỉ còn ' + inv + ' vỏ! Cần nhập thêm từ nhà máy.';
        } else {
          warn.classList.add('hidden');
        }
      }
      var note = document.getElementById('statBalanceNote');
      if (note) {
        if (balance < 0) {
          note.textContent = '⚠️ Số âm! Kiểm tra ngay';
          note.classList.add('text-danger');
          note.classList.remove('text-muted');
        } else {
          note.textContent = 'Kho+Rỗng-Khách';
          note.classList.remove('text-danger');
        }
      }
    }

    function populateCustomerSelects() {
      var opts = '<option value="">-- Chọn khách hàng --</option>' +
        customers.map(function(c) { return '<option value="' + c.id + '">' + c.name + (c.keg_balance ? ' [' + c.keg_balance + ' vỏ]' : '') + '</option>'; }).join('');
      var setHtml = function(id, v) { var el = document.getElementById(id); if (el) el.innerHTML = v; };
      setHtml('deliverCustomer', opts);
      setHtml('collectCustomer', opts);
      var histOpts = '<option value="">-- Tất cả khách --</option>' +
        customers.map(function(c) { return '<option value="' + c.id + '">' + c.name + '</option>'; }).join('');
      setHtml('historyCustomerFilter', histOpts);
    }

    function updateCollectAvail() {
      var cid = (document.getElementById('collectCustomer') || {}).value;
      var el = document.getElementById('collectAvailQty');
      if (!el) return;
      if (!cid) { el.textContent = 'Chọn khách'; return; }
      var c = customers.find(function(x) { return x.id == cid; });
      el.textContent = (c && c.keg_balance ? c.keg_balance : 0) + ' vỏ';
    }

    function typeBadgeClass(type) {
      var map = { deliver:'badge-deliver', collect:'badge-collect', import:'badge-import', adjust:'badge-adjust', sell_empty:'badge-sell_empty' };
      return 'inline-block px-2 py-0.5 rounded-full text-xs font-semibold ' + (map[type] || 'badge-secondary');
    }

    function typeLabel(type) {
      var map = { deliver:'📦 Giao', collect:'🔄 Thu', import:'🏭 Nhập', adjust:'⚙️ Điều chỉnh', sell_empty:'💰 Bán vỏ rỗng' };
      return map[type] || type;
    }

    function renderLog(data) {
      var el = document.getElementById('logBody');
      if (!el) return;
      if (!data || data.length === 0) { el.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-muted">Chưa có giao dịch nào</td></tr>'; return; }
      el.innerHTML = data.slice(0, 20).map(function(log) {
        var date = new Date(log.date).toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        var customer = log.customer_name || (log.customer_id ? '(#' + log.customer_id + ')' : '—');
        var note = log.note || '—';
        var escapedNote = note.replace(/'/g, "\\'");
        var escapedCustomer = customer.replace(/'/g, "\\'");
        return '<tr class="log-row border-b border-muted hover:bg-success/5 cursor-pointer" onclick="showLogDetail(\'' + escapedNote + '\', \'' + escapedCustomer + '\', \'' + date + '\', ' + log.quantity + ', ' + (log.inventory_after||0) + ', ' + (log.empty_after||0) + ', ' + (log.holding_after||0) + ', \'' + typeLabel(log.type) + '\')">' +
          '<td class="py-2 px-2 text-xs text-muted">' + date + '</td>' +
          '<td class="py-2 px-2"><span class="' + typeBadgeClass(log.type) + '">' + typeLabel(log.type) + '</span></td>' +
          '<td class="py-2 px-2 text-xs text-center font-bold text-main">' + log.quantity + '</td>' +
          '<td class="py-2 px-2 text-xs text-center text-secondary truncate max-w-16" title="' + customer + '">' + customer + '</td>' +
          '<td class="py-2 px-2 text-xs text-muted truncate max-w-16" title="' + note + '"><span class="keg-col-note">' + note + '</span></td></tr>';
      }).join('');
    }

    function showLogDetail(note, customer, date, qty, inv, empty, hold, type) {
      showToast(type + ': ' + qty + ' vỏ — ' + customer, 'info');
    }

    // ========== HISTORY MODAL ==========
    function openHistoryModal() { openModal('historyModal'); loadHistory(); }

    function setHistoryFilter(type) {
      historyFilter = type;
      historyPage = 1;
      document.querySelectorAll('[id^="filter"]').forEach(function(el) {
        el.classList.remove('bg-success/20', 'text-success');
        el.classList.add('bg-bg', 'text-muted');
      });
      var map = { all:'All', deliver:'Deliver', collect:'Collect', import:'Import', adjust:'Adjust' };
      var active = document.getElementById('filter' + map[type]);
      if (active) { active.classList.remove('bg-bg', 'text-muted'); active.classList.add('bg-success/20', 'text-success'); }
      loadHistory();
    }

    async function loadHistory() {
      var limitEl = document.getElementById('historyPageSize');
      var limit = limitEl ? parseInt(limitEl.value) : 50;
      var custEl = document.getElementById('historyCustomerFilter');
      var custId = custEl ? custEl.value : '';
      var url = '/api/kegs/history?page=' + historyPage + '&limit=' + limit;
      if (historyFilter !== 'all') url += '&type=' + historyFilter;
      if (custId) url += '&customer_id=' + custId;
      try {
        var res = await fetch(url);
        var json = await res.json();
        renderHistoryList(json.data || []);
        renderHistorySummary(json.data || []);
        renderHistoryPagination();
      } catch (e) { console.error('Load history error:', e); }
    }

    function renderHistoryList(data) {
      var el = document.getElementById('historyList');
      if (!el) return;
      if (!data || data.length === 0) { el.innerHTML = '<div class="text-center py-8 text-muted">Không có giao dịch nào</div>'; return; }
      el.innerHTML = data.map(function(log) {
        var date = new Date(log.date).toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        var customer = log.customer_name || (log.customer_id ? 'Khách #' + log.customer_id : '—');
        var importInfo = (log.exchanged || log.purchased) ? '<div class="text-xs text-secondary">Đổi: ' + (log.exchanged||0) + ' | Mới: ' + (log.purchased||0) + '</div>' : '';
        var note = log.note ? '<div class="text-xs text-muted italic mt-1">' + log.note + '</div>' : '';
        return '<div class="card card--list-item mb-2">' +
          '<div class="flex justify-between items-start mb-1">' +
          '<div class="flex items-center gap-2"><span class="' + typeBadgeClass(log.type) + '">' + typeLabel(log.type) + '</span>' +
          '<span class="text-sm font-bold text-main">' + log.quantity + ' vỏ</span></div>' +
          '<span class="text-xs text-muted">' + date + '</span></div>' +
          '<div class="text-xs text-muted mb-1">👤 ' + customer + '</div>' +
          importInfo +
          '<div class="grid grid-cols-3 gap-1 mt-2 text-xs text-center">' +
          '<div class="bg-bg rounded p-1"><div class="text-muted">Tồn kho</div><div class="font-bold text-success">' + (log.inventory_after||0) + '</div></div>' +
          '<div class="bg-bg rounded p-1"><div class="text-muted">Vỏ rỗng</div><div class="font-bold text-info">' + (log.empty_after||0) + '</div></div>' +
          '<div class="bg-bg rounded p-1"><div class="text-muted">Khách giữ</div><div class="font-bold text-secondary">' + (log.holding_after||0) + '</div></div></div>' +
          note + '</div>';
      }).join('');
    }

    function renderHistorySummary(data) {
      var totals = { delivered:0, collected:0, imported:0, adjusted:0 };
      data.forEach(function(log) {
        if (log.type === 'deliver') totals.delivered += log.quantity;
        else if (log.type === 'collect') totals.collected += log.quantity;
        else if (log.type === 'import') totals.imported += log.quantity;
        else if (log.type === 'adjust' || log.type === 'sell_empty') totals.adjusted += log.quantity;
      });
      var set = function(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };
      set('summaryDelivered', totals.delivered + ' vỏ');
      set('summaryCollected', totals.collected + ' vỏ');
      set('summaryImported', totals.imported + ' vỏ');
      set('summaryAdjusted', totals.adjusted + ' vỏ');
    }

    function renderHistoryPagination() {
      var info = document.getElementById('historyPageInfo');
      var prev = document.getElementById('historyPrevBtn');
      var next = document.getElementById('historyNextBtn');
      if (info) info.textContent = 'Trang ' + historyPage + '/' + historyTotalPages;
      if (prev) prev.disabled = historyPage <= 1;
      if (next) next.disabled = historyPage >= historyTotalPages;
    }

    function changeHistoryPage(dir) { historyPage = Math.max(1, Math.min(historyTotalPages, historyPage + dir)); loadHistory(); }

    // ========== MODAL HELPERS ==========
    function openModal(id) { var el = document.getElementById(id); if (el) { el.classList.remove('hidden'); el.classList.add('flex'); } }
    function closeModal(id) { var el = document.getElementById(id); if (el) { el.classList.add('hidden'); el.classList.remove('flex'); } }
    function adjustQty(inputId, delta) { var input = document.getElementById(inputId); if (input) input.value = Math.max(parseInt(input.min||0), parseInt(input.value||0) + delta); }
    function updateImportTotal() { var ex = parseInt(document.getElementById('importExchanged') && document.getElementById('importExchanged').value) || 0; var pu = parseInt(document.getElementById('importPurchased') && document.getElementById('importPurchased').value) || 0; var el = document.getElementById('importTotalDisplay'); if (el) el.textContent = (ex + pu) + ' vỏ'; }

    // ========== SUBMIT HANDLERS ==========
    async function submitDeliver() {
      var cid = (document.getElementById('deliverCustomer') || {}).value;
      var qty = parseInt((document.getElementById('deliverQty') || {}).value);
      var note = (document.getElementById('deliverNote') || {}).value || '';
      if (!cid) { showToast('Vui lòng chọn khách hàng', 'error'); return; }
      if (!qty || qty < 1) { showToast('Số lượng phải lớn hơn 0', 'error'); return; }
      if ((kegState.inventory || 0) < qty) { showToast('Không đủ vỏ! Chỉ còn ' + kegState.inventory + ' vỏ', 'error'); return; }
      try {
        var res = await fetch('/api/kegs/deliver', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ customerId:cid, quantity:qty, note:note }) });
        var result = await res.json();
        if (res.ok) {
          showToast('Đã giao ' + qty + ' vỏ cho khách!', 'success');
          closeModal('deliverModal');
          var dn = document.getElementById('deliverNote'); if (dn) dn.value = '';
          var dq = document.getElementById('deliverQty'); if (dq) dq.value = 1;
          await loadCustomers(); await loadState(); await loadRecentLog();
        } else { showToast(result.error || 'Thất bại', 'error'); }
      } catch (e) { showToast('Lỗi kết nối', 'error'); }
    }

    async function submitCollect() {
      var cid = (document.getElementById('collectCustomer') || {}).value;
      var qty = parseInt((document.getElementById('collectQty') || {}).value);
      var note = (document.getElementById('collectNote') || {}).value || '';
      if (!cid) { showToast('Vui lòng chọn khách hàng', 'error'); return; }
      if (!qty || qty < 1) { showToast('Số lượng phải lớn hơn 0', 'error'); return; }
      try {
        var res = await fetch('/api/kegs/collect', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ customerId:cid, quantity:qty, note:note }) });
        var result = await res.json();
        if (res.ok) {
          showToast('Đã thu ' + qty + ' vỏ rỗng!', 'success');
          closeModal('collectModal');
          var cn = document.getElementById('collectNote'); if (cn) cn.value = '';
          var cq = document.getElementById('collectQty'); if (cq) cq.value = 1;
          await loadCustomers(); await loadState(); await loadRecentLog(); updateCollectAvail();
        } else { showToast(result.error || 'Thất bại', 'error'); }
      } catch (e) { showToast('Lỗi kết nối', 'error'); }
    }

    async function submitImport() {
      var ex = parseInt(document.getElementById('importExchanged') && document.getElementById('importExchanged').value) || 0;
      var pu = parseInt(document.getElementById('importPurchased') && document.getElementById('importPurchased').value) || 0;
      var note = (document.getElementById('importNote') || {}).value || '';
      if (ex + pu < 1) { showToast('Phải nhập ít nhất 1 vỏ', 'error'); return; }
      try {
        var res = await fetch('/api/kegs/import', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ exchanged:ex, purchased:pu, note:note }) });
        var result = await res.json();
        if (res.ok) {
          showToast(result.message, 'success');
          closeModal('importModal');
          var ie = document.getElementById('importExchanged'); if (ie) ie.value = 0;
          var ip = document.getElementById('importPurchased'); if (ip) ip.value = 0;
          var in2 = document.getElementById('importNote'); if (in2) in2.value = '';
          var itd = document.getElementById('importTotalDisplay'); if (itd) itd.textContent = '0 vỏ';
          await loadState(); await loadRecentLog();
        } else { showToast(result.error || 'Thất bại', 'error'); }
      } catch (e) { showToast('Lỗi kết nối', 'error'); }
    }

    async function submitAdjust() {
      var qty = parseInt((document.getElementById('adjustQty') || {}).value);
      var note = (document.getElementById('adjustNote') || {}).value || '';
      if (isNaN(qty) || qty < 0) { showToast('Số lượng không hợp lệ', 'error'); return; }
      try {
        var res = await fetch('/api/kegs/state', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ emptyCollected:qty, note:note }) });
        var result = await res.json();
        if (res.ok) { showToast('Đã cập nhật vỏ rỗng', 'success'); closeModal('adjustModal'); await loadState(); await loadRecentLog(); }
        else { showToast(result.error || 'Thất bại', 'error'); }
      } catch (e) { showToast('Lỗi kết nối', 'error'); }
    }

    // ========== INIT ==========
    async function init() {
      var headerActions =
        '<button onclick="syncKegs()" class="text-muted hover:bg-bg-hover px-2 rounded" style="font-size:18px;background:none;border:none;cursor:pointer;padding:4px 8px;" title="Đồng bộ">🔄</button>' +
        '<button onclick="openHistoryModal()" class="text-muted hover:bg-bg-hover px-2 rounded" style="font-size:18px;background:none;border:none;cursor:pointer;padding:4px 8px;" title="Lịch sử chi tiết">📋</button>';

      document.getElementById('app').innerHTML =
        getHeaderWithActions('Quản lý vỏ bia', '🍺', headerActions) +
        getContent(`
          <!-- Stats Grid -->
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="card stat-card--green" onclick="openModal('adjustModal')" style="cursor:pointer">
              <div class="sc-label"><span class="sc-icon">📦</span> Vỏ đầy (kho)</div>
              <div class="sc-value" id="statInventory">-</div>
              <div class="sc-sub">Sẵn sàng giao</div>
            </div>
            <div class="card stat-card--blue" onclick="openModal('adjustModal')" style="cursor:pointer">
              <div class="sc-label"><span class="sc-icon">🧹</span> Vỏ rỗng</div>
              <div class="sc-value" id="statEmpty">-</div>
              <div class="sc-sub">Chờ nạp lại</div>
            </div>
            <div class="card stat-card--amber">
              <div class="sc-label"><span class="sc-icon">👥</span> Khách giữ</div>
              <div class="sc-value" id="statHolding">-</div>
              <div class="sc-sub">Chưa thu hồi</div>
            </div>
            <div class="card stat-card--profit">
              <div class="sc-label"><span class="sc-icon">📊</span> Tồn kho thực</div>
              <div class="sc-value" id="statBalance">-</div>
              <div class="sc-sub" id="statBalanceNote">Kho+Rỗng-Khách</div>
            </div>
          </div>

          <!-- Balance Warning -->
          <div id="balanceWarning" class="hidden card card--alert-danger mb-4">
            <div class="flex items-start gap-3">
              <span class="text-xl">⚠️</span>
              <div>
                <div class="text-sm font-semibold text-danger">Số vỏ trong kho sắp hết!</div>
                <div class="text-xs text-danger mt-0.5" id="balanceWarningMsg">Cần nhập thêm vỏ từ nhà máy.</div>
              </div>
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="grid grid-cols-3 gap-3 mb-4">
            <button onclick="openModal('deliverModal')" class="action-btn ab-green"><span class="ab-icon">📦</span><span class="ab-label">Giao vỏ</span></button>
            <button onclick="openModal('collectModal')" class="action-btn ab-blue"><span class="ab-icon">🔄</span><span class="ab-label">Thu vỏ</span></button>
            <button onclick="openModal('importModal')" class="action-btn ab-purple"><span class="ab-icon">🏭</span><span class="ab-label">Nhập vỏ</span></button>
          </div>

          <!-- Recent Transaction Log -->
          <div class="card overflow-hidden">
            <div class="p-3 border-b border-muted flex justify-between items-center">
              <h3 class="font-bold text-sm text-main">📋 Giao dịch gần đây</h3>
              <button onclick="openHistoryModal()" class="text-xs text-success font-semibold">Xem tất cả →</button>
            </div>
            <div class="max-h-64 overflow-y-auto">
              <table class="w-full text-xs">
                <thead>
                  <tr class="bg-bg text-muted sticky top-0">
                    <th class="py-2 px-2 text-left font-medium">Thời gian</th>
                    <th class="py-2 px-2 text-left font-medium">Loại</th>
                    <th class="py-2 px-2 text-center font-medium">SL</th>
                    <th class="py-2 px-2 text-center font-medium">Khách</th>
                    <th class="py-2 px-2 text-center font-medium keg-col-note">Ghi chú</th>
                  </tr>
                </thead>
                <tbody id="logBody"></tbody>
              </table>
            </div>
          </div>
        `) +
        getBottomNav('/kegs');

      await loadCustomers();
      await loadState();
      await loadRecentLog();
    }
    init();
  </script>
  <!-- PERFORMANCE: db.js + sync.js non-blocking via requestIdleCallback -->
  <script>
    var _ric = window.requestIdleCallback || function(cb) { return setTimeout(cb, 200); };
    _ric(function() {
      var s1 = document.createElement('script');
      s1.src = '/js/vendor/dexie.min.js?v=20260405';
      document.head.appendChild(s1);
      s1.onload = function() {
        var s2 = document.createElement('script');
        s2.src = '/db.js?v=20260411a';
        document.head.appendChild(s2);
        s2.onload = function() {
          var s3 = document.createElement('script');
          s3.src = '/sync.js?v=20260405';
          document.head.appendChild(s3);
        };
      };
    }, { timeout: 8000 });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(function (reg) {
        if (!reg) {
          var swVer = (typeof window !== 'undefined' && window.APP_VERSION) ? window.APP_VERSION : Date.now();
          navigator.serviceWorker.register('/sw.js?v=' + swVer).catch(function () {});
        }
      });
    }
  </script>
</body>
</html>
