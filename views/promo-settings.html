  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>

      background: var(--card);

    }

      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .promo-toggle-row:last-child {
      border-bottom: none;
    }
    .promo-toggle-label {
      font-size: 14px;
      font-weight: 600;

    }
    .promo-toggle-desc {

      justify-content: space-between;

    }
    .promo-input-label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .promo-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .promo-input {
      width: 70px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      background: var(--card);
      font-size: 14px;

      text-align: center;
    }
    .promo-input:focus {

    .promo-input-suffix {

    .promo-save-btn {

      height: 50px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);

      font-size: 16px;

    }

      opacity: 0.6;

    }
    .tier-row {

  <script>
    // Replace HTML entities back to actual characters
    function decodePromoHtml(str) {
      return str
        .replace(/&#127873;/g, '\u{1F381}')
        .replace(/&#128293;/g, '\u{1F525}')
        .replace(/&#127942;/g, '\u{1F3C6}')
        .replace(/&#128104;&#8205;&#127858;/g, '\u{1F468}\u{200D}\u{1F35E}');
    }

    // ── State ─────────────────────────────────────────────
    var currentSettings = null;
    var hasChanges = false;
    var tierList = [];

    // ── Init ─────────────────────────────────────────────
    async function initPage() {
      var loading = document.getElementById('promoLoading');
      var content = document.getElementById('promoSettingsContent');
      if (loading) loading.classList.remove('hidden');
      if (content) content.classList.add('hidden');
      try {
        await loadSettings();
      } finally {
        if (loading) loading.classList.add('hidden');
        if (content) content.classList.remove('hidden');
      }
    }

    // ── Load settings from server ─────────────────────────
    async function loadSettings() {
      try {
        var res = await fetch('/api/promotions/settings', { cache: 'no-store' });
        var data = await res.json();
        if (data.success) {
          currentSettings = data.data;
          renderSettings(currentSettings);
        }
      } catch (e) {
        // Silent load fail
      }
    }

    // ── Render settings into form ────────────────────────
    function renderSettings(s) {
      var el;
      el = document.getElementById('toggleNewShop'); if (el) el.checked = !!s.newShopEnabled;
      el = document.getElementById('newShopDays'); if (el) el.value = s.newShopDays || 30;
      el = document.getElementById('goldBuy'); if (el) el.value = s.newShopGoldBuy || 10;
      el = document.getElementById('goldFree'); if (el) el.value = s.newShopGoldFree || 1;
      el = document.getElementById('blackBuy'); if (el) el.value = s.newShopBlackBuy || 20;
      el = document.getElementById('blackFree'); if (el) el.value = s.newShopBlackFree || 1;
      toggleNewShopFields(s.newShopEnabled);

      el = document.getElementById('toggleReward'); if (el) el.checked = !!s.rewardEnabled;
      toggleRewardFields(s.rewardEnabled);

      // Render thời gian áp dụng
      el = document.getElementById('startDate'); if (el) el.value = s.startDate || '';
      el = document.getElementById('endDate'); if (el) el.value = s.endDate || '';
      updatePeriodStatus(s.startDate, s.endDate);

      tierList = JSON.parse(JSON.stringify(s.rewardTiers || []));
      if (tierList.length === 0) {
        tierList = [{threshold: 300, reward: 10}, {threshold: 500, reward: 20}];
      }
      tierList.sort(function(a, b) { return a.threshold - b.threshold; });
      renderTierList();

      hasChanges = false;
      document.getElementById('saveBtn').disabled = true;
    }

    // ── Update period status display ────────────────────
    function updatePeriodStatus(startDate, endDate) {
      var statusEl = document.getElementById('periodStatus');
      if (!statusEl) return;

      var now = new Date();
      var start = startDate ? new Date(startDate) : null;
      var end = endDate ? new Date(endDate) : null;

      if (!start && !end) {
        statusEl.innerHTML = '<span style="color:#22c55e;">&#10003; Đang áp dụng vô thời hạn</span>';
        return;
      }

      var isActive = true;
      var statusText = '';

      if (start && now < start) {
        isActive = false;
        statusText = 'Sẽ bắt đầu ngày ' + formatDate(startDate);
      } else if (end && now > end) {
        isActive = false;
        statusText = '&#10007; Đã hết hạn ngày ' + formatDate(endDate);
      } else if (start && end) {
        statusText = 'Đang áp dụng: ' + formatDate(startDate) + ' → ' + formatDate(endDate);
      } else if (start) {
        statusText = 'Đang áp dụng từ ngày ' + formatDate(startDate);
      } else if (end) {
        statusText = 'Đang áp dụng đến ngày ' + formatDate(endDate);
      }

      statusEl.innerHTML = isActive
        ? '<span style="color:#22c55e;">&#10003; ' + statusText + '</span>'
        : '<span style="color:#f59e0b;">&#9203; ' + statusText + '</span>';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      var d = new Date(dateStr);
      return d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear();
    }

    // ── Toggle field visibility ───────────────────────────
    function toggleNewShopFields(enabled) {
      var fields = document.getElementById('newShopFields');
      if (!fields) return;
      if (enabled) {
        fields.style.opacity = '1';
        fields.style.pointerEvents = 'auto';
      } else {
        fields.style.opacity = '0.4';
        fields.style.pointerEvents = 'none';
      }
    }

    function toggleRewardFields(enabled) {
      var fields = document.getElementById('rewardFields');
      if (!fields) return;
      if (enabled) {
        fields.style.opacity = '1';
        fields.style.pointerEvents = 'auto';
      } else {
        fields.style.opacity = '0.4';
        fields.style.pointerEvents = 'none';
      }
    }

    // ── Tier list rendering ──────────────────────────────
    function renderTierList() {
      var container = document.getElementById('tierList');
      if (!container) return;

      if (tierList.length === 0) {
        container.innerHTML = '<div class="text-center text-sm text-muted py-4">Chưa có mốc thưởng nào</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < tierList.length; i++) {
        var tier = tierList[i];
        var badgeClass = 'tier-badge-' + (i === 0 ? '1' : (i === 1 ? '2' : '3'));
        html +=
          '<div class="tier-row" data-index="' + i + '">' +
            '<div>' +
              '<div class="tier-row-title">' +
                'Mốc ' + (i + 1) +
                ' <span class="tier-badge ' + badgeClass + '">' + tier.reward + 'L</span>' +
              '</div>' +
              '<div class="tier-row-desc">Đạt ' + tier.threshold + 'L → Thưởng ' + tier.reward + 'L</div>' +
            '</div>' +
            '<div class="tier-row-inputs">' +
              '<div class="promo-input-wrap" style="gap:4px;">' +
                '<span style="font-size:11px;color:var(--text-muted);">≥</span>' +
                '<input type="number" class="promo-input" value="' + tier.threshold + '" min="1" max="9999" ' +
                  'onchange="updateTier(' + i + ', \'threshold\', this.value)" style="width:60px;">' +
                '<span style="font-size:11px;color:var(--text-muted);">L →</span>' +
                '<input type="number" class="promo-input" value="' + tier.reward + '" min="1" max="100" ' +
                  'onchange="updateTier(' + i + ', \'reward\', this.value)" style="width:50px;">' +
                '<span style="font-size:11px;color:var(--text-muted);">L</span>' +
              '</div>' +
              '<button onclick="removeTier(' + i + ')" style="width:32px;height:32px;padding:0;font-size:16px;color:var(--danger);border:none;background:rgba(239,68,68,0.1);border-radius:8px;cursor:pointer;">×</button>' +
            '</div>' +
          '</div>';
      }
      container.innerHTML = html;
    }

    function updateTier(index, field, value) {
      var numVal = parseInt(value) || 0;
      if (field === 'threshold') tierList[index].threshold = Math.max(1, numVal);
      if (field === 'reward') tierList[index].reward = Math.max(1, numVal);
      tierList.sort(function(a, b) { return a.threshold - b.threshold; });
      renderTierList();
      onSettingsChanged();
    }

    function addRewardTier() {
      var maxThreshold = 0;
      for (var j = 0; j < tierList.length; j++) {
        if (tierList[j].threshold > maxThreshold) maxThreshold = tierList[j].threshold;
      }
      var nextThreshold = Math.min(maxThreshold + 100, 9999);
      tierList.push({ threshold: nextThreshold, reward: Math.round(nextThreshold / 20) });
      tierList.sort(function(a, b) { return a.threshold - b.threshold; });
      renderTierList();
      onSettingsChanged();
    }

    function removeTier(index) {
      if (tierList.length <= 1) {
        if (typeof showToast === 'function') showToast('Phải có ít nhất 1 mốc thưởng', 'error');
        return;
      }
      tierList.splice(index, 1);
      renderTierList();
      onSettingsChanged();
    }

    // ── Detect changes ─────────────────────────────────
    function onSettingsChanged() {
      hasChanges = true;
      document.getElementById('saveBtn').disabled = false;
      toggleNewShopFields(document.getElementById('toggleNewShop').checked);
      toggleRewardFields(document.getElementById('toggleReward').checked);
    }

    // ── Save settings ────────────────────────────────────
    async function saveSettings() {
      var btn = document.getElementById('saveBtn');
      var statusEl = document.getElementById('saveStatus');
      if (!btn || !statusEl) return;

      btn.disabled = true;
      btn.innerHTML = '⏳ Đang lưu...';
      statusEl.classList.add('hidden');

      try {
        var payload = {
          newShopEnabled: document.getElementById('toggleNewShop').checked,
          newShopDays: parseInt(document.getElementById('newShopDays').value) || 30,
          newShopGoldBuy: parseInt(document.getElementById('goldBuy').value) || 10,
          newShopGoldFree: parseInt(document.getElementById('goldFree').value) || 1,
          newShopBlackBuy: parseInt(document.getElementById('blackBuy').value) || 20,
          newShopBlackFree: parseInt(document.getElementById('blackFree').value) || 1,
          rewardEnabled: document.getElementById('toggleReward').checked,
          rewardTiers: tierList,
          startDate: document.getElementById('startDate').value || null,
          endDate: document.getElementById('endDate').value || null
        };

        var res = await fetch('/api/promotions/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        var data = await res.json();
        if (data.success) {
          currentSettings = data.data;
          hasChanges = false;
          btn.innerHTML = '✓ Đã lưu!';
          btn.style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
          statusEl.classList.remove('hidden');
          statusEl.style.color = 'var(--success)';
          statusEl.textContent = 'Cài đặt đã được lưu thành công!';

          setTimeout(function() {
            btn.innerHTML = decodePromoHtml('&#128104;&#8205;&#127858; Lưu cài đặt');
            btn.style.background = '';
            btn.disabled = false;
            statusEl.classList.add('hidden');
          }, 2000);

          if (typeof window.promoSocket !== 'undefined' && window.promoSocket) {
            window.promoSocket.emit('request:refetch', { entities: ['promotion_settings', 'promotion'] });
          }
        } else {
          throw new Error(data.error || 'Lỗi không xác định');
        }
      } catch (e) {
        btn.innerHTML = decodePromoHtml('&#128104;&#8205;&#127858; Lưu cài đặt');
        btn.disabled = false;
        statusEl.classList.remove('hidden');
        statusEl.style.color = 'var(--danger)';
        statusEl.textContent = 'Lỗi: ' + (e.message || 'Không thể lưu');
        if (typeof showToast === 'function') showToast('Lỗi: ' + (e.message || 'Không thể lưu'), 'error');
      }
    }

    // ── Warn before leaving ─────────────────────────────
    window.addEventListener('beforeunload', function(e) {
      if (hasChanges) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // ── Socket.IO: listen for refetch events ───────────
    function initSocket() {
      if (typeof io === 'undefined') return;
      try {
        var socket = io();
        window.promoSocket = socket;

        socket.on('refetch:now', function(data) {
          var entities = data && data.entities;
          if (!entities || entities.indexOf('all') !== -1 ||
              entities.indexOf('promotion_settings') !== -1 ||
              entities.indexOf('promotion') !== -1) {
            loadSettings();
          }
        });

        socket.on('connect', function() {
          // Connected
        });
      } catch (e) {
        // Silent socket init fail
      }
    }

    // ── Init ───────────────────────────────────────────
    initPage();
    initSocket();
  </script>
