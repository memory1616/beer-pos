<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giao hàng</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f1a; color: #fff; }
    .header { background: #1a1a2e; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { margin: 0; font-size: 18px; }
    .content { padding: 15px; padding-bottom: calc(var(--bottomnav-height) + var(--safe-area-bottom) + 15px); }
    #map { height: 250px; width: 100%; border-radius: 10px; background: #1a1a2e; }
    .stats { display: flex; gap: 10px; margin: 15px 0; }
    .stat-box { flex: 1; background: #1a1a2e; padding: 15px; border-radius: 10px; text-align: center; }
    .stat-box .val { font-size: 24px; font-weight: bold; color: #3b82f6; }
    .stat-box .lbl { font-size: 12px; color: #888; }
    .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
    .btn-gps { background: #374151; color: #fff; }
    .btn-route { background: #3b82f6; color: #fff; }
    .card { background: #1a1a2e; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 3px solid #3b82f6; }
    .card .name { font-weight: 600; margin-bottom: 4px; }
    .card .info { font-size: 13px; color: #888; }
    .card .btns { display: flex; gap: 8px; margin-top: 8px; }
    .card .btn-sm { padding: 8px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; background: #374151; color: #fff; text-decoration: none; text-align: center; }
    .card .btn-del { background: #f59e0b; }

    .leaflet-container { background: #1a1a2e !important; }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preload" href="/js/layout.js" as="script">
  <script src="/js/layout.js"></script>
  <script>
  function initPage() {
    document.body.insertAdjacentHTML("beforeend", getBottomNav("/sale"));
  }
  </script>
</head>
<body onload="initPage()">
  <div class="header">
    <h1>🚚 Giao hàng</h1>
    <button onclick="showSettings()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#fff;">⚙️</button>
  </div>

  <div class="content">
    <div id="map"></div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="val" id="count">0</div>
        <div class="lbl">Đơn hôm nay</div>
      </div>
      <div class="stat-box">
        <div class="val" id="km" style="color:#22c55e;">-</div>
        <div class="lbl">Tổng km</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-gps" onclick="getLocation()">📍 Vị trí</button>
      <button class="btn btn-route" onclick="optimize()">⚡ Tối ưu</button>
    </div>

    <div class="section-title" style="font-size:14px;font-weight:600;margin-bottom:10px;color:#888;">📋 Danh sách giao hàng</div>
    <div id="list"></div>
  </div>



  <div id="settingsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;">
    <div style="background:#1a1a2e;border-radius:12px;padding:20px;width:90%;max-width:350px;">
      <h3 style="margin:0 0 15px 0;">⚙️ Cấu hình</h3>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:#888;">Phí/km (đ)</label>
        <input type="number" id="costPerKm" class="btn btn-gps" style="width:100%;text-align:left;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:#888;">Vĩ độ kho</label>
        <input type="number" id="lat" class="btn btn-gps" style="width:100%;text-align:left;" step="0.0001">
      </div>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:#888;">Kinh độ kho</label>
        <input type="number" id="lng" class="btn btn-gps" style="width:100%;text-align:left;" step="0.0001">
      </div>
      <div style="display:flex;gap:10px;">
        <button onclick="hideSettings()" class="btn btn-gps">Hủy</button>
        <button onclick="saveSettings()" class="btn btn-route" style="flex:1;">Lưu</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var data = {{DELIVERY_DATA}};
    var customers = data.customers || [];
    var settings = data.settings || {};
    
    var lat = settings.distributor_lat || 11.3296;
    var lng = settings.distributor_lng || 106.1495;
    var costPerKm = settings.delivery_cost_per_km || 3000;
    var curLat = null, curLng = null;
    var map = null, userMarker = null;

    function dist(lat1, lng1, lat2, lng2) {
      var R = 6371;
      var d = (lat2-lat1)*Math.PI/180;
      var e = (lng2-lng1)*Math.PI/180;
      var a = Math.sin(d/2)*Math.sin(d/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(e/2)*Math.sin(e/2);
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    function icon(color, size) {
      size = size || 12;
      return L.divIcon({ className:'m', html:'<div style="background:'+color+';width:'+size+'px;height:'+size+'px;border-radius:50%;border:2px solid #fff;"></div>', iconSize:[size,size], iconAnchor:[size/2,size/2] });
    }

    function formatVND(n) {
      return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function render() {
      document.getElementById('count').textContent = customers.length;
      var totalKm = 0;
      var originLat = curLat || lat;
      var originLng = curLng || lng;
      var html = '';
      var countWithGPS = 0;
      
      customers.forEach(function(c) {
        var d = 0;
        if (c.lat && c.lng) {
          d = dist(originLat, originLng, parseFloat(c.lat), parseFloat(c.lng));
          totalKm += d;
          countWithGPS++;
        }
        var gpsIcon = c.lat && c.lng ? '<span style="color:#22c55e;">📍</span>' : '<span style="color:#888;">📍</span>';
        var totalStr = c.total ? formatVND(c.total) + 'đ' : '';
        html += '<div class="card">' +
          '<div class="name">'+gpsIcon+' '+c.name+'</div>' +
          '<div class="info">📞 '+(c.phone||'-')+' '+totalStr+'</div>' +
          '<div class="btns">' +
            '<a href="https://www.google.com/maps/dir/?api=1&destination='+c.lat+','+c.lng+'" target="_blank" class="btn-sm">🗺️</a>' +
            '<a href="/sale?customerId='+c.id+'" class="btn-sm btn-del">📦 Đơn</a>' +
          '</div>' +
        '</div>';
      });
      
      document.getElementById('km').textContent = countWithGPS > 0 ? totalKm.toFixed(1) : '-';
      document.getElementById('list').innerHTML = html || '<p style="text-align:center;color:#888;padding:30px;">Chưa có đơn hàng</p>';
    }

    function initMap() {
      map = L.map('map').setView([lat, lng], 12);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OSM © CARTO'
      }).addTo(map);
      
      L.marker([lat, lng], {icon: icon('#22c55e', 16)}).addTo(map).bindPopup('🏭 Kho');
      
      customers.forEach(function(c) {
        if (c.lat && c.lng) {
          L.marker([parseFloat(c.lat), parseFloat(c.lng)], {icon: icon('#3b82f6', 10)}).addTo(map).bindPopup(c.name);
        }
      });
    }

    window.getLocation = function() {
      if (!navigator.geolocation) { alert('GPS không hỗ trợ'); return; }
      navigator.geolocation.getCurrentPosition(function(p) {
        curLat = p.coords.latitude;
        curLng = p.coords.longitude;
        if (map) {
          map.setView([curLat, curLng], 14);
          if (userMarker) map.removeLayer(userMarker);
          userMarker = L.marker([curLat, curLng], {icon: icon('#ef4444', 14)}).addTo(map).bindPopup('📍 Bạn');
        }
        render();
        alert('Đã cập nhật vị trí!');
      }, function(e) { alert('Lỗi GPS'); }, {enableHighAccuracy: true, timeout: 10000});
    };

    window.optimize = function() {
      var originLat = curLat || lat;
      var originLng = curLng || lng;
      customers.sort(function(a, b) {
        return dist(originLat, originLng, parseFloat(a.lat||0), parseFloat(a.lng||0)) - 
               dist(originLat, originLng, parseFloat(b.lat||0), parseFloat(b.lng||0));
      });
      render();
      alert('Đã sắp xếp theo khoảng cách!');
    };

    window.showSettings = function() {
      document.getElementById('costPerKm').value = costPerKm;
      document.getElementById('lat').value = lat;
      document.getElementById('lng').value = lng;
      document.getElementById('settingsModal').style.display = 'flex';
    };

    window.hideSettings = function() {
      document.getElementById('settingsModal').style.display = 'none';
    };

    window.saveSettings = async function() {
      costPerKm = parseFloat(document.getElementById('costPerKm').value) || 3000;
      lat = parseFloat(document.getElementById('lat').value) || lat;
      lng = parseFloat(document.getElementById('lng').value) || lng;
      try {
        await fetch('/api/settings/batch', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({delivery_cost_per_km: costPerKm, distributor_lat: lat, distributor_lng: lng})
        });
        hideSettings();
        alert('Đã lưu!');
      } catch(e) { alert('Lỗi!'); }
    };

    initMap();
    render();
  </script>


</body>
</html>
