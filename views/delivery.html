<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- NO-FLICKER: Apply theme BEFORE first paint to prevent flash -->
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Giao hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/unified.css?v=20260412-app-shell">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260410-binance"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    .delivery-map-wrap { position: relative; z-index: 0; isolation: isolate; overflow: hidden; border-radius: 12px; margin-bottom: 1rem; }
    .delivery-map-wrap #map { height: 50vh; margin-bottom: 0; }
    .delivery-map-wrap .leaflet-container { z-index: 0 !important; }
    .delivery-map-wrap .leaflet-pane { z-index: 0 !important; }
    .delivery-map-wrap .leaflet-control { z-index: 1 !important; }
    .delivery-card { transition: all 0.2s; cursor: pointer; }
    .delivery-card:active { transform: scale(0.98); }
    .settings-modal-inner { max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
  </style>
</head>
<body class="bg-bg text-main body--app">
  <!-- Inject delivery data from server -->
  <script>
    window.__DELIVERY_DATA__ = {{DELIVERY_DATA}};
  </script>

  <!-- Header + content + bottom nav all rendered via layout.js -->
  <div id="app"></div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay-v2 hidden center" style="z-index:10000">
    <div class="modal-sheet-v2">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title">⚙️ Cấu hình vận chuyển</div>
        <button type="button" onclick="hideSettingsModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <div class="space-y-4">
          <div>
            <label class="field-label">Phí/km (đ)</label>
            <input type="number" id="deliveryCostPerKm" class="bn-input bn-input--lg" min="0" step="100">
          </div>
          <div>
            <label class="field-label">Phí cơ bản (đ)</label>
            <input type="number" id="deliveryBaseCost" class="bn-input bn-input--lg" min="0">
          </div>
        </div>
        <div class="border-t border-muted pt-4 mt-4">
          <label class="field-label">📍 Vị trí kho/xưởng</label>
          <div class="grid grid-cols-2 gap-2 mb-2">
            <div>
              <label class="text-xs text-muted">Vĩ độ</label>
              <input type="number" id="distributorLat" class="bn-input" step="0.0001">
            </div>
            <div>
              <label class="text-xs text-muted">Kinh độ</label>
              <input type="number" id="distributorLng" class="bn-input" step="0.0001">
            </div>
          </div>
          <button onclick="getDistributorLocation()" class="text-sm" style="color:var(--info);">📍 Lấy vị trí hiện tại</button>
        </div>
        <div class="flex gap-2 mt-4">
          <button onclick="hideSettings()" class="btn btn-ghost flex-1">Hủy</button>
          <button onclick="saveSettings()" class="btn btn-primary flex-1">Lưu</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Load realtime state + delivery JS -->
  <!-- realtime.js auto-loaded by layout.js -->
  <script src="/js/delivery.js" defer></script>
  <script>
    // Render header + bottom nav using layout.js functions
    const headerActions = `
      <button onclick="showSettings()" class="btn btn-ghost">⚙️</button>
    `;
    
    document.getElementById('app').innerHTML =
      getHeaderWithActions('Giao hàng', '🚚', headerActions) +
      getContent(`
        <div class="delivery-map-wrap">
          <div id="map"></div>
        </div>

        <div class="section-title">🚚 Khách hàng</div>
        <div class="flex gap-2 mb-4">
          <button onclick="getCurrentLocation()" class="flex-1 btn btn-primary flex items-center justify-center gap-2">📍 Vị trí hiện tại</button>
          <button onclick="optimizeRoute()" class="flex-1 btn btn-secondary">⚡ Tối ưu lộ trình</button>
        </div>

        <div id="customersList" class="space-y-2">
          <!-- Rendered by delivery.js -->
        </div>
      `) +
      getBottomNav('/delivery');
  </script>
</body>
</html>
