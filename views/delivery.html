<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Giao hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css?v=20260414a">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260414a"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    .delivery-map-wrap { position: relative; z-index: 0; isolation: isolate; overflow: hidden; border-radius: 12px; margin-bottom: 1rem; }
    .delivery-map-wrap #map { height: 50vh; margin-bottom: 0; }
    .delivery-map-wrap .leaflet-container { z-index: 0 !important; }
    .delivery-map-wrap .leaflet-pane { z-index: 0 !important; }
    .delivery-map-wrap .leaflet-control { z-index: 1 !important; }
    .delivery-card { transition: all 0.2s; cursor: pointer; }
    .delivery-card:active { transform: scale(0.98); }
    .settings-modal-inner { max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
  </style>
</head>
<body class="bg-bg text-main body--app">
  <!-- Inject delivery data from server -->
  <script>
    window.__DELIVERY_DATA__ = {{DELIVERY_DATA}};
  </script>

  <!-- Header + content + bottom nav all rendered via layout.js -->
  <div id="app"></div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-overlay hidden items-center justify-center p-4" style="z-index:10000">
    <div class="card p-6 max-w-sm w-full settings-modal-inner relative" style="z-index:10001">
      <h2 class="text-xl font-bold mb-4">⚙️ Cấu hình vận chuyển</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-main mb-1">Phí/km (đ)</label>
          <input type="number" id="deliveryCostPerKm" class="w-full border border-muted rounded-lg px-3 py-2" min="0" step="100">
        </div>
        <div>
          <label class="block text-sm font-medium text-main mb-1">Phí cơ bản (đ)</label>
          <input type="number" id="deliveryBaseCost" class="w-full border border-muted rounded-lg px-3 py-2" min="0">
        </div>
        <div class="border-t border-muted pt-4">
          <label class="block text-sm font-medium text-main mb-1">📍 Vị trí kho/xưởng</label>
          <div class="grid grid-cols-2 gap-2">
            <div><label class="text-xs text-muted">Vĩ độ</label><input type="number" id="distributorLat" class="w-full border border-muted rounded-lg px-3 py-2" step="0.0001"></div>
            <div><label class="text-xs text-muted">Kinh độ</label><input type="number" id="distributorLng" class="w-full border border-muted rounded-lg px-3 py-2" step="0.0001"></div>
          </div>
          <button onclick="getDistributorLocation()" class="mt-2 text-sm text-info">📍 Lấy vị trí hiện tại</button>
        </div>
      </div>
      <div class="flex gap-2 mt-6">
        <button onclick="hideSettings()" class="flex-1 btn btn-ghost">Hủy</button>
        <button onclick="saveSettings()" class="flex-1 btn btn-primary">Lưu</button>
      </div>
    </div>
  </div>

  <!-- Load realtime state + delivery JS -->
  <!-- realtime.js auto-loaded by layout.js -->
  <script src="/js/delivery.js" defer></script>
  <script>
    // Render header + bottom nav using layout.js functions
    const headerActions = `
      <button onclick="showSettings()" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px;color:var(--color-text-muted);">⚙️</button>
    `;
    
    document.getElementById('app').innerHTML =
      getHeaderWithActions('Giao hàng', '🚚', headerActions) +
      getContent(`
        <div class="delivery-map-wrap">
          <div id="map"></div>
        </div>

        <div class="section-title">🚚 Khách hàng</div>
        <div class="flex gap-2 mb-4">
          <button onclick="getCurrentLocation()" class="flex-1 btn btn-primary flex items-center justify-center gap-2">📍 Vị trí hiện tại</button>
          <button onclick="optimizeRoute()" class="flex-1 btn btn-secondary">⚡ Tối ưu lộ trình</button>
        </div>

        <div id="customersList" class="space-y-2">
          <!-- Rendered by delivery.js -->
        </div>
      `) +
      getBottomNav('/delivery');
  </script>
</body>
</html>
