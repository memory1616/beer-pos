<!DOCTYPE html>
<html lang="vi">
<head>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kho hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css?v=20260404c">
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260414a"></script>
  <script>requireAuth();</script>
  <style>
    .animate-fade { animation: fade 0.3s ease-in; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    button, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body class="bg-main text-primary body--app">
  <div id="app"></div>

  <!-- Floating Add Button -->
  <button onclick="openProductModal()" class="fixed bottom-24 right-4 w-14 h-14 bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center text-2xl font-bold transition-all duration-200 hover:scale-105 z-40">
    +
  </button>

  <!-- Product Modal -->
  <div id="productModal" class="fixed inset-0 bg-overlay z-50 hidden items-center justify-center p-4">
    <div class="bg-card rounded-xl w-full max-w-sm">
      <div class="p-4 border-b border-muted flex justify-between items-center">
        <h3 id="modalTitle" class="font-bold text-lg text-main">Thêm sản phẩm</h3>
        <button onclick="closeProductModal()" class="text-2xl text-muted hover:text-main">&times;</button>
      </div>
      <form id="productForm" class="p-4 space-y-3">
        <input type="hidden" id="productId">
        <div>
          <label class="block text-sm font-medium text-main mb-1">Tên sản phẩm</label>
          <input type="text" id="productName" required class="w-full border border-muted rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary" placeholder="Nhập tên sản phẩm">
        </div>
        <div>
          <label class="block text-sm font-medium text-main mb-1">Loại bao bì</label>
          <select id="productType" class="w-full border border-muted rounded-lg px-3 py-2">
            <option value="keg">📦 Bình (Keg)</option>
            <option value="pet">🧴 Chai Nhựa (Pet)</option>
            <option value="box">📦 Hộp (Box) 23L</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-main mb-1">Giá vốn (đ)</label>
          <input type="number" id="productCostPrice" step="1000" class="w-full border border-muted rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary" placeholder="0">
        </div>
        <div id="stockField">
          <label class="block text-sm font-medium text-main mb-1">Số lượng tồn</label>
          <input type="number" id="productStock" class="w-full border border-muted rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary" placeholder="0">
        </div>
        <div class="flex gap-2 pt-2">
          <button type="button" onclick="closeProductModal()" class="btn btn-ghost flex-1 h-11">Huỷ</button>
          <button type="submit" class="btn btn-primary flex-1 h-11">Lưu</button>
        </div>
        <button type="button" id="deleteProductBtn" onclick="deleteProduct()" class="btn btn-danger w-full h-11 mt-2 hidden">🗑️ Xoá sản phẩm</button>
      </form>
    </div>
  </div>

  <!-- Purchase Edit Modal -->
  <div id="purchaseModal" class="fixed inset-0 bg-overlay z-50 hidden items-center justify-center p-4">
    <div class="bg-card rounded-xl w-full max-w-sm max-h-[80vh] flex flex-col">
      <div class="p-4 border-b border-muted flex justify-between items-center">
        <h3 class="font-bold text-lg text-main">Sửa đơn nhập</h3>
        <button onclick="closePurchaseModal()" class="text-2xl text-muted hover:text-main">&times;</button>
      </div>
      <form id="editPurchaseForm" class="p-4 space-y-3 overflow-y-auto flex-1">
        <input type="hidden" id="editPurchaseId">
        <div>
          <label class="block text-sm font-medium text-main mb-1">Ghi chú</label>
          <input type="text" id="editPurchaseNote" class="w-full border border-muted rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary" placeholder="Ghi chú...">
        </div>
        <div id="editPurchaseItems" class="space-y-3 max-h-64 overflow-y-auto pr-1">
          <!-- Items loaded via JS -->
        </div>
        <div class="flex gap-2 pt-2">
          <button type="button" onclick="closePurchaseModal()" class="btn btn-ghost flex-1 h-11">Huỷ</button>
          <button type="submit" class="btn btn-primary flex-1 h-11">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (async () => {
      await loadVersion();
      document.getElementById('app').innerHTML = 
        getHeader('Kho hàng', '📦') +
      getContent(`
        <!-- Loading -->
        <div id="loading" class="text-center py-8">
          <div class="animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full mx-auto"></div>
          <div class="text-muted mt-2">Đang tải...</div>
        </div>

        <div id="contentSection" class="hidden">
          <!-- STOCK SUMMARY -->
          <div class="section-title">Tổng tồn kho</div>
          <div class="card stat-card--green mb-4">
            <div class="sc-label"><span class="sc-icon">📦</span> Tổng tồn kho</div>
            <div class="sc-value text-primary" id="totalStock">0</div>
            <div class="sc-sub">bình các loại</div>
          </div>

          <!-- PRODUCT GRID -->
          <div class="mb-4">
            <div class="section-title">Danh sách sản phẩm</div>
            <!-- Search Input -->
            <div class="mb-3">
              <input type="text" id="stockSearchInput" placeholder="🔍 Tìm sản phẩm..." 
                class="w-full border border-muted rounded-xl px-4 py-3 text-base shadow-sm focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none"
                oninput="handleStockSearch(this.value)">
            </div>
            <div class="product-grid" id="productList">
              <!-- Products loaded via JS -->
            </div>
          </div>

          <!-- IMPORT FORM -->
          <div class="card mb-4">
            <h3 class="font-bold text-base mb-3">📦 Nhập hàng</h3>
            <div id="importProducts" class="space-y-4 max-h-96 overflow-y-auto mb-3">
              <!-- Products loaded via JS -->
            </div>
            <div class="border-t border-muted pt-3 mt-3">
              <div class="flex justify-between items-center mb-3">
                <span class="font-medium text-main">Tổng tiền:</span>
                <div id="importTotal"><div class="money text-money"><span class="value text-xl font-bold tabular-nums">0</span><span class="unit">đ</span></div></div>
              </div>
              <button type="button" onclick="submitImport()" class="btn btn-primary w-full h-12">✅ Nhập kho</button>
            </div>
          </div>

          <!-- Purchase History -->
          <div id="purchaseHistorySection" class="card mb-4">
            <h3 class="font-bold text-base mb-3">📋 Lịch sử nhập hàng</h3>
            <div id="purchaseHistoryList">
              <!-- Loaded via JS -->
            </div>
          </div>
        </div>
      `) +
      getBottomNav('/stock');
    })();
  </script>

  <!-- Load Utils (formatVND, showToast) then Stock JS -->
  <script src="/js/utils.js"></script>
  <script src="/js/realtime.js"></script>
  <script src="/js/stock.js?v=20260416-realtime"></script>
  
  <script>
    async function loadData() {
      try {
        const res = await fetch('/stock/data', { cache: 'no-store' });
        const data = await res.json();
        
        // Initialize stock page
        try {
          initStockPage(data);
        } catch (e) {
          console.error('Init error:', e);
        }
        
        // Hide loading, show content
        const loading = document.getElementById('loading');
        const contentSection = document.getElementById('contentSection');
        if (loading) loading.classList.add('hidden');
        if (contentSection) contentSection.classList.remove('hidden');
        
      } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('loading').innerHTML = '<div class="text-danger text-center py-8">Lỗi tải dữ liệu</div>';
      }
    }
    
    loadData();
  </script>
  
  <!-- PERFORMANCE: db.js + sync.js non-blocking via requestIdleCallback -->
  <script>
    var _ric = window.requestIdleCallback || function(cb) { return setTimeout(cb, 200); };
    _ric(function() {
      var s1 = document.createElement('script');
      s1.src = '/js/vendor/dexie.min.js?v=20260405';
      document.head.appendChild(s1);
      s1.onload = function() {
        var s2 = document.createElement('script');
        s2.src = '/db.js?v=20260405';
        document.head.appendChild(s2);
        s2.onload = function() {
          var s3 = document.createElement('script');
          s3.src = '/sync.js?v=20260405';
          document.head.appendChild(s3);
        };
      };
    }, { timeout: 8000 });

    if ('serviceWorker' in navigator) {
      if (!navigator.serviceWorker.controller) {
        navigator.serviceWorker.register('/sw.js?v=20260405b').catch(function() {});
      }
    }
  </script>
</body>
</html>
