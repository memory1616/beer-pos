<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- NO-FLICKER: Apply theme BEFORE first paint to prevent flash -->
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kho hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/unified.css?v=20260412-app-shell">
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260410-binance"></script>
  <script>requireAuth();</script>
  <script src="/js/utils.js"></script>
</head>
<body class="bg-main text-primary body--app">
  <div id="app"></div>

  <!-- Floating Add Button — .fab class from unified.css -->
  <button onclick="openProductModal()" class="fab">+</button>

  <!-- Product Modal -->
  <div id="productModal" class="modal-overlay-v2 hidden center">
    <div class="modal-sheet-v2">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title" id="modalTitle">Thêm sản phẩm</div>
        <button onclick="closeProductModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body">
        <form id="productForm" class="space-y-3">
          <input type="hidden" id="productId">
          <div>
            <label class="field-label">Tên sản phẩm</label>
            <input type="text" id="productName" required
              class="bn-input"
              placeholder="Nhập tên sản phẩm">
          </div>
          <div>
            <label class="field-label">Loại bao bì</label>
            <select id="productType" class="bn-select">
              <option value="keg">📦 Bình (Keg)</option>
              <option value="pet">🧴 Chai Nhựa (Pet)</option>
              <option value="box">📦 Hộp (Box) 23L</option>
            </select>
          </div>
          <div>
            <label class="field-label">Giá vốn (đ)</label>
            <input type="number" id="productCostPrice" step="1000"
              class="bn-input"
              placeholder="0">
          </div>
          <div id="stockField">
            <label class="field-label">Số lượng tồn</label>
            <input type="number" id="productStock"
              class="bn-input"
              placeholder="0">
          </div>
          <div class="flex gap-2 pt-2">
            <button type="button" onclick="closeProductModal()" class="btn btn-ghost flex-1 h-11">Huỷ</button>
            <button type="submit" class="btn btn-primary flex-1 h-11">Lưu</button>
          </div>
          <button type="button" id="deleteProductBtn" onclick="deleteProduct()" class="btn btn-danger w-full h-11 hidden">🗑️ Xoá sản phẩm</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Purchase Edit Modal -->
  <div id="purchaseModal" class="modal-overlay-v2 hidden center">
    <div class="modal-sheet-v2 bn-modal--tall">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title">Sửa đơn nhập</div>
        <button onclick="closePurchaseModal()" class="modal-sheet-v2-close">×</button>
      </div>
      <div class="modal-sheet-v2-body overflow-y-auto" style="max-height:60vh;">
        <form id="editPurchaseForm" class="space-y-3">
          <input type="hidden" id="editPurchaseId">
          <div>
            <label class="field-label">Ghi chú</label>
            <input type="text" id="editPurchaseNote"
              class="bn-input"
              placeholder="Ghi chú...">
          </div>
          <div id="editPurchaseItems" class="space-y-3"></div>
          <div class="flex gap-2 pt-2">
            <button type="button" onclick="closePurchaseModal()" class="btn btn-ghost flex-1 h-11">Huỷ</button>
            <button type="submit" class="btn btn-primary flex-1 h-11">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (async () => {
      console.log('[Stock] IIFE START — window.loadScript=' + typeof window.loadScript);
      await loadVersion();
      console.log('[Stock] loadVersion done, setting innerHTML...');
      document.getElementById('app').innerHTML =
        getHeader('Kho hàng', '📦') +
      getContent(`
        <!-- Loading -->
        <div id="loading" class="text-center py-8">
          <div class="animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full mx-auto"></div>
          <div class="text-muted mt-2">Đang tải...</div>
        </div>

        <div id="contentSection" class="hidden">
          <!-- STOCK SUMMARY -->
          <div class="section-title">Tổng tồn kho</div>
          <div class="card stat-card--green mb-4">
            <div class="sc-label"><span class="sc-icon">📦</span> Tổng tồn kho</div>
            <div class="sc-value text-primary" id="totalStock">0</div>
            <div class="sc-sub">bình các loại</div>
          </div>

          <!-- PRODUCT GRID -->
          <div class="mb-4">
            <div class="section-title">Danh sách sản phẩm</div>
            <!-- Search Input -->
            <div class="mb-3">
              <input type="text" id="stockSearchInput" placeholder="🔍 Tìm sản phẩm..." 
                class="w-full border border-muted rounded-xl px-4 py-3 text-base shadow-sm focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none"
                oninput="handleStockSearch(this.value)">
            </div>
            <div class="product-grid" id="productList">
              <!-- Products loaded via JS -->
            </div>
          </div>

          <!-- IMPORT FORM -->
          <div class="card mb-4">
            <h3 class="font-bold text-base mb-3">📦 Nhập hàng</h3>
            <div id="importProducts" class="space-y-4 max-h-96 overflow-y-auto mb-3">
              <!-- Products loaded via JS -->
            </div>
            <div class="border-t border-muted pt-3 mt-3">
              <div class="flex justify-between items-center mb-3">
                <span class="font-medium text-main">Tổng tiền:</span>
                <div id="importTotal"><div class="money text-money"><span class="value text-xl font-bold tabular-nums">0</span><span class="unit">đ</span></div></div>
              </div>
              <button type="button" onclick="submitImport()" class="btn btn-primary w-full h-12">✅ Nhập kho</button>
            </div>
          </div>

          <!-- Purchase History -->
          <div id="purchaseHistorySection" class="card mb-4">
            <h3 class="font-bold text-base mb-3">📋 Lịch sử nhập hàng</h3>
            <div id="purchaseHistoryList">
              <!-- Loaded via JS -->
            </div>
          </div>
        </div>
      `) +
      getBottomNav('/stock');

      // CRITICAL: load Dexie + db.js BEFORE stock.js / loadData
      // requestIdleCallback is too slow — load synchronously here
      await loadScript('/js/vendor/dexie.min.js?v=20260408');
      await loadScript('/db.js?v=20260418a');

      // Wait for DOM paint, then load stock.js, then call loadData()
      await new Promise(resolve => requestAnimationFrame(resolve));
      await new Promise(resolve => setTimeout(resolve, 0));
      await loadScript('/js/stock.js?v=20260410-searchfix');

      // Ensure DOM is ready before rendering
      if (document.readyState === 'loading') {
        await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve, { once: true }));
      }
      console.log('[Stock] DOM ready, calling loadData...');
      await loadData();
    })();

    async function loadScript(src) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }
  </script>
  
  <!-- PERFORMANCE: sync.js non-blocking via requestIdleCallback.
       dexie + db.js are loaded synchronously in the IIFE above (before stock.js).
       DO NOT reload them here — db.js has _dbInitialized guard to prevent double-init. -->
  <script>
    var _ric = window.requestIdleCallback || function(cb) { return setTimeout(cb, 200); };
    _ric(function() {
      // Only load sync.js — dexie + db.js already loaded by IIFE
      var s3 = document.createElement('script');
      s3.src = '/sync.js?v=20260408';
      document.head.appendChild(s3);
    }, { timeout: 8000 });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(function (reg) {
        if (!reg) {
          navigator.serviceWorker.register('/sw.js?v=20260422a').catch(function () {});
        }
      });
    }
  </script>
</body>
</html>
