<!DOCTYPE html>
<html lang="vi">
<head>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nhập hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css">
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script>requireAuth();</script>
  <style>
    .animate-fade { animation: fade 0.3s ease-in; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .bottomnav { max-width: 500px; margin: auto; left: 0; right: 0; }
    button, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body class="bg-main text-primary min-h-screen pb-20">
  <header class="sticky top-0 bg-white border-b border-muted z-50">
    <div class="flex items-center justify-between px-4 h-12 max-w-md mx-auto">
      <div class="flex items-center gap-2">
        <span class="text-xl">📥</span>
        <span class="font-semibold text-sm text-main">Nhập hàng</span>
      </div>
      <div class="flex gap-3 text-xl">
        <a href="/" class="text-muted hover:bg-bg-hover px-2 rounded">🏠</a>
      </div>
    </div>
  </header>

  <main class="p-4 pt-14 pb-24 max-w-md mx-auto animate-fade">
    <!-- Tab Navigation -->
    <div class="flex gap-2 mb-4">
      <button onclick="switchTab('new')" id="tabNew" class="btn btn-primary flex-1 h-11">📝 Nhập mới</button>
      <button onclick="switchTab('history')" id="tabHistory" class="btn btn-secondary flex-1 h-11">📋 Lịch sử</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-8">
      <div class="animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full mx-auto"></div>
      <div class="text-muted mt-2">Đang tải...</div>
    </div>

    <!-- New Purchase Form -->
    <div id="newPurchaseSection" class="hidden">
      <!-- Keg Inventory Status -->
      <div id="kegInventorySection" class="card p-3 mb-4">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-xs text-muted">Kho vỏ</div>
            <div class="text-xl font-bold text-success" id="kegInventoryDisplay">-</div>
          </div>
          <a href="/kegs" class="text-xs text-info font-medium hover:bg-bg-hover px-2 py-1 rounded">📋 Quản lý</a>
      </div>

      <div class="card p-4 mb-4">
        <h3 class="font-bold text-lg mb-3">📦 Nhập hàng</h3>
        <div class="space-y-4 max-h-96 overflow-y-auto" id="productList">
          <!-- Products loaded via JS -->
        </div>
      </div>

      <!-- Cart Summary -->
      <div class="card p-4 mb-4 sticky top-24">
        <h3 class="font-bold text-lg mb-2">🛒 Giỏ nhập hàng</h3>
        <div id="cartItems" class="space-y-2 mb-3 max-h-40 overflow-y-auto">
          <div class="text-muted text-sm text-center py-2">Chưa chọn sản phẩm nào</div>
        </div>
        <div class="border-t border-muted pt-2 flex justify-between items-center">
          <div class="font-bold text-lg text-main">Tổng tiền:</div>
          <div id="cartTotal" class="money text-money text-xl">0 <span class="unit">đ</span></div>
        </div>
        <input type="text" id="purchaseNote" placeholder="Ghi chú (tùy chọn)" class="w-full border border-muted rounded-lg px-3 py-2 mt-3 focus:ring-2 focus:ring-amber-500">
        <button onclick="submitPurchase()" id="submitBtn" class="btn btn-primary w-full h-12 mt-3" disabled>
          ✅ Xác nhận nhập hàng
        </button>
      </div>
    </div>

    <!-- Purchase History -->
    <div id="historySection" class="hidden">
      <div class="space-y-3" id="historyList">
        <!-- History loaded via JS -->
      </div>
      <div id="historyPagination" class="hidden mt-4 flex items-center justify-between">
        <button type="button" id="historyPrev" class="btn btn-secondary px-4 h-10" disabled>← Trước</button>
        <span id="historyPageInfo" class="text-sm text-muted">Trang 1 / 1</span>
        <button type="button" id="historyNext" class="btn btn-secondary px-4 h-10" disabled>Sau →</button>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottomnav">
    <a href="/">
      <span class="icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="/delivery">
      <span class="icon">🚚</span>
      <span>Giao</span>
    </a>
    <a href="/sale">
      <span class="icon">🍺</span>
      <span>Bán</span>
    </a>
    <a href="/customers">
      <span class="icon">👤</span>
      <span>KH</span>
    </a>
    <a href="/devices"
      <span class="icon">📦</span>
      <span>TB</span>
    </a>
  </nav>

  <!-- Load Utils (formatVND, showToast) then Purchases JS -->
  <script src="/js/utils.js"></script>
  <script src="/js/purchases.js"></script>
  
  <script>
    // Check URL for tab parameter
    const urlParams = new URLSearchParams(window.location.search);
    const initialTab = urlParams.get('tab') || 'history';
    
    const HISTORY_PAGE_SIZE = 5;
    let allPurchases = [];
    let historyCurrentPage = 1;
    
    function renderHistoryPage() {
      const historyList = document.getElementById('historyList');
      const pagination = document.getElementById('historyPagination');
      const prevBtn = document.getElementById('historyPrev');
      const nextBtn = document.getElementById('historyNext');
      const pageInfo = document.getElementById('historyPageInfo');
      
      if (!historyList) return;
      
      const total = allPurchases.length;
      const totalPages = Math.max(1, Math.ceil(total / HISTORY_PAGE_SIZE));
      historyCurrentPage = Math.min(historyCurrentPage, totalPages);
      const start = (historyCurrentPage - 1) * HISTORY_PAGE_SIZE;
      const pagePurchases = allPurchases.slice(start, start + HISTORY_PAGE_SIZE);
      
      if (total === 0) {
        historyList.innerHTML = '<div class="text-center text-muted py-8">Chưa có phiếu nhập nào</div>';
        if (pagination) pagination.classList.add('hidden');
        return;
      }
      
      historyList.innerHTML = pagePurchases.map(p => {
        const dateStr = new Date(p.date).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const count = p.item_count != null ? p.item_count : (p.items_summary ? p.items_summary.split(',').length : 0);
        return `
        <div class="bg-white rounded-xl shadow-sm border border-muted p-4 flex items-center justify-between gap-3">
          <div class="flex-1 min-w-0">
            <div class="font-bold text-main">Đơn #${p.id}</div>
            <div class="text-sm text-muted mt-0.5">${dateStr} • ${count} sản phẩm</div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <span class="money text-money text-lg">${formatVND(p.total_amount)} <span class="unit">đ</span></span>
            <button onclick="editPurchase(${p.id})" class="btn btn-ghost text-warning h-8 w-8 text-base p-0" title="Sửa">✏️</button>
            <button onclick="deletePurchase(${p.id})" class="btn btn-ghost text-muted h-8 w-8 text-base p-0" title="Xóa">🗑️</button>
          </div>
        </div>`;
      }).join('');
      
      if (pagination) {
        pagination.classList.remove('hidden');
        pageInfo.textContent = 'Trang ' + historyCurrentPage + ' / ' + totalPages;
        prevBtn.disabled = historyCurrentPage <= 1;
        nextBtn.disabled = historyCurrentPage >= totalPages;
      }
    }
    
    function goToHistoryPage(page) {
      historyCurrentPage = page;
      renderHistoryPage();
    }
    
    // Load data on page load
    async function loadData() {
      try {
        const res = await fetch('/purchases/data?t=' + Date.now(), { cache: 'no-store' });
        const data = await res.json();
        
        // Load keg inventory balance
        try {
          const kegRes = await fetch('/api/kegs/inventory');
          const kegData = await kegRes.json();
          document.getElementById('kegInventoryDisplay').textContent = kegData.balance + ' vỏ';
        } catch (e) {
          console.log('Failed to load keg inventory:', e);
          document.getElementById('kegInventoryDisplay').textContent = '0 vỏ';
        }
        
        // Render products - layout rõ ràng: tên SP, giá vốn 1 dòng, ô SL
        const productList = document.getElementById('productList');
        productList.innerHTML = data.products.map(p => `
          <div class="p-3 border border-muted rounded-xl ${p.cost_price > 0 ? 'bg-primary/5' : 'bg-bg'}">
            <div class="text-sm font-semibold text-main">${p.name}</div>
            <div class="text-xs text-muted mt-0.5">Giá vốn: ${formatVND(p.cost_price || 0)} · Tồn: ${p.stock}</div>
            <input type="number"
              id="qty-${p.id}"
              data-product-id="${p.id}"
              data-cost="${p.cost_price || 0}"
              data-name="${p.name}"
              min="0"
              placeholder="Nhập SL"
              class="mt-2 w-full border-2 border-muted rounded-lg p-2.5 text-center font-medium focus:ring-2 focus:ring-primary"
              onchange="updateCart()"
              oninput="updateCart()">
          </div>
        `).join('');
        
        // Lưu toàn bộ đơn nhập, hiển thị 5 đơn/trang
        allPurchases = data.purchases || [];
        historyCurrentPage = 1;
        renderHistoryPage();
        
        // Gắn sự kiện phân trang
        const prevBtn = document.getElementById('historyPrev');
        const nextBtn = document.getElementById('historyNext');
        if (prevBtn) prevBtn.onclick = () => goToHistoryPage(historyCurrentPage - 1);
        if (nextBtn) nextBtn.onclick = () => goToHistoryPage(historyCurrentPage + 1);
        
        // Switch to the appropriate tab
        try {
          switchTab(initialTab);
        } catch (e) {
          console.error('Switch tab error:', e);
        }
        
        // Hide loading
        const loading = document.getElementById('loading');
        if (loading) loading.classList.add('hidden');
        
      } catch (err) {
        console.error('Failed to load data:', err);
        const loading = document.getElementById('loading');
        if (loading) loading.innerHTML = '<div class="text-danger text-center py-8">Lỗi tải dữ liệu</div>';
      }
    }
    
    loadData();
  </script>
  
  <script src="/js/vendor/dexie.min.js"></script>
  <script src="/db.js"></script>
  <script src="/js/debug.js"></script>
  <script>
  // Check authentication
  if (!isLoggedIn()) { window.location.href = '/login'; }

  // Service Worker — bật offline-first caching
  if ('serviceWorker' in navigator) {
    if (!navigator.serviceWorker.controller) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log('[SW] Registration failed:', err));
    }
  }
  </script>
  <script src="/sync.js"></script>
</body>
</html>
