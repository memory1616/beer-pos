<!DOCTYPE html>
<html lang="vi">
<head>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nhập hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/unified.css?v=20260410-spacing">
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260410-binance"></script>
  <script>requireAuth();</script>
</head>
<body class="bg-main text-primary body--app">
  <div id="app"></div>

  <script src="/js/utils.js"></script>
  <!-- realtime.js auto-loaded by layout.js -->
  <script src="/js/purchases.js?v=20260410-binance"></script>

  <script>
    // --- State & configuration ---
    var HISTORY_PAGE_SIZE = 5;
    var allPurchases = [];
    var historyCurrentPage = 1;

    // Check URL for tab parameter
    var urlParams = new URLSearchParams(window.location.search);
    var initialTab = urlParams.get('tab') || 'history';

    // --- Data functions (defined first so they are available globally) ---
    function purchaseHistoryTotalHtml(amount) {
      var n = Number(amount);
      var num = Number.isFinite(n) ? n : 0;
      var formatted = new Intl.NumberFormat('vi-VN').format(num);
      return (
        '<div class="card-stat-amount text-success justify-end text-sm sm:text-base font-bold">' +
        '<span class="tabular-nums tracking-tight">' + formatted + '</span>' +
        '<span class="text-[10px] sm:text-xs opacity-75 shrink-0">đ</span>' +
        '</div>'
      );
    }

    function renderHistoryPage() {
      var historyList = document.getElementById('historyList');
      var pagination = document.getElementById('historyPagination');
      var prevBtn = document.getElementById('historyPrev');
      var nextBtn = document.getElementById('historyNext');
      var pageInfo = document.getElementById('historyPageInfo');
      if (!historyList) return;

      var total = allPurchases.length;
      var totalPages = Math.max(1, Math.ceil(total / HISTORY_PAGE_SIZE));
      historyCurrentPage = Math.min(historyCurrentPage, totalPages);
      var start = (historyCurrentPage - 1) * HISTORY_PAGE_SIZE;
      var pagePurchases = allPurchases.slice(start, start + HISTORY_PAGE_SIZE);

      if (total === 0) {
        historyList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Chưa có phiếu nhập nào</div><div class="empty-state-desc">Nhấn <strong>+ Nhập mới</strong> để tạo đơn nhập hàng đầu tiên</div></div>';
        if (pagination) pagination.classList.add('hidden');
        return;
      }

      historyList.innerHTML = pagePurchases.map(function(p) {
        var dateStr = new Date(p.date).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
        var count = p.item_count != null ? p.item_count : (p.items_summary ? p.items_summary.split(',').length : 0);
        return '<div class="purchase-history-item rounded-xl border border-muted bg-bg/40 p-3 mb-2 last:mb-0" data-purchase-id="' + p.id + '">' +
          '<div class="flex items-start justify-between gap-2 min-w-0">' +
          '<div class="min-w-0 flex-1">' +
          '<div class="font-semibold text-primary">Đơn #' + p.id + '</div>' +
          '<div class="text-xs text-muted mt-0.5">' + dateStr + ' · ' + count + ' sản phẩm</div></div>' +
          '<div class="flex items-center gap-0.5 shrink-0">' +
          '<button type="button" onclick="editPurchase(' + p.id + ')" class="btn btn-ghost btn-sm min-w-[2.25rem] h-9 px-0" title="Sửa">✏️</button>' +
          '<button type="button" onclick="deletePurchase(' + p.id + ')" class="btn btn-ghost btn-sm min-w-[2.25rem] h-9 px-0 text-danger" title="Xóa">🗑️</button>' +
          '</div></div>' +
          '<div class="mt-2.5 pt-2.5 border-t border-muted/70 flex items-center justify-between gap-3 min-w-0">' +
          '<span class="text-xs text-muted shrink-0">Tổng tiền</span>' +
          purchaseHistoryTotalHtml(p.total_amount) +
          '</div></div>';
      }).join('');

      if (pagination) {
        pagination.classList.remove('hidden');
        pageInfo.textContent = historyCurrentPage + ' / ' + totalPages;
        var itemCountEl = document.getElementById('historyItemCount');
        if (itemCountEl) itemCountEl.textContent = total + ' phiếu';
        var prevD = historyCurrentPage <= 1;
        var nextD = historyCurrentPage >= totalPages;
        prevBtn.disabled = prevD;
        nextBtn.disabled = nextD;
        if (prevD) {
          prevBtn.className = 'min-w-[44px] min-h-[44px] w-11 h-11 rounded-full flex items-center justify-center text-base font-semibold border border-muted/30 bg-bg text-muted cursor-not-allowed opacity-50 pointer-events-none';
        } else {
          prevBtn.className = 'min-w-[44px] min-h-[44px] w-11 h-11 rounded-full flex items-center justify-center text-base font-semibold border border-muted shadow-sm text-main hover:bg-bg-hover active:scale-90 transition-all';
        }
        if (nextD) {
          nextBtn.className = 'min-w-[44px] min-h-[44px] w-11 h-11 rounded-full flex items-center justify-center text-base font-semibold border border-muted/30 bg-bg text-muted cursor-not-allowed opacity-50 pointer-events-none';
        } else {
          nextBtn.className = 'min-w-[44px] min-h-[44px] w-11 h-11 rounded-full flex items-center justify-center text-base font-semibold border border-muted shadow-sm text-main hover:bg-bg-hover active:scale-90 transition-all';
        }
      }
    }

    function goToHistoryPage(page) {
      historyCurrentPage = page;
      renderHistoryPage();
    }

    function checkPurchasesEmpty() {
      var container = document.getElementById('historyList');
      if (!container) return;
      if (allPurchases.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-8">Chưa có phiếu nhập nào</div>';
      }
    }

    function removePurchaseItem(id) {
      var card = document.querySelector('[data-purchase-id="' + id + '"]');
      if (card) card.remove();
      var remaining = document.querySelectorAll('[data-purchase-id]');
      if (remaining.length === 0) {
        var container = document.getElementById('historyList');
        if (container) container.innerHTML = '<div class="text-center text-muted py-8">Chưa có phiếu nhập nào</div>';
      }
    }

    function updatePurchasesSummary() {
      var total = allPurchases.length;
      var itemCountEl = document.getElementById('historyItemCount');
      if (itemCountEl) itemCountEl.textContent = total + ' phiếu';
    }

    async function loadData() {
      try {
        var res = await fetch('/purchases/data?t=' + Date.now(), { cache: 'no-store' });
        var data = await res.json();

        // Load keg inventory balance
        try {
          var kegRes = await fetch('/api/kegs/inventory');
          var kegData = await kegRes.json();
          var kegEl = document.getElementById('kegInventoryDisplay');
          if (kegEl) kegEl.textContent = kegData.balance + ' vỏ';
        } catch (e) {
          var kegEl = document.getElementById('kegInventoryDisplay');
          if (kegEl) kegEl.textContent = '0 vỏ';
        }

        // Render products
        var productList = document.getElementById('productList');
        if (productList) {
          productList.innerHTML = data.products.map(function(p) {
            return '<div class="p-3 border border-muted rounded-xl ' + (p.cost_price > 0 ? 'bg-primary/5' : 'bg-bg') + '">' +
              '<div class="text-sm font-semibold text-main">' + p.name + '</div>' +
              '<div class="text-xs text-muted mt-0.5">Giá vốn: ' + formatVND(p.cost_price || 0) + ' · Tồn: ' + p.stock + '</div>' +
              '<input type="number"' +
              ' id="qty-' + p.id + '"' +
              ' data-product-id="' + p.id + '"' +
              ' data-cost="' + (p.cost_price || 0) + '"' +
              ' data-name="' + p.name + '"' +
              ' min="0" placeholder="Nhập SL"' +
              ' class="mt-2 w-full border-2 border-muted rounded-lg p-2.5 text-center font-medium focus:ring-2 focus:ring-primary"' +
              ' onchange="updateCart()" oninput="updateCart()">' +
              '</div>';
          }).join('');
        }

        allPurchases = data.purchases || [];
        window.store.purchases = allPurchases;
        historyCurrentPage = 1;
        renderHistoryPage();

        var prevBtn = document.getElementById('historyPrev');
        var nextBtn = document.getElementById('historyNext');
        if (prevBtn) prevBtn.onclick = function() { goToHistoryPage(historyCurrentPage - 1); };
        if (nextBtn) nextBtn.onclick = function() { goToHistoryPage(historyCurrentPage + 1); };

        try { switchTab(initialTab); } catch (e) {}

        var loading = document.getElementById('loading');
        if (loading) loading.classList.add('hidden');

      } catch (err) {
        var loading = document.getElementById('loading');
        if (loading) loading.innerHTML = '<div class="text-danger text-center py-8">Lỗi tải dữ liệu</div>';
      }
    }

    // --- Render layout: header + content + bottom nav ---
    var headerActions = '<a href="/" class="btn btn-ghost">🏠</a>';

    document.getElementById('app').innerHTML =
      getHeaderWithActions('Nhập hàng', '📥', headerActions) +
      getContent(`
        <!-- Tab Navigation -->
        <div class="flex gap-2 mb-4">
          <button onclick="switchTab('new')" id="tabNew" class="tab-btn active flex-1">📝 Nhập mới</button>
          <button onclick="switchTab('history')" id="tabHistory" class="tab-btn flex-1">📋 Lịch sử</button>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-8">
          <div class="animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full mx-auto"></div>
          <div class="text-muted mt-2">Đang tải...</div>
        </div>

        <!-- New Purchase Form -->
        <div id="newPurchaseSection" class="hidden">
          <!-- Keg Inventory Status -->
          <div id="kegInventorySection" class="card stat-card--green mb-4">
            <div class="sc-label"><span class="sc-icon">📦</span> Kho vỏ</div>
            <div class="sc-value" id="kegInventoryDisplay">-</div>
            <div class="sc-sub"><a href="/kegs" class="text-xs text-info hover:underline">📋 Quản lý</a></div>
          </div>

          <div class="card stat-card--success mb-4">
            <h3 class="font-bold text-lg mb-3">📦 Nhập hàng</h3>
            <div class="space-y-4 max-h-96 overflow-y-auto" id="productList"></div>
          </div>

          <!-- Cart Summary -->
          <div class="card stat-card--profit mb-4 sticky top-24">
            <h3 class="font-bold text-lg mb-2">🛒 Giỏ nhập hàng</h3>
            <div id="cartItems" class="space-y-2 mb-3 max-h-40 overflow-y-auto">
              <div class="text-muted text-sm text-center py-2">Chưa chọn sản phẩm nào</div>
            </div>
            <div class="border-t border-muted pt-2 flex justify-between items-center">
              <div class="font-bold text-lg text-main">Tổng tiền:</div>
              <div id="cartTotal"><div class="money text-money"><span class="value text-xl font-bold tabular-nums">0</span><span class="unit">đ</span></div></div>
            </div>
            <input type="text" id="purchaseNote" placeholder="Ghi chú (tùy chọn)" class="w-full border border-muted rounded-lg px-3 py-2 mt-3 focus:ring-2 focus:ring-amber-500">
            <button onclick="submitPurchase()" id="submitBtn" class="btn btn-primary w-full h-12 mt-3" disabled>✅ Xác nhận nhập hàng</button>
          </div>
        </div>

        <!-- Purchase History -->
        <div id="historySection" class="hidden">
          <div class="space-y-3" id="historyList"></div>
          <nav id="historyPagination" class="hidden flex items-center justify-center gap-3 mt-4 pt-3 border-t border-muted" role="navigation" aria-label="Phân trang">
            <button type="button" id="historyPrev" onclick="goToHistoryPage(historyCurrentPage - 1)"
              class="min-w-[44px] min-h-[44px] w-11 h-11 rounded-full flex items-center justify-center text-base font-semibold border border-muted/30 bg-bg text-muted cursor-not-allowed opacity-50 pointer-events-none"
              disabled aria-label="Trang trước">‹</button>
            <div class="flex flex-col justify-center items-center min-w-[4.5rem]">
              <span id="historyPageInfo" class="text-sm font-bold text-main tabular-nums leading-tight">1 / 1</span>
              <span id="historyItemCount" class="text-[11px] text-muted leading-tight mt-0.5">0 phiếu</span>
            </div>
            <button type="button" id="historyNext" onclick="goToHistoryPage(historyCurrentPage + 1)"
              class="min-w-[44px] min-h-[44px] w-11 h-11 rounded-full flex items-center justify-center text-base font-semibold border border-muted/30 bg-bg text-muted cursor-not-allowed opacity-50 pointer-events-none"
              disabled aria-label="Trang sau">›</button>
          </nav>
        </div>
      `) +
      getBottomNav('/purchases');

    function shouldRefreshPurchasesShellEntity(entity) {
      if (!entity) return true;
      return entity === 'purchase' || entity === 'product' || entity === 'stock' || entity === 'sync';
    }

    function shouldRefreshPurchasesShellPath(pathname) {
      if (!pathname) return false;
      return pathname.indexOf('/api/purchases') === 0 ||
        pathname.indexOf('/api/products') === 0 ||
        pathname.indexOf('/api/stock') === 0 ||
        pathname.indexOf('/purchases/data') === 0;
    }

    var _purchasesShellRefreshTimer = null;
    var _purchasesShellRefreshInFlight = false;

    function queuePurchasesShellRefresh(reason) {
      clearTimeout(_purchasesShellRefreshTimer);
      _purchasesShellRefreshTimer = setTimeout(async function() {
        if (_purchasesShellRefreshInFlight) return;
        _purchasesShellRefreshInFlight = true;
        try {
          await loadData();
        } finally {
          _purchasesShellRefreshInFlight = false;
        }
      }, 180);
    }

    window.addEventListener('data:mutated', function(evt) {
      var detail = evt && evt.detail ? evt.detail : {};
      if (!shouldRefreshPurchasesShellEntity(detail.entity)) return;
      queuePurchasesShellRefresh(detail.entity || 'mutation');
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', function(event) {
        var data = event && event.data ? event.data : {};
        if (data.type !== 'DATA_INVALIDATED') return;
        if (!shouldRefreshPurchasesShellPath(data.path || '')) return;
        queuePurchasesShellRefresh('sw:' + (data.path || 'unknown'));
      });
    }

    // --- Load data after layout is rendered ---
    loadData();
  </script>

  <!-- PERFORMANCE: db.js + sync.js non-blocking via requestIdleCallback -->
  <script>
    var _ric = window.requestIdleCallback || function(cb) { return setTimeout(cb, 200); };
    _ric(function() {
      var s1 = document.createElement('script');
      s1.src = '/js/vendor/dexie.min.js?v=20260405';
      document.head.appendChild(s1);
      s1.onload = function() {
        var s2 = document.createElement('script');
        s2.src = '/db.js?v=20260411a';
        document.head.appendChild(s2);
        s2.onload = function() {
          var s3 = document.createElement('script');
          s3.src = '/sync.js?v=20260405';
          document.head.appendChild(s3);
        };
      };
    }, { timeout: 8000 });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(function (reg) {
        if (!reg) {
          var swVer = (typeof window !== 'undefined' && window.APP_VERSION) ? window.APP_VERSION : Date.now();
          navigator.serviceWorker.register('/sw.js?v=' + swVer).catch(function () {});
        }
      });
    }
  </script>
</body>
</html>
