<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- NO-FLICKER: Apply theme BEFORE first paint to prevent flash -->
  <script>
  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Báo cáo</title>
  <link rel="stylesheet" href="/css/unified.css?v=20260412b-app-shell">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="body--app">

    <div class="app-header-left">

        <div class="modal-sheet-v2-body">

    <!-- CHART -->

          <div class="section-card-title">Chi phí nhập hàng</div>
        </div>
        <div class="section-card-arrow">▼</div>
      </div>
      <div class="section-card-body" id="contentPurchases">

  <!-- Bottom nav (from layout.js) -->
  <script>
    if (typeof getBottomNav === 'function') {
      document.body.insertAdjacentHTML('beforeend', getBottomNav('/report'));
    }
  </script>

  <script>
    /* ═══════════════════════════════════════════════════════
       REPORT PAGE - Modern Binance-Style UI
       ═══════════════════════════════════════════════════════ */

    // ── Auth check ──
    if (typeof isLoggedIn === 'function' && !isLoggedIn()) {
      window.location.href = '/login';
    }

    /* ── REPORT MODULE (RPT) ── */
    (function () {
      'use strict';

      // ── State ──
      var _state = {
        filter: 'today',      // today | 7days | month | custom
        startDate: null,
        endDate: null
      };

      var _data = null;
      var _chart = null;
      var _debounceTimer = null;
      var _previousNetProfit = null;
      var _prevData = null; // data from previous period for growth calc

      // ── Date helpers ──
      function toLocalDateStr(d) {
        return d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
      }

      function toDateObj(str) {
        return str ? new Date(str + 'T00:00:00') : null;
      }

      function getDateRange(filter) {
        var now = new Date();
        var y = now.getFullYear(), m = now.getMonth(), d = now.getDate();

        if (filter === 'today') {
          return { start: toLocalDateStr(now), end: toLocalDateStr(now) };
        }
        if (filter === '7days') {
          var start = new Date(now);
          start.setDate(d - 6);
          return { start: toLocalDateStr(start), end: toLocalDateStr(now) };
        }
        if (filter === 'month') {
          var first = new Date(y, m, 1);
          var last = new Date(y, m + 1, 0);
          return { start: toLocalDateStr(first), end: toLocalDateStr(last) };
        }
        if (filter === 'custom') {
          return { start: _state.startDate, end: _state.endDate };
        }
        return { start: toLocalDateStr(now), end: toLocalDateStr(now) };
      }

      function getPreviousDateRange(filter) {
        var range = getDateRange(filter);
        if (filter === 'custom') return null;

        var start = toDateObj(range.start);
        var end = toDateObj(range.end);
        if (!start || !end) return null;

        var diffMs = end - start;
        var prevEnd = new Date(start - 1);
        var prevStart = new Date(prevEnd - diffMs);

        return {
          start: toLocalDateStr(prevStart),
          end: toLocalDateStr(prevEnd)
        };
      }

      // ── Format helpers ──
      function fmtVND(n) {
        if (n == null || isNaN(n)) return '—';
        return new Intl.NumberFormat('vi-VN').format(Math.round(n)) + ' đ';
      }

      function fmtVNDShort(n) {
        if (n == null || isNaN(n)) return '—';
        n = Math.abs(n);
        if (n >= 1000000000) return (n / 1000000000).toFixed(1) + 'B';
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return new Intl.NumberFormat('vi-VN').format(Math.round(n));
      }

      function escHtml(str) {
        if (str == null) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function calcGrowth(current, previous) {
        if (!previous || previous === 0) return null;
        return ((current - previous) / Math.abs(previous)) * 100;
      }

      // ── Load data from /report/data API ──
      function loadData() {
        var range = getDateRange(_state.filter);
        var start = range.start;
        var end = range.end;

        if (!start || !end) {
          showEmptySkeleton();
          return;
        }

        var url = '/report/data?type=custom&startDate=' + start + '&endDate=' + end;
        console.log('[RPT] Loading:', url);

        fetch(url)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            console.log('[RPT] Got:', JSON.stringify(data).substring(0, 200));
            _data = data;
            processAndRender(data);
          })
          .catch(function (err) {
            console.error('[RPT] Error:', err);
            showEmptySkeleton();
          });
      }

      // ── Process API response ──
      function processAndRender(data) {
        var sales = data.sales || [];

        // Calculate totalExpense
        var totalExpense = 0;
        if (data.totalExpense !== undefined) {
          totalExpense = data.totalExpense || 0;
        } else if (data.expenses) {
          totalExpense = (data.expenses || []).reduce(function (s, e) { return s + (e.amount || 0); }, 0);
        }

        // Profit by product
        var byProduct = data.profitByProduct || computeProfitByProduct(sales);

        // Profit by customer
        var byCustomer = data.profitByCustomer || computeProfitByCustomer(sales);

        // Summary
        var revenue = 0, profit = 0;
        sales.forEach(function (s) {
          revenue += s.total || 0;
          profit += s.profit || 0;
        });

        var netProfit = profit - totalExpense;

        // Build daily data for chart
        var daily = buildDailyData(sales);

        // Render everything
        renderKPI(revenue, totalExpense, profit, netProfit);
        renderChart(daily, totalExpense);
        renderTopProducts(byProduct);
        renderTopCustomers(byCustomer);
        renderPurchases(data.purchases || [], data.totalPurchaseAmount);
        updateHeader(netProfit);
      }

      // ── Compute profit by product (client-side fallback) ──
      function computeProfitByProduct(sales) {
        var map = {};
        (sales || []).forEach(function (s) {
          (s.items || []).forEach(function (item) {
            var key = item.product_name || 'Không tên';
            if (!map[key]) map[key] = { name: key, quantity: 0, profit: 0 };
            map[key].quantity += item.quantity || 0;
            map[key].profit += item.profit || 0;
          });
        });
        return Object.values(map).sort(function (a, b) { return b.profit - a.profit; });
      }

      function lineItemLiters(item) {
        var name = item.product_name || item.name || '';
        var m = String(name).match(/(\d+)\s*[Ll]/);
        var per = m ? parseInt(m[1], 10) : 1;
        return per * (Number(item.quantity) || 0);
      }

      function computeProfitByCustomer(sales) {
        var map = {};
        (sales || []).forEach(function (s) {
          var key = s.customer_name || 'Khách lẻ';
          if (!map[key]) map[key] = { name: key, quantity: 0, profit: 0 };
          map[key].profit += s.profit || 0;
          (s.items || []).forEach(function (item) {
            map[key].quantity += lineItemLiters(item);
          });
        });
        return Object.values(map).sort(function (a, b) { return b.profit - a.profit; });
      }

      function buildDailyData(sales) {
        var byDate = {};
        (sales || []).forEach(function (s) {
          var dateKey = s.date ? s.date.split('T')[0] : '';
          if (!dateKey) return;
          if (!byDate[dateKey]) byDate[dateKey] = { date: dateKey, revenue: 0, profit: 0 };
          byDate[dateKey].revenue += s.total || 0;
          byDate[dateKey].profit += s.profit || 0;
        });
        var result = Object.values(byDate).sort(function (a, b) { return a.date.localeCompare(b.date); });
        return result;
      }

      // ── Render: KPI Grid ──
      function renderKPI(revenue, expense, profit, netProfit) {
        animateNumber('kpiRevenue', revenue, fmtVNDShort);
        animateNumber('kpiExpense', expense, fmtVNDShort);
        animateNumber('kpiProfit', profit, fmtVNDShort);
        animateNumber('kpiNetProfit', netProfit, fmtVNDShort);

        // Color coding
        var profitEl = document.getElementById('kpiProfit');
        var netEl = document.getElementById('kpiNetProfit');
        var expEl = document.getElementById('kpiExpense');

        if (profitEl) {
          profitEl.className = 'kpi-card-value ' + (profit >= 0 ? 'green' : 'red');
        }
        if (netEl) {
          netEl.className = 'kpi-card-value ' + (netProfit >= 0 ? 'gold' : 'red');
        }
        if (expEl) {
          expEl.className = 'kpi-card-value red';
        }
      }

      // ── Render: Sticky Header ──
      function updateHeader(netProfit) {
        var profitEl = document.getElementById('headerProfit');
        if (profitEl) profitEl.textContent = fmtVND(netProfit);

        // Growth vs previous period
        var growthEl = document.getElementById('headerGrowth');
        if (growthEl && _prevData !== null) {
          var prevNet = _prevData;
          var growth = calcGrowth(netProfit, prevNet);
          if (growth !== null) {
            var isUp = growth >= 0;
            var arrow = isUp ? '↑' : '↓';
            var cls = isUp ? 'up' : 'down';
            growthEl.className = 'app-header-growth ' + cls;
            growthEl.innerHTML = '<span>' + arrow + ' ' + Math.abs(growth).toFixed(1) + '%</span>';
          } else {
            growthEl.className = 'app-header-growth neutral';
            growthEl.innerHTML = '<span>—</span>';
          }
        }
        _prevData = netProfit;
      }

      // ── Render: Chart ──
      function renderChart(daily, totalExpense) {
        var canvas = document.getElementById('reportChart');
        if (!canvas) return;

        var labels = [];
        var revenues = [];
        var netProfits = [];

        (daily || []).forEach(function (d) {
          labels.push(d.date ? d.date.split('-').reverse().slice(0, 2).join('/') : '');
          revenues.push(d.revenue || 0);
          netProfits.push((d.profit || 0));
        });

        // Use theme-aware colors via CSS variables
        var root = document.documentElement;
        var textColor = getComputedStyle(root).getPropertyValue('--text-muted').trim() || '#848E9C';
        var gridColor = getComputedStyle(root).getPropertyValue('--border').trim() || '#2B3139';
        var primaryColor = getComputedStyle(root).getPropertyValue('--primary').trim() || '#FCD535';
        var greenColor = getComputedStyle(root).getPropertyValue('--green').trim() || '#0ECB81';
        var tooltipBg = getComputedStyle(root).getPropertyValue('--card').trim() || '#1E2329';
        var tooltipText = getComputedStyle(root).getPropertyValue('--text-primary').trim() || '#EAECEF';

        if (_chart) _chart.destroy();

        _chart = new Chart(canvas, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              {
                label: 'Doanh thu',
                data: revenues,
                borderColor: primaryColor,
                backgroundColor: 'rgba(252,213,53,0.08)',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 3,
                pointHoverRadius: 5,
                pointBackgroundColor: primaryColor
              },
              {
                label: 'Lợi nhuận',
                data: netProfits,
                borderColor: greenColor,
                backgroundColor: 'rgba(14,203,129,0.06)',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 3,
                pointHoverRadius: 5,
                pointBackgroundColor: greenColor
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: tooltipBg,
                titleColor: tooltipText,
                bodyColor: textColor,
                borderColor: gridColor,
                borderWidth: 1,
                padding: 10,
                callbacks: {
                  label: function (ctx) {
                    return ' ' + ctx.dataset.label + ': ' + fmtVND(ctx.raw);
                  }
                }
              }
            },
            scales: {
              x: {
                ticks: {
                  color: textColor,
                  font: { size: 10 },
                  maxTicksLimit: 7
                },
                grid: { color: gridColor, lineWidth: 0.5 }
              },
              y: {
                ticks: {
                  color: textColor,
                  font: { size: 10 },
                  callback: function (v) { return fmtVNDShort(v); }
                },
                grid: { color: gridColor, lineWidth: 0.5 }
              }
            }
          }
        });
      }

      // ── Render: Top Products ──
      function renderTopProducts(products) {
        var el = document.getElementById('topProductsList');
        var badge = document.getElementById('badgeProducts');
        if (!el) return;

        if (!products || products.length === 0) {
          el.innerHTML = '<div class="report-empty"><div style="font-size:32px;margin-bottom:8px;opacity:0.5">📦</div>Không có dữ liệu sản phẩm<br><span style="font-size:12px;color:var(--text-muted)">Hãy tạo đơn bán hàng trước</span></div>';
          if (badge) badge.textContent = '0';
          return;
        }

        if (badge) badge.textContent = products.length;

        var totalQty = 0;
        (products || []).forEach(function(p) {
          totalQty += (p.quantity_sold || p.quantity || 0);
        });
        var totalEl = document.getElementById('totalProductQty');
        if (totalEl) totalEl.textContent = 'Tổng SL: ' + totalQty.toLocaleString('vi-VN');

        var medals = ['🥇', '🥈', '🥉'];
        var rankClasses = ['rank-gold', 'rank-silver', 'rank-bronze'];

        var top = products.slice(0, 5);
        var rest = products.slice(5);

        var html = '';

        top.forEach(function (p, i) {
          var rank = i < 3 ? medals[i] : '#' + (i + 1);
          var rankClass = i < 3 ? rankClasses[i] : '';
          var profitColor = p.profit >= 0 ? 'green' : 'red';
          html +=
            '<div class="top-item">' +
              '<div class="top-item-rank ' + rankClass + '">' + rank + '</div>' +
              '<div class="top-item-info">' +
                '<div class="top-item-name">' + escHtml(p.name) + '</div>' +
                '<div class="top-item-meta">SL: ' + (p.quantity_sold || p.quantity || 0) + '</div>' +
              '</div>' +
              '<div class="top-item-value">' +
                '<div class="top-item-profit ' + profitColor + '">' + fmtVND(p.profit) + '</div>' +
              '</div>' +
            '</div>';
        });

        // "Xem thêm" for rest
        if (rest.length > 0) {
          html += '<button class="see-more-toggle" onclick="RPT.toggleMore(this, \'products\')">Xem thêm ' + rest.length + ' sản phẩm ▼</button>';
          html += '<div class="more-items" style="display:none;">';
          rest.forEach(function (p, i) {
            var profitColor = p.profit >= 0 ? 'green' : 'red';
            html +=
              '<div class="top-item">' +
                '<div class="top-item-rank">#' + (i + 6) + '</div>' +
                '<div class="top-item-info">' +
                  '<div class="top-item-name">' + escHtml(p.name) + '</div>' +
                  '<div class="top-item-meta">SL: ' + (p.quantity_sold || p.quantity || 0) + '</div>' +
                '</div>' +
                '<div class="top-item-value">' +
                  '<div class="top-item-profit ' + profitColor + '">' + fmtVND(p.profit) + '</div>' +
                '</div>' +
              '</div>';
          });
          html += '</div>';
        }

        el.innerHTML = html;
      }

      // ── Render: Top Customers ──
      function renderTopCustomers(customers) {
        var el = document.getElementById('topCustomersList');
        var badge = document.getElementById('badgeCustomers');
        if (!el) return;

        if (!customers || customers.length === 0) {
          el.innerHTML = '<div class="report-empty"><div style="font-size:32px;margin-bottom:8px;opacity:0.5">👤</div>Không có dữ liệu khách hàng<br><span style="font-size:12px;color:var(--text-muted)">Hãy thêm khách hàng và tạo đơn</span></div>';
          if (badge) badge.textContent = '0';
          return;
        }

        if (badge) badge.textContent = customers.length;

        var medals = ['🥇', '🥈', '🥉'];
        var rankClasses = ['rank-gold', 'rank-silver', 'rank-bronze'];

        var top = customers.slice(0, 5);
        var rest = customers.slice(5);

        var html = '';

        top.forEach(function (c, i) {
          var rank = i < 3 ? medals[i] : '#' + (i + 1);
          var rankClass = i < 3 ? rankClasses[i] : '';
          var profitColor = c.profit >= 0 ? 'green' : 'red';
          html +=
            '<div class="top-item">' +
              '<div class="top-item-rank ' + rankClass + '">' + rank + '</div>' +
              '<div class="top-item-info">' +
                '<div class="top-item-name">' + escHtml(c.name) + '</div>' +
                '<div class="top-item-meta">' + (c.quantity || 0) + ' Lít</div>' +
              '</div>' +
              '<div class="top-item-value">' +
                '<div class="top-item-profit ' + profitColor + '">' + fmtVND(c.profit) + '</div>' +
              '</div>' +
            '</div>';
        });

        if (rest.length > 0) {
          html += '<button class="see-more-toggle" onclick="RPT.toggleMore(this, \'customers\')">Xem thêm ' + rest.length + ' khách ▼</button>';
          html += '<div class="more-items" style="display:none;">';
          rest.forEach(function (c, i) {
            var profitColor = c.profit >= 0 ? 'green' : 'red';
            html +=
              '<div class="top-item">' +
                '<div class="top-item-rank">#' + (i + 6) + '</div>' +
                '<div class="top-item-info">' +
                  '<div class="top-item-name">' + escHtml(c.name) + '</div>' +
                  '<div class="top-item-meta">' + (c.quantity || 0) + ' Lít</div>' +
                '</div>' +
                '<div class="top-item-value">' +
                  '<div class="top-item-profit ' + profitColor + '">' + fmtVND(c.profit) + '</div>' +
                '</div>' +
              '</div>';
          });
          html += '</div>';
        }

        el.innerHTML = html;
      }

      // ── Render: Purchases ──
      function renderPurchases(purchases, totalAmount) {
        var summaryEl = document.getElementById('purchaseSummaryRow');
        var tableEl = document.getElementById('purchaseTableWrap');

        var amt = totalAmount || 0;
        var count = purchases ? purchases.length : 0;

        if (summaryEl) {
          summaryEl.innerHTML =
            '<div class="purchase-stat-box">' +
              '<div class="purchase-stat-label">Tổng nhập</div>' +
              '<div class="purchase-stat-value">' + fmtVND(amt) + '</div>' +
            '</div>' +
            '<div class="purchase-stat-box">' +
              '<div class="purchase-stat-label">Số phiếu</div>' +
              '<div class="purchase-stat-value" style="color: var(--text-secondary);">' + count + '</div>' +
            '</div>';
        }

        if (!purchases || purchases.length === 0) {
          if (tableEl) tableEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Chưa có phiếu nhập hàng</div><div class="empty-state-desc">Nhập hàng để xem chi phí ở đây</div></div>';
          return;
        }

        var html = '<table class="purchase-mini-table"><thead><tr>';
        html += '<th>Ngày</th>';
        html += '<th class="text-right">Tổng tiền</th>';
        html += '<th>Ghi chú</th>';
        html += '</tr></thead><tbody>';

        (purchases || []).forEach(function (p) {
          var dateStr = p.date ? p.date.substring(0, 10).split('-').reverse().join('/') : '';
          html += '<tr>';
          html += '<td>' + escHtml(dateStr) + '</td>';
          html += '<td class="text-right" style="color: var(--red); font-weight:600;">' + fmtVND(p.total || p.total_amount || p.amount || 0) + '</td>';
          html += '<td class="text-note">' + escHtml(p.note || '') + '</td>';
          html += '</tr>';
        });

        html += '</tbody></table>';

        if (tableEl) tableEl.innerHTML = html;
      }

      // ── Toggle "Xem thêm" ──
      function toggleMore(btn, type) {
        var container = btn.parentNode;
        var moreDiv = container.querySelector('.more-items');
        if (!moreDiv) return;

        var isHidden = moreDiv.style.display === 'none';
        moreDiv.style.display = isHidden ? '' : 'none';
        btn.textContent = isHidden ? 'Thu gọn ▲' : 'Xem thêm ' + (type === 'products' ? _data.profitByProduct.length - 5 : _data.profitByCustomer.length - 5) + ' ' + (type === 'products' ? 'sản phẩm' : 'khách') + ' ▼';
      }

      // ── Toggle section collapse ──
      function toggleSection(name) {
        var header = document.getElementById('sec' + capitalize(name));
        var content = document.getElementById('content' + capitalize(name));
        if (!header || !content) return;

        var isCollapsed = header.classList.contains('collapsed');
        header.classList.toggle('collapsed', !isCollapsed);
        content.classList.toggle('collapsed', !isCollapsed);
      }

      function capitalize(s) {
        return s.charAt(0).toUpperCase() + s.slice(1);
      }

      // ── Animate number count-up ──
      function animateNumber(elId, targetValue, formatter) {
        var el = document.getElementById(elId);
        if (!el) return;

        var start = 0;
        var end = targetValue || 0;
        var duration = 600;
        var startTime = null;

        function step(timestamp) {
          if (!startTime) startTime = timestamp;
          var progress = Math.min((timestamp - startTime) / duration, 1);
          var eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
          var current = Math.round(start + (end - start) * eased);
          el.textContent = formatter(current);
          if (progress < 1) requestAnimationFrame(step);
        }

        requestAnimationFrame(step);
      }

      // ── Show skeleton on empty / error ──
      function showEmptySkeleton() {
        ['kpiRevenue', 'kpiExpense', 'kpiProfit', 'kpiNetProfit'].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.textContent = '—';
        });
        document.getElementById('topProductsList').innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">Chưa có sản phẩm nào</div><div class="empty-state-desc">Bán hàng để xem thống kê sản phẩm</div></div>';
        document.getElementById('topCustomersList').innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">👤</div><div class="empty-state-title">Chưa có khách hàng nào</div><div class="empty-state-desc">Thêm khách hàng và tạo đơn để xem</div></div>';
        document.getElementById('purchaseSummaryRow').innerHTML = '';
        document.getElementById('purchaseTableWrap').innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Chưa có phiếu nhập hàng</div><div class="empty-state-desc">Nhập hàng để xem chi phí ở đây</div></div>';
      }

      // Format date range for display label
      function formatRangeLabel(start, end) {
        if (!start || !end) return '';
        var s = start.split('-').reverse().slice(0, 2).join('/');
        var e = end.split('-').reverse().slice(0, 2).join('/');
        return '📅 ' + s + ' — ' + e;
      }

      // Update the range label UI below filter bar
      function updateRangeLabel() {
        var el = document.getElementById('filterRangeLabel');
        if (!el) return;
        if (_state.filter === 'custom' && _state.startDate && _state.endDate) {
          el.textContent = formatRangeLabel(_state.startDate, _state.endDate);
          el.classList.add('visible');
        } else {
          el.textContent = '';
          el.classList.remove('visible');
        }
      }

      // Open date picker modal
      function openDatePicker() {
        var modal = document.getElementById('dateRangeModal');
        var fromEl = document.getElementById('drpDateFrom');
        var toEl = document.getElementById('drpDateTo');
        if (!modal) return;

        // Pre-fill with current custom range or default to this month
        if (_state.startDate) fromEl.value = _state.startDate;
        if (_state.endDate) toEl.value = _state.endDate;

        modal.classList.remove('hidden');
      }

      // Close date picker modal
      function closeDatePicker() {
        var modal = document.getElementById('dateRangeModal');
        if (modal) modal.classList.add('hidden');
      }

      // Apply preset ranges inside modal
      function applyPreset(preset) {
        var now = new Date();
        var y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
        var fromEl = document.getElementById('drpDateFrom');
        var toEl = document.getElementById('drpDateTo');

        if (preset === 'yesterday') {
          var yd = new Date(now);
          yd.setDate(d - 1);
          fromEl.value = toLocalDateStr(yd);
          toEl.value = toLocalDateStr(yd);
        } else if (preset === 'thisWeek') {
          var dayOfWeek = now.getDay(); // 0=CN
          var monday = new Date(now);
          monday.setDate(d - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
          fromEl.value = toLocalDateStr(monday);
          toEl.value = toLocalDateStr(now);
        } else if (preset === 'lastMonth') {
          var first = new Date(y, m - 1, 1);
          var last = new Date(y, m, 0);
          fromEl.value = toLocalDateStr(first);
          toEl.value = toLocalDateStr(last);
        }
      }

      // Confirm date picker → apply range
      function confirmDatePicker() {
        var from = document.getElementById('drpDateFrom').value;
        var to = document.getElementById('drpDateTo').value;
        if (from && to && from <= to) {
          _state.startDate = from;
          _state.endDate = to;
          closeDatePicker();
          updateRangeLabel();
          debounceLoad();
        } else {
          alert('Vui lòng chọn ngày hợp lệ (từ ≤ đến)');
        }
      }

      // Filter state management
      function setFilter(filter) {
        document.querySelectorAll('.app-filter-btn').forEach(function (btn) {
          btn.classList.toggle('active', btn.dataset.filter === filter);
        });

        _state.filter = filter;

        if (filter === 'custom') {
          openDatePicker();
        }

        updateRangeLabel();
        debounceLoad();
      }

      // ── Debounced load ──
      function debounceLoad() {
        clearTimeout(_debounceTimer);
        _debounceTimer = setTimeout(loadData, 200);
      }

      // ── Public API ──
      window.RPT = {
        setFilter: setFilter,
        closeDatePicker: closeDatePicker,
        applyPreset: applyPreset,
        confirmDatePicker: confirmDatePicker,
        toggleSection: toggleSection,
        toggleMore: toggleMore,
        reload: debounceLoad
      };

      // ── Auto-init on DOM ready ──
      function init() {
        console.log('[RPT] Init — Binance-style report page');
        loadData();

        // Listen for data mutations
        window.addEventListener('data:mutated', function (evt) {
          var entity = (evt && evt.detail && evt.detail.entity) || '';
          if (['sale', 'expense', 'purchase', 'customer', 'product', 'sync', ''].indexOf(entity) !== -1) {
            console.log('[RPT] Data mutated:', entity, '— reloading');
            debounceLoad();
          }
        });

        // Listen for SW invalidation
        if (navigator.serviceWorker) {
          navigator.serviceWorker.addEventListener('message', function (event) {
            var data = event && event.data ? event.data : {};
            if (data.type === 'DATA_INVALIDATED') {
              var path = data.path || '';
              if (path.indexOf('/report') === 0 || path.indexOf('/sale') === 0 || !path) {
                debounceLoad();
              }
            }
          });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

    })();
  </script>
</body>
</html>
