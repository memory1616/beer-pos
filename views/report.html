<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Báo cáo</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">

  <!-- PERFORMANCE: Preload layout.js for first paint -->
  <link rel="preload" href="/js/layout.js?v=20260414a" as="script">
  <link rel="preload" href="/css/unified.css?v=20260414a" as="style">

  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css?v=202604055a">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260414a"></script>

  <!-- CLS Prevention: Skeleton styles -->
  <style>
    .skeleton-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: calc(56px + env(safe-area-inset-top, 0px));
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--color-border, #e2e8f0);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; padding-top: env(safe-area-inset-top, 0px);
      z-index: 50; box-sizing: border-box;
    }
    .skeleton-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(64px + env(safe-area-inset-bottom, 0px));
      background: var(--color-card, #fff);
      border-top: 3px solid var(--color-primary, #f59e0b);
      display: grid; grid-template-columns: repeat(5, 1fr);
      z-index: 50; max-width: 500px; margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-sizing: border-box;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton-bar {
      height: 16px; width: 80px;
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px;
    }
    [data-theme="dark"] .skeleton-header { background: rgba(30, 41, 59, 0.92); border-bottom-color: #334155; }
    [data-theme="dark"] .skeleton-nav { background: rgba(30, 41, 59, 0.92); }
    [data-theme="dark"] .skeleton-bar { background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%); background-size: 200% 100%; }
  </style>

  <!-- Modern filter bar -->
  <style>
    .report-filter {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .report-filter::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      background: var(--bg-secondary, #f2f2f2);
      color: var(--text-muted, #666);
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .filter-btn.active {
      background: #ff9800;
      color: white;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(255,152,0,0.35);
    }
    .filter-group { position: relative; flex-shrink: 0; }
    .dropdown {
      position: absolute;
      top: 44px;
      left: 0;
      background: var(--color-card, #fff);
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      z-index: 99999 !important;
      min-width: 130px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dropdown-item {
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-main, #333);
    }
    .dropdown-item:hover { background: var(--bg-secondary, #f5f5f5); }
    .dropdown.hidden { display: none !important; }
    [data-theme="dark"] .dropdown { background: #1f2937; border: 1px solid #374151; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    [data-theme="dark"] .dropdown-item { color: #e5e7eb; }
    [data-theme="dark"] .dropdown-item:hover { background: #374151; }
  </style>
</head>
<body class="bg-bg text-main body--app">

  <!-- CLS Prevention: Skeleton rendered immediately -->
  <div id="skeleton">
    <header class="skeleton-header">
      <div style="display:flex;align-items:center;gap:8px;"><div style="font-size:20px;">📊</div><div class="skeleton-bar"></div></div>
      <div style="display:flex;gap:8px;"><div style="width:32px;height:32px;background:#e2e8f0;border-radius:6px;animation:shimmer 1.5s infinite;"></div></div>
    </header>
    <nav class="skeleton-nav">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:0.5;"><div style="width:20px;height:20px;background:#e2e8f0;border-radius:4px;animation:shimmer 1.5s infinite;"></div><div style="width:24px;height:11px;background:#e2e8f0;border-radius:2px;animation:shimmer 1.5s infinite;"></div></div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:0.5;"><div style="width:20px;height:20px;background:#e2e8f0;border-radius:4px;animation:shimmer 1.5s infinite;"></div><div style="width:24px;height:11px;background:#e2e8f0;border-radius:2px;animation:shimmer 1.5s infinite;"></div></div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:0.5;"><div style="width:20px;height:20px;background:#e2e8f0;border-radius:4px;animation:shimmer 1.5s infinite;"></div><div style="width:24px;height:11px;background:#e2e8f0;border-radius:2px;animation:shimmer 1.5s infinite;"></div></div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:0.5;"><div style="width:20px;height:20px;background:#e2e8f0;border-radius:4px;animation:shimmer 1.5s infinite;"></div><div style="width:24px;height:11px;background:#e2e8f0;border-radius:2px;animation:shimmer 1.5s infinite;"></div></div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:0.5;"><div style="width:20px;height:20px;background:#e2e8f0;border-radius:4px;animation:shimmer 1.5s infinite;"></div><div style="width:24px;height:11px;background:#e2e8f0;border-radius:2px;animation:shimmer 1.5s infinite;"></div></div>
    </nav>
  </div>

  <!-- Header rendered via JS from layout.js -->
  <div id="app"></div>

  <script src="/js/report.js?v=202604083c"></script>

  <script>
    var headerActions = '<div id="headerProfit" class="money text-money font-bold tabular-nums" style="font-size:14px;">0đ</div>';

    document.getElementById('app').innerHTML =
      getHeaderWithActions('Báo cáo', '📊', headerActions) +
      getContent(`
        <div class="report-filter">
          <button class="filter-btn active" data-type="today" onclick="switchFilterType('today')">Hôm nay</button>
          <button class="filter-btn" data-type="yesterday" onclick="switchFilterType('yesterday')">Hôm qua</button>
          <div class="filter-group">
            <button id="btnMonth" class="filter-btn" data-type="month" onclick="toggleMonthDropdown(event)">Tháng</button>
            <div id="monthDropdown" class="dropdown hidden"></div>
          </div>
          <div class="filter-group">
            <button id="btnYear" class="filter-btn" data-type="year" onclick="toggleYearDropdown(event)">Năm</button>
            <div id="yearDropdown" class="dropdown hidden"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
          <div class="card p-4 text-center">
            <div class="text-sm text-muted mb-1">Doanh thu</div>
            <div id="statRevenue" class="text-lg font-bold text-info tabular-nums">0đ</div>
          </div>
          <div class="card p-4 text-center">
            <div class="text-sm text-muted mb-1">Lợi nhuận</div>
            <div id="statProfit" class="text-lg font-bold text-success tabular-nums">0đ</div>
          </div>
          <div class="card p-4 text-center">
            <div class="text-sm text-muted mb-1">Đơn hàng</div>
            <div id="statOrders" class="text-lg font-bold tabular-nums">0</div>
          </div>
          <div class="card p-4 text-center">
            <div class="text-sm text-muted mb-1">Chi phí</div>
            <div id="statExpense" class="text-lg font-bold text-danger tabular-nums">0đ</div>
          </div>
        </div>

        <div class="card p-4 mb-4">
          <h3 class="font-bold mb-3">📈 Biểu đồ</h3>
          <canvas id="chartCanvas" style="max-height:200px"></canvas>
        </div>

        <div class="flex gap-1 mb-4 overflow-x-auto">
          <button onclick="switchReportTab('sales')" class="report-tab active px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-tab="sales">🍺 Bán hàng</button>
          <button onclick="switchReportTab('products')" class="report-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-tab="products">📦 Theo SP</button>
          <button onclick="switchReportTab('customers')" class="report-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-tab="customers">👤 Theo KH</button>
          <button onclick="switchReportTab('purchases')" class="report-tab px-3 py-1.5 rounded-lg text-sm whitespace-nowrap" data-tab="purchases">📥 Nhập hàng</button>
        </div>

        <div id="reportSales" class="report-section active space-y-2">
          <div id="salesList" class="space-y-2"><div class="text-center text-muted py-4">Đang tải...</div></div>
        </div>
        <div id="reportProducts" class="report-section space-y-2">
          <div id="productsList" class="space-y-2"><div class="text-center text-muted py-4">Đang tải...</div></div>
        </div>
        <div id="reportCustomers" class="report-section space-y-2">
          <div id="customersList" class="space-y-2"><div class="text-center text-muted py-4">Đang tải...</div></div>
        </div>
        <div id="reportPurchases" class="report-section space-y-2">
          <div id="purchasesList" class="space-y-2"><div class="text-center text-muted py-4">Đang tải...</div></div>
        </div>
      `) +
      getBottomNav('/report');

    setTimeout(initFilter, 0);
  </script>
</body>
</html>
