<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo cáo</title>
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>

  <style>
    /* FILTER BAR */
    .filter-bar {
      margin-bottom: 16px;
    }
    .quick-filters {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .quick-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      min-height: 32px;
    }
    .quick-btn.active {
      background: var(--primary);
      color: #000;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-main);
      font-size: 12px;
      cursor: pointer;
      min-width: 90px;
      min-height: 36px;
    }
    .date-input {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-main);
      font-size: 12px;
      min-height: 36px;
    }
    .filter-divider {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* SUMMARY BLOCK */
    .summary-clean {
      margin-bottom: 20px;
      padding: 16px 0;
    }
    .summary-line {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 14px;
    }
    .summary-line .label {
      color: var(--text-secondary);
    }
    .summary-line .value {
      font-weight: 600;
      color: var(--text-main);
    }
    .summary-line .value.bold {
      font-weight: 700;
    }
    .summary-line.highlight {
      border-top: 1px solid var(--border);
      margin-top: 8px;
      padding-top: 12px;
    }
    .summary-line.highlight .label {
      font-weight: 700;
      color: var(--text-main);
    }
    .summary-line.highlight .value {
      font-weight: 700;
      font-size: 18px;
      color: var(--text-main);
    }
    .summary-line .value.text-success { color: var(--green); }
    .summary-line .value.text-danger  { color: var(--red); }

    /* Header profit */
    #headerProfit.positive { color: var(--green); }
    #headerProfit.negative { color: var(--red); }

    /* SECTIONS */
    .report-section {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: none;
    }
    .section-title.collapsible {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title.collapsible::after {
      content: '▼';
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .section-title.collapsed::after {
      transform: rotate(-90deg);
    }

    /* TABLES */
    .report-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      overflow-x: auto;
      display: block;
    }
    .report-table th {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .report-table th.text-right,
    .report-table td.text-right {
      text-align: right;
    }
    .report-table td {
      padding: 10px 6px;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
      white-space: nowrap;
    }
    .report-table tr:last-child td { border-bottom: none; }
    .report-table tr:hover td { background: transparent; }
    .report-table td.profit {
      font-weight: 700;
    }
    .report-table td.text-note {
      color: var(--text-muted);
    }

    /* PURCHASE SUMMARY */
    .purchase-summary {
      font-size: 13px;
      padding: 8px 0;
      margin-bottom: 10px;
    }
    .purchase-summary .total {
      font-weight: 600;
      color: var(--red);
    }

    .empty-msg {
      text-align: center;
      color: var(--text-muted);
      padding: 24px;
      font-size: 13px;
    }
    .loading {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* DARK MODE */
    [data-theme="dark"] .report-table th { border-color: var(--border); }
    [data-theme="dark"] .report-table td { border-color: var(--border); }
    [data-theme="dark"] .section-title { border-color: var(--border); }
    [data-theme="dark"] .summary-line.highlight { border-color: var(--border); }
  </style>
</head>
<body class="body--app">

  <!-- Skeleton placeholder -->
  <div id="skeleton">
    <header style="position:fixed;top:0;left:0;right:0;height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:50;">
      <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:20px;">📊</span></div>
      <div id="headerProfit" style="font-weight:700;font-size:16px;">0 đ</div>
    </header>
  </div>

  <!-- Main Content -->
  <div id="app"></div>

  <script>
    // Check auth first
    if (!isLoggedIn()) { 
      window.location.href = '/login'; 
    }

    // Global filter state
    var reportFilter = {
      type: 'month',
      month: new Date().getMonth() + 1,
      year: new Date().getFullYear()
    };

    function fmtVND(n) {
      if (n === 0 || n == null) return '—';
      return new Intl.NumberFormat('vi-VN').format(n) + ' đ';
    }

    function escHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Build HTML
    document.getElementById('app').innerHTML =
      getHeaderWithActions('Báo cáo', '📊', '<span id="headerProfit" style="font-weight:700;font-size:15px;">0đ</span>') +
      getContent(`
        <!-- FILTER BAR -->
        <div class="filter-bar">
          <div class="quick-filters" id="quickFilters">
            <button class="quick-btn active" onclick="setQuickFilter('today')">Hôm nay</button>
            <button class="quick-btn" onclick="setQuickFilter('yesterday')">Hôm qua</button>
            <button class="quick-btn" onclick="setQuickFilter('thisWeek')">Tuần này</button>
            <button class="quick-btn" onclick="setQuickFilter('thisMonth')">Tháng này</button>
            <button class="quick-btn" onclick="setQuickFilter('lastMonth')">Tháng trước</button>
            <button class="quick-btn" onclick="setCustomRange()">Tùy chỉnh</button>
          </div>
          <div class="filter-row" id="filterRow" style="display:none;">
            <input type="date" id="filterFrom" class="date-input" onchange="applyDateRange()">
            <span class="filter-divider">→</span>
            <input type="date" id="filterTo" class="date-input" onchange="applyDateRange()">
          </div>
          <div class="filter-row" id="monthYearFilter">
            <select id="selMonth" onchange="changeMonth(this.value)" class="filter-select">
              <option value="">-- Tháng --</option>
            </select>
            <select id="selYear" onchange="changeYear(this.value)" class="filter-select">
              <option value="">-- Năm --</option>
            </select>
          </div>
        </div>

        <!-- SUMMARY -->
        <div class="summary-clean">
          <div class="summary-line">
            <span class="label">Doanh thu</span>
            <span class="value" id="sRevenue">0 đ</span>
          </div>
          <div class="summary-line">
            <span class="label">Chi phí</span>
            <span class="value text-danger">0 đ</span>
          </div>
          <div class="summary-line">
            <span class="label">Lợi nhuận</span>
            <span class="value text-success" id="sProfit">0 đ</span>
          </div>
          <div class="summary-line highlight">
            <span class="label">Lãi ròng</span>
            <span class="value" id="sNetProfit">0 đ</span>
          </div>
        </div>

        <!-- PRODUCT REPORT -->
        <div class="report-section">
          <div class="section-title collapsible" onclick="toggleSection('productSection')">🍺 Lợi nhuận theo sản phẩm</div>
          <div id="productSection">
            <div class="loading">⏳ Đang tải...</div>
          </div>
        </div>

        <!-- CUSTOMER REPORT -->
        <div class="report-section">
          <div class="section-title collapsible" onclick="toggleSection('customerSection')">👤 Lợi nhuận theo khách hàng</div>
          <div id="customerSection">
            <div class="loading">⏳ Đang tải...</div>
          </div>
        </div>

        <!-- PURCHASE REPORT -->
        <div class="report-section">
          <div class="section-title collapsible" onclick="toggleSection('purchaseSection')">📦 Nhập hàng</div>
          <div id="purchaseSection">
            <div class="loading">⏳ Đang tải...</div>
          </div>
        </div>
      `) +
      getBottomNav('/report');

    // Populate selects
    (function initSelects() {
      var months = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
      var selMonth = document.getElementById('selMonth');
      var now = new Date();
      
      for (var i = 1; i <= 12; i++) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = months[i - 1];
        if (i === now.getMonth() + 1) opt.selected = true;
        selMonth.appendChild(opt);
      }

      var selYear = document.getElementById('selYear');
      var cy = now.getFullYear();
      for (var j = cy; j >= cy - 4; j--) {
        var opt = document.createElement('option');
        opt.value = j;
        opt.textContent = j;
        if (j === cy) opt.selected = true;
        selYear.appendChild(opt);
      }
    })();

    // Quick filter functions
    function getDateRange(type) {
      var now = new Date();
      var y = now.getFullYear();
      var m = now.getMonth();
      var d = now.getDate();
      var day = now.getDay();
      var startOfWeek = new Date(now);
      startOfWeek.setDate(d - day + (day === 0 ? -6 : 1));

      switch(type) {
        case 'today':
          return { start: formatDate(now), end: formatDate(now) };
        case 'yesterday':
          var yd = new Date(now);
          yd.setDate(d - 1);
          return { start: formatDate(yd), end: formatDate(yd) };
        case 'thisWeek':
          return { start: formatDate(startOfWeek), end: formatDate(now) };
        case 'thisMonth':
          return { start: formatDate(new Date(y, m, 1)), end: formatDate(now) };
        case 'lastMonth':
          return { start: formatDate(new Date(y, m - 1, 1)), end: formatDate(new Date(y, m, 0)) };
        default:
          return null;
      }
    }

    function formatDate(d) {
      var y = d.getFullYear();
      var mo = String(d.getMonth() + 1).padStart(2, '0');
      var da = String(d.getDate()).padStart(2, '0');
      return y + '-' + mo + '-' + da;
    }

    function setQuickFilter(type) {
      document.querySelectorAll('.quick-btn').forEach(function(b) { b.classList.remove('active'); });
      event && event.target && event.target.classList && event.target.classList.add('active');
      document.getElementById('filterRow').style.display = 'none';
      document.getElementById('monthYearFilter').style.display = 'none';

      var range = getDateRange(type);
      if (range) {
        reportFilter.type = 'custom';
        reportFilter.startDate = range.start;
        reportFilter.endDate = range.end;
        loadReport();
      }
    }

    function setCustomRange() {
      document.querySelectorAll('.quick-btn').forEach(function(b) { b.classList.remove('active'); });
      event && event.target && event.target.classList && event.target.classList.add('active');
      document.getElementById('filterRow').style.display = 'flex';
      document.getElementById('monthYearFilter').style.display = 'none';

      var now = new Date();
      document.getElementById('filterFrom').value = formatDate(new Date(now.getFullYear(), now.getMonth(), 1));
      document.getElementById('filterTo').value = formatDate(now);
      reportFilter.type = 'custom';
      reportFilter.startDate = document.getElementById('filterFrom').value;
      reportFilter.endDate = document.getElementById('filterTo').value;
    }

    function applyDateRange() {
      var from = document.getElementById('filterFrom').value;
      var to = document.getElementById('filterTo').value;
      if (from && to) {
        reportFilter.type = 'custom';
        reportFilter.startDate = from;
        reportFilter.endDate = to;
        loadReport();
      }
    }

    function toggleSection(id) {
      var el = document.getElementById(id);
      var title = el.previousElementSibling;
      if (el.style.display === 'none') {
        el.style.display = '';
        title && title.classList.remove('collapsed');
      } else {
        el.style.display = 'none';
        title && title.classList.add('collapsed');
      }
    }

    // Filter functions (backward compatible)
    function changeMonth(m) {
      reportFilter.type = 'month';
      reportFilter.month = parseInt(m, 10);
      loadReport();
    }

    function changeYear(y) {
      reportFilter.type = 'year';
      reportFilter.year = parseInt(y, 10);
      loadReport();
    }

    // Report processing functions
    function getProfitByProduct(sales) {
      var map = {};
      sales.forEach(function(sale) {
        var items = sale.items || [];
        items.forEach(function(item) {
          var key = item.product_name || 'Không tên';
          if (!map[key]) {
            map[key] = { name: key, quantity: 0, profit: 0 };
          }
          map[key].quantity += item.quantity || 0;
          map[key].profit += item.profit || 0;
        });
      });
      return Object.values(map).sort(function(a, b) { return b.profit - a.profit; });
    }

    function getCustomerReport(sales) {
      var map = {};
      sales.forEach(function(sale) {
        var key = sale.customer_name || 'Khách lẻ';
        if (!map[key]) {
          map[key] = { name: key, quantity: 0, profit: 0 };
        }
        var items = sale.items || [];
        items.forEach(function(item) {
          map[key].quantity += item.quantity || 0;
          map[key].profit += item.profit || 0;
        });
      });
      return Object.values(map).sort(function(a, b) { return b.profit - a.profit; });
    }

    function getSummary(sales, totalExpense) {
      var revenue = 0, profit = 0;
      sales.forEach(function(s) {
        revenue += s.total || 0;
        profit += s.profit || 0;
      });
      return {
        revenue: revenue,
        profit: profit,
        expense: totalExpense || 0,
        net_profit: profit - (totalExpense || 0)
      };
    }

    // Render functions
    function updateSummaryBlock(s) {
      var sRev = document.getElementById('sRevenue');
      var sProfit = document.getElementById('sProfit');
      var sNet = document.getElementById('sNetProfit');
      var sExpenses = document.querySelectorAll('.summary-line .text-danger');
      if (sRev) sRev.textContent = fmtVND(s.revenue);
      if (sExpenses[0]) sExpenses[0].textContent = fmtVND(s.expense);
      if (sProfit) {
        sProfit.textContent = fmtVND(s.profit);
        sProfit.className = 'value ' + (s.profit >= 0 ? 'text-success' : 'text-danger');
      }
      if (sNet) {
        sNet.textContent = fmtVND(s.net_profit);
        sNet.className = 'value ' + (s.net_profit >= 0 ? 'text-success' : 'text-danger');
      }
      // Update header
      var headerEl = document.getElementById('headerProfit');
      if (headerEl) {
        headerEl.textContent = fmtVND(s.net_profit);
        headerEl.className = s.net_profit >= 0 ? 'positive' : 'negative';
      }
    }

    function renderSummary(s) {
      updateSummaryBlock(s);
    }

    function renderSummaryCards(s) {
      // Legacy compatibility
      updateSummaryBlock(s);
    }

    function renderProducts(data) {
      var el = document.getElementById('productSection');
      if (!el) return;
      if (!data || data.length === 0) {
        el.innerHTML = '<div class="empty-msg">Không có dữ liệu sản phẩm</div>';
        return;
      }
      var html = '<table class="report-table"><thead><tr><th>Tên sản phẩm</th><th class="text-right">SL</th><th class="text-right">Lợi nhuận</th></tr></thead><tbody>';
      data.forEach(function(p, i) {
        var rowClass = i < 3 ? 'row-top' : '';
        html += '<tr class="' + rowClass + '"><td>' + escHtml(p.name) + '</td><td class="text-right">' + (p.quantity_sold || p.quantity || 0) + '</td><td class="text-right profit ' + (p.profit >= 0 ? 'text-success' : 'text-danger') + '">' + fmtVND(p.profit) + '</td></tr>';
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    function renderPurchases(data, totalAmount) {
      var el = document.getElementById('purchaseSection');
      if (!el) return;
      if (!data || data.length === 0) {
        el.innerHTML = '<div class="empty-msg">Không có phiếu nhập hàng</div>';
        return;
      }
      var html = '<div class="purchase-summary">Tổng nhập: <span class="total">' + fmtVND(totalAmount || 0) + '</span> (' + data.length + ' phiếu)</div>';
      html += '<table class="report-table"><thead><tr><th>Ngày</th><th class="text-right">Tổng tiền</th><th>Ghi chú</th></tr></thead><tbody>';
      data.forEach(function(p) {
        var dateStr = p.date ? p.date.substring(0, 10) : '';
        html += '<tr><td>' + escHtml(dateStr) + '</td><td class="text-right profit">' + fmtVND(p.total) + '</td><td class="text-note">' + escHtml(p.note || '') + '</td></tr>';
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    function renderCustomers(data) {
      var el = document.getElementById('customerSection');
      if (!el) return;
      if (!data || data.length === 0) {
        el.innerHTML = '<div class="empty-msg">Không có dữ liệu khách hàng</div>';
        return;
      }
      var html = '<table class="report-table"><thead><tr><th>Khách hàng</th><th class="text-right">SL</th><th class="text-right">Lợi nhuận</th></tr></thead><tbody>';
      data.forEach(function(c, i) {
        var rowClass = i < 3 ? 'row-top' : '';
        html += '<tr class="' + rowClass + '"><td>' + escHtml(c.name) + '</td><td class="text-right">' + (c.quantity || 0) + '</td><td class="text-right profit ' + (c.profit >= 0 ? 'text-success' : 'text-danger') + '">' + fmtVND(c.profit) + '</td></tr>';
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    // Main load function
    function loadReport() {
      console.log('[REPORT] Loading with filter:', reportFilter);

      var url = '/report/data?type=' + reportFilter.type;
      if (reportFilter.type === 'month') {
        url += '&month=' + reportFilter.month + '&year=' + reportFilter.year;
      } else if (reportFilter.type === 'year') {
        url += '&year=' + reportFilter.year;
      } else if (reportFilter.type === 'custom' && reportFilter.startDate && reportFilter.endDate) {
        url += '&startDate=' + reportFilter.startDate + '&endDate=' + reportFilter.endDate;
      }

      fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          console.log('[REPORT] Got:', JSON.stringify(data));

          // Defensive: validate response structure
          if (!data || typeof data !== 'object') {
            console.error('[REPORT] Invalid response:', data);
            return;
          }

          // Support both API formats:
          // - /report/data (server.js) returns totalExpense as number
          // - /report/data (routes/report.js) returns expenses as array
          var sales = data.sales;
          var totalExpense = 0;
          if (data.totalExpense !== undefined) {
            // server.js API format: totalExpense already summed
            totalExpense = data.totalExpense || 0;
          } else if (data.expenses) {
            // routes/report.js API format: expenses array, need to sum
            totalExpense = (data.expenses || []).reduce(function(sum, e) { return sum + (e.amount || 0); }, 0);
          }

          var byProduct = data.profitByProduct || [];
          var byCustomer = data.profitByCustomer || getCustomerReport(sales);
          var summary = getSummary(sales, totalExpense);

          console.log('[REPORT] Summary:', summary);
          console.log('[REPORT] Products:', byProduct.length);
          console.log('[REPORT] Customers:', byCustomer.length);

          renderSummary(summary);
          renderProducts(byProduct);
          renderPurchases(data.purchases || [], data.totalPurchaseAmount);
          renderCustomers(byCustomer);
        })
        .catch(function(err) {
          console.error('[REPORT] Error:', err);
          document.getElementById('summarySection').innerHTML = '<div class="empty-msg">Lỗi tải dữ liệu</div>';
          document.getElementById('productSection').innerHTML = '<div class="empty-msg">Lỗi tải dữ liệu</div>';
          document.getElementById('customerSection').innerHTML = '<div class="empty-msg">Lỗi tải dữ liệu</div>';
        });
    }

    // Auto load on page ready
    loadReport();

    // Realtime sync: refresh when data changes
    var _reportDebounceTimer = null;
    function queueReportRefresh(reason) {
      if (_reportDebounceTimer) clearTimeout(_reportDebounceTimer);
      _reportDebounceTimer = setTimeout(function() {
        console.log('[REPORT] Realtime refresh triggered:', reason);
        loadReport();
      }, 500);
    }

    // Listen for data mutation events from realtime.js
    window.addEventListener('data:mutated', function(evt) {
      var detail = evt && evt.detail ? evt.detail : {};
      var entity = detail.entity || '';
      // Refresh on sales, purchases, or any data change
      if (['sales', 'purchases', 'expenses', 'products', 'customers', 'mutation'].indexOf(entity) !== -1 || !entity) {
        queueReportRefresh(entity || 'data change');
      }
    });

    // Listen for SW messages (offline sync)
    if (navigator.serviceWorker) {
      navigator.serviceWorker.addEventListener('message', function(event) {
        var data = event && event.data ? event.data : {};
        if (data.type === 'DATA_INVALIDATED') {
          var path = data.path || '';
          if (path.indexOf('/report') === 0 || path.indexOf('/sale') === 0 || !path) {
            queueReportRefresh('SW invalidation: ' + path);
          }
        }
      });
    }
  </script>
</body>
</html>
