<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Beer POS</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-20">
  <div id="app"></div>

  <script>
    // Initialize layout
    const headerActions = `
      <a href="/sale" class="text-amber-600 hover:bg-amber-50 px-2 rounded">➕</a>
      <a href="/report" class="text-blue-600 hover:bg-blue-50 px-2 rounded">📊</a>
      <button onclick="logout()" class="text-red-500 hover:bg-red-50 px-2 rounded">🚪</button>
    `;
    
    (async () => {
      try {
        if (typeof loadVersion === 'function') await loadVersion();
        document.getElementById('app').innerHTML = 
        getHeaderWithActions('Gia Huy', '🍺', headerActions) +
        getContent(`
        <!-- Loading -->
        <div id="loading" class="text-center py-8">
          <div class="animate-spin w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mx-auto"></div>
          <div class="text-gray-500 mt-2">Đang tải...</div>
        </div>

        <div id="contentSection" class="hidden">
          <!-- TODAY SECTION -->
          <div class="mb-4">
            <div class="section-title">Hôm nay</div>
            <div class="grid grid-cols-2 gap-3">
              <div class="card">
                <div class="text-xs text-gray-500">Doanh thu</div>
                <div class="text-2xl font-bold text-amber-600" id="todayRevenue">0</div>
              </div>
              <div class="card">
                <div class="text-xs text-gray-500">Bán ra</div>
                <div class="text-2xl font-bold text-blue-600" id="todayUnits">0</div>
                <div class="text-xs text-gray-400">bình</div>
              </div>
            </div>
          </div>

          <!-- KEG STATUS SECTION -->
          <div class="mb-4">
            <div class="section-title">📦 Vỏ bình</div>
            <div class="card">
              <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-blue-50 rounded-lg p-2">
                  <div class="text-xl font-bold text-blue-600" id="kegInStock">0</div>
                  <div class="text-xs text-gray-500">Kho</div>
                </div>
                <div class="bg-amber-50 rounded-lg p-2">
                  <div class="text-xl font-bold text-amber-600" id="kegAtCustomers">0</div>
                  <div class="text-xs text-gray-500">Khách</div>
                </div>
                <div class="bg-purple-50 rounded-lg p-2">
                  <div class="text-xl font-bold text-purple-600" id="kegTotal">0</div>
                  <div class="text-xs text-gray-500">Tổng</div>
                </div>
              </div>
            </div>
          </div>

          <!-- QUICK ACTIONS SECTION -->
          <div class="mb-4">
            <div class="section-title">Thao tác nhanh</div>
            <div class="grid grid-cols-3 gap-2">
              <a href="/delivery" class="bg-red-500 text-white rounded-xl p-3 text-center">
                <div class="text-xl">🚚</div>
                <div class="text-sm font-medium">Giao</div>
              </a>
              <a href="/devices" class="bg-indigo-500 text-white rounded-xl p-3 text-center">
                <div class="text-xl">🧊</div>
                <div class="text-sm font-medium">Tủ</div>
              </a>
              <a href="/expenses" class="bg-red-600 text-white rounded-xl p-3 text-center">
                <div class="text-xl">💸</div>
                <div class="text-sm font-medium">Chi phí</div>
              </a>
            </div>
          </div>

          <!-- Low Stock Alert -->
          <div id="lowStockSection" class="hidden bg-red-50 rounded-xl border border-red-200 p-4 mb-4">
            <div class="text-sm font-bold text-red-700 mb-2">⚠️ Hàng sắp hết</div>
            <div id="lowStockList" class="space-y-1"></div>
          </div>

          <!-- Customer Alerts (7+ days no order) -->
          <div id="customerAlertsSection" class="hidden bg-yellow-50 rounded-xl border border-yellow-200 p-4 mb-4">
            <div class="text-sm font-bold text-yellow-700 mb-2">⚠️ KH 7 ngày chưa lấy bia</div>
            <div id="customerAlertsList" class="space-y-1"></div>
          </div>

          <!-- CHART SECTION -->
          <div class="mb-4">
            <div class="section-title">Doanh thu 6 tháng</div>
            
            <!-- Revenue Stats Summary -->
            <div id="revenueStats" class="grid grid-cols-3 gap-2 mb-3">
              <div class="bg-amber-50 rounded-lg p-2 text-center">
                <div class="text-xs text-gray-500">Tổng</div>
                <div class="font-bold text-amber-600 text-sm" id="totalRevenue6M">-</div>
              </div>
              <div class="bg-blue-50 rounded-lg p-2 text-center">
                <div class="text-xs text-gray-500">TB/tháng</div>
                <div class="font-bold text-blue-600 text-sm" id="avgRevenue6M">-</div>
              </div>
              <div class="bg-purple-50 rounded-lg p-2 text-center">
                <div class="text-xs text-gray-500">Tăng trưởng</div>
                <div class="font-bold text-purple-600 text-sm" id="growthRevenue6M">-</div>
              </div>
            </div>
            
            <div class="card">
              <canvas id="revenueChart" style="height: 220px;"></canvas>
            </div>
          </div>

          <!-- RECENT SALES SECTION -->
          <div class="mb-4">
            <div class="section-title">Bán gần đây</div>
            <div class="card">
              <div id="recentSales" class="space-y-2"></div>
            </div>
          </div>
        </div>
      `) +
      getBottomNav('/');
      } catch (err) {
        console.error('Dashboard init error:', err);
        document.getElementById('app').innerHTML = `
          <div class="max-w-md mx-auto p-4">
            <div class="card border-red-200 bg-red-50">
              <div class="font-bold text-red-700 mb-1">Lỗi tải Dashboard</div>
              <div class="text-sm text-red-600 break-words">${String(err && err.message ? err.message : err)}</div>
              <div class="text-xs text-gray-500 mt-2">Mở DevTools Console để xem chi tiết.</div>
            </div>
          </div>
        `;
      }
    })();
  </script>

  <!-- Load Dashboard JS -->
  <script src="/js/dashboard.js"></script>

  <script>
    requireAuth();

    async function loadData() {
      try {
        const res = await fetch('/data');
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          throw new Error('HTTP ' + res.status + (text ? (': ' + text.slice(0, 200)) : ''));
        }
        const data = await res.json();
        
        // Initialize dashboard with data
        try {
          initDashboard(data);
        } catch (e) {
          console.error('Init error:', e);
        }
        
        // Hide loading, show content
        const loading = document.getElementById('loading');
        const contentSection = document.getElementById('contentSection');
        if (loading) loading.classList.add('hidden');
        if (contentSection) contentSection.classList.remove('hidden');
        
      } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('loading').innerHTML = '<div class="text-red-500">Lỗi tải dữ liệu</div>';
      }
    }
    
    loadData();
  </script>
  
  <script>
  // Check authentication on page load
  if (!isLoggedIn()) {
    window.location.href = '/login';
  }
  
  if ('serviceWorker' in navigator) {
    if (!navigator.serviceWorker.controller) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
    }
  }
  </script>
</body>
</html>
