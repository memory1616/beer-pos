<!DOCTYPE html>
<html lang="vi">
<head>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard - Beer POS</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BeerPOS">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/unified.css">
  <script src="/js/dark-mode.js"></script>
  <script src="/js/vendor/chart.umd.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js?v=20260402"></script>
  <script src="/js/format.js"></script>
  <script src="/js/vendor/dexie.min.js"></script>
  <script src="/db.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/sync.js"></script>
</head>
<body class="bg-main text-primary min-h-screen pb-20">
  <div id="app"></div>

  <script src="/js/debug.js"></script>
  <script>
    requireAuth();

    const headerActions = `
      <button onclick="showAlertSettings()" class="text-muted hover:bg-bg-hover px-2 rounded" title="Cài đặt">⚙️</button>
      <button onclick="logout()" class="text-danger hover:bg-danger/10 px-2 rounded">🚪</button>
    `;
  </script>
  <script>
    (async () => {
      try {
        if (typeof loadVersion === 'function') await loadVersion();
        document.getElementById('app').innerHTML =
          getHeaderWithActions('Gia Huy', '🍺', headerActions) +
          getContent(`
          <div id="loading" class="text-center py-8">
            <div class="spinner mx-auto"></div>
            <div class="text-muted mt-2">Đang tải...</div>
          </div>

          <div id="contentSection" class="hidden">
            <div class="mb-4">
              <div class="section-title">Hôm nay</div>
              <div class="grid grid-cols-2 gap-3">
                <div class="card card-sm">
                  <div class="text-xs text-muted">Doanh thu</div>
                  <div id="todayRevenue" class="money text-money text-lg">Chưa có dữ liệu hôm nay</div>
                </div>
                <div class="card card-sm">
                  <div class="text-xs text-muted">Bán ra</div>
                  <div class="text-lg font-bold text-info" id="todayUnits">0</div>
                  <div class="text-xs text-muted">bình</div>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-3 mt-3">
                <div class="card card-sm">
                  <div class="text-xs text-muted">Lợi nhuận hôm nay</div>
                  <div id="todayProfit" class="text-lg">Chưa có dữ liệu</div>
                </div>
                <div class="card card-sm">
                  <div class="text-xs text-muted">Chi phí hôm nay</div>
                  <div id="todayExpense" class="text-lg">Chưa có dữ liệu</div>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <div class="section-title">Tháng này</div>
              <div class="grid grid-cols-2 gap-3">
                <div class="card" onclick="location.href='/report'" style="cursor:pointer" title="Xem chi tiết lợi nhuận tháng">
                  <div class="text-xs text-muted">Lợi nhuận tháng</div>
                  <div id="monthProfit" class="money text-money text-lg"></div>
                </div>
                <div class="card" onclick="location.href='/expenses'" style="cursor:pointer" title="Xem chi phí tháng">
                  <div class="text-xs text-muted">Chi phí tháng</div>
                  <div id="monthExpense" class="text-lg text-danger"></div>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <div class="section-title">📦 Vỏ bình</div>
              <div class="card mb-3 text-center">
                <div class="text-xs text-muted uppercase tracking-wider font-medium">Tổng vỏ bình</div>
                <div class="text-5xl font-bold text-info mt-1" id="kegTotal">0</div>
              </div>
              <div class="grid grid-cols-3 gap-3">
                <div class="card" onclick="location.href='/kegs'" style="cursor:pointer" title="Xem kho vỏ">
                  <div class="text-2xl font-bold text-success" id="kegInventory">0</div>
                  <div class="text-sm font-medium text-main mt-1">Kho</div>
                  <div class="text-xs text-muted mt-1" id="kegInventoryPct">0%</div>
                </div>
                <div class="card" onclick="location.href='/customers'" style="cursor:pointer" title="Xem khách giữ vỏ">
                  <div class="text-2xl font-bold text-warning" id="kegCustomerHolding">0</div>
                  <div class="text-sm font-medium text-main mt-1">Khách</div>
                  <div class="text-xs text-muted mt-1" id="kegCustomerHoldingPct">0%</div>
                </div>
                <div class="card" onclick="location.href='/purchases'" style="cursor:pointer" title="Xem lịch sử nhập vỏ">
                  <div class="text-2xl font-bold text-secondary" id="kegEmptyCollected">0</div>
                  <div class="text-sm font-medium text-main mt-1">Rỗng</div>
                  <div class="text-xs text-muted mt-1" id="kegEmptyCollectedPct">0%</div>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <div class="section-title">Thao tác nhanh</div>
              <div class="grid grid-cols-3 gap-2">
                <a href="/delivery" class="btn btn-danger" style="height:auto;padding:12px;">
                  <span class="text-xl">🚚</span>
                  <span class="text-sm font-medium">Giao</span>
                </a>
                <a href="/devices" class="btn btn-secondary" style="height:auto;padding:12px;">
                  <span class="text-xl">🧊</span>
                  <span class="text-sm font-medium">Tủ</span>
                </a>
                <a href="/expenses" class="btn btn-danger" style="height:auto;padding:12px;background:linear-gradient(135deg,#dc2626,#b91c1a);">
                  <span class="text-xl">💸</span>
                  <span class="text-sm font-medium">Chi phí</span>
                </a>
              </div>
            </div>

            <div id="lowStockSection" class="hidden card border-danger p-4 mb-4">
              <div class="flex justify-between items-center mb-2">
                <div id="lowStockHeader" class="text-sm font-bold text-danger">⚠️ Hàng sắp hết</div>
                <button onclick="showAlertSettings()" class="text-xs text-info font-medium">⚙️ Cài đặt</button>
              </div>
              <div id="lowStockList" class="space-y-1"></div>
            </div>

            <div id="customerAlertsSection" class="hidden card border-warning p-4 mb-4">
              <div id="customerAlertsHeader" class="text-sm font-bold text-warning mb-2">⚠️ Dưới mức kỳ vọng</div>
              <div id="customerAlertsList" class="space-y-1"></div>
            </div>

            <div class="mb-4">
              <div class="section-title">Doanh thu 6 tháng</div>
              <div id="revenueStats" class="grid grid-cols-3 gap-2 mb-3">
                <div class="card p-2 text-center min-w-0">
                  <div class="text-xs text-muted">Tổng</div>
                  <div class="font-bold text-primary text-sm min-w-0" id="totalRevenue6M">-</div>
                </div>
                <div class="card p-2 text-center min-w-0">
                  <div class="text-xs text-muted">LN/tháng</div>
                  <div class="font-bold text-success text-sm min-w-0" id="avgRevenue6M">-</div>
                </div>
                <div class="card p-2 text-center">
                  <div class="text-xs text-muted">Tăng trưởng</div>
                  <div class="font-bold text-success text-sm" id="growthRevenue6M">-</div>
                </div>
              </div>
              <div class="card">
                <canvas id="revenueChart" style="height: 220px;"></canvas>
              </div>
            </div>

            <div class="mb-4">
              <div class="section-title">Bán gần đây</div>
              <div class="card">
                <div id="recentSales" class="space-y-2"></div>
              </div>
            </div>
          </div>
          `) +
          getBottomNav('/dashboard');
      } catch (err) {
        console.error('Dashboard init error:', err);
        document.getElementById('app').innerHTML = `
          <div class="max-w-md mx-auto p-4">
            <div class="card border-danger">
              <div class="font-bold text-danger mb-1">Lỗi tải Dashboard</div>
              <div class="text-sm text-danger break-words">${String(err && err.message ? err.message : err)}</div>
            </div>
          </div>
        `;
      }
    })();
  </script>

  <script src="/js/dashboard.js?v=20260402"></script>

  <script>
  async function loadData() {
    try {
      const res = await fetch('/dashboard/data?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (typeof initDashboard === 'function') initDashboard(data);
      const loading = document.getElementById('loading');
      const contentSection = document.getElementById('contentSection');
      if (loading) loading.classList.add('hidden');
      if (contentSection) contentSection.classList.remove('hidden');
    } catch (err) {
      console.error('Failed to load data:', err);
      document.getElementById('loading').innerHTML = '<div class="text-danger text-center py-4">Lỗi tải dữ liệu</div>';
    }
  }

  loadData();

  if ('serviceWorker' in navigator) {
    if (!navigator.serviceWorker.controller) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log('[SW] Registration failed:', err));
    }
  }
  </script>

  <!-- ========== ALERT + CLOUD SETTINGS MODAL ========== -->
  <div id="alertSettingsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="card w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-lg text-main">⚙️ Cài đặt</h3>
        <button onclick="closeAlertSettings()" class="text-muted hover:text-main text-xl">✕</button>
      </div>

      <!-- Tab Navigation -->
      <div class="flex border-b border-muted mb-4">
        <button id="tabAlertBtn" onclick="switchSettingsTab('alert')"
          class="flex-1 py-2 text-sm font-medium text-primary border-b-2 border-primary">⚠️ Cảnh báo</button>
        <button id="tabCloudBtn" onclick="switchSettingsTab('cloud')"
          class="flex-1 py-2 text-sm font-medium text-muted border-b-2 border-transparent">☁️ Cloud</button>
      </div>

      <!-- Tab: Cảnh báo -->
      <div id="tabAlert" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-main mb-1">🔴 Ngưỡng tồn kho thấp</label>
          <input type="number" id="stockLowThreshold" min="1" max="100" value="10"
                 class="w-full border border-muted rounded-lg px-3 py-2 focus:border-primary focus:ring-2 focus:ring-primary" placeholder="VD: 10">
          <p class="text-xs text-muted mt-1">Báo khi tồn kho dưới giá trị này</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-main mb-1">🟡 Kỳ vọng bình/tháng (chung)</label>
          <input type="number" id="monthlyExpected" min="1" max="10000" value="300"
                 class="w-full border border-muted rounded-lg px-3 py-2 focus:border-primary focus:ring-2 focus:ring-primary" placeholder="VD: 300">
          <p class="text-xs text-muted mt-1">Cảnh báo khách lấy ít hơn kỳ vọng</p>
        </div>
      </div>

      <!-- Tab: Cloud -->
      <div id="tabCloud" class="space-y-4 hidden">
        <div id="cloudStatusBox" class="card p-3 text-sm">
          <div class="font-semibold text-main mb-1">Trạng thái hiện tại:</div>
          <div id="cloudStatusText" class="text-muted">Đang kiểm tra...</div>
        </div>

        <button id="becomeCloudBtn" onclick="becomeCloud()" class="w-full text-left p-3 rounded-xl border-2 border-info hover:bg-info/10 card">
          <div class="font-semibold text-info">🖥️ Dùng máy này làm Cloud</div>
          <div class="text-xs text-muted mt-0.5">Các thiết bị khác tự động phát hiện máy này</div>
        </button>

        <button id="scanCloudBtn" onclick="scanForCloud()" class="w-full text-left p-3 rounded-xl border-2 border-muted hover:bg-bg-hover card">
          <div class="font-semibold text-main">🔍 Tìm Cloud trong mạng LAN</div>
          <div id="scanStatus" class="text-xs text-muted mt-0.5">Quét các máy trong mạng...</div>
        </button>

        <div class="card p-3">
          <div class="text-xs font-semibold text-main mb-2">Hoặc nhập thủ công:</div>
          <input id="cloudUrlInput" type="url" placeholder="http://192.168.1.x:3001"
                 class="w-full border border-muted rounded-lg px-3 py-2 text-sm focus:border-primary focus:ring-2 focus:ring-primary mb-2">
          <button onclick="saveCloudUrl()" class="btn btn-primary w-full h-10 text-sm">
            💾 Lưu URL Cloud
          </button>
        </div>
      </div>

      <!-- Chỉ nút Lưu cho tab Cảnh báo -->
      <div id="alertSaveSection" class="flex gap-2 mt-6">
        <button onclick="closeAlertSettings()" class="btn btn-ghost flex-1 h-12">Hủy</button>
        <button onclick="saveAlertSettings()" class="btn btn-primary flex-1 h-12">💾 Lưu</button>
      </div>
    </div>
  </div>

  <script>
  let currentSettingsTab = 'alert';

  function switchSettingsTab(tab) {
    currentSettingsTab = tab;
    const alertTab = document.getElementById('tabAlert');
    const cloudTab = document.getElementById('tabCloud');
    const alertBtn = document.getElementById('tabAlertBtn');
    const cloudBtn = document.getElementById('tabCloudBtn');
    const saveSection = document.getElementById('alertSaveSection');

    if (tab === 'alert') {
      alertTab.classList.remove('hidden');
      cloudTab.classList.add('hidden');
      alertBtn.className = 'flex-1 py-2 text-sm font-medium text-primary border-b-2 border-primary';
      cloudBtn.className = 'flex-1 py-2 text-sm font-medium text-muted border-b-2 border-transparent';
      saveSection.classList.remove('hidden');
    } else {
      alertTab.classList.add('hidden');
      cloudTab.classList.remove('hidden');
      alertBtn.className = 'flex-1 py-2 text-sm font-medium text-muted border-b-2 border-transparent';
      cloudBtn.className = 'flex-1 py-2 text-sm font-medium text-primary border-b-2 border-primary';
      saveSection.classList.add('hidden');
      refreshCloudTab();
    }
  }

  async function showAlertSettings() {
    const modal = document.getElementById('alertSettingsModal');

    try {
      const res = await fetch('/api/settings');
      const settings = await res.json();
      document.getElementById('stockLowThreshold').value = settings.stock_low_threshold || 10;
      document.getElementById('monthlyExpected').value = settings.monthly_expected || 300;
    } catch (e) {
      document.getElementById('stockLowThreshold').value = 10;
      document.getElementById('monthlyExpected').value = 300;
    }

    switchSettingsTab('alert');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }

  function closeAlertSettings() {
    const modal = document.getElementById('alertSettingsModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }

  async function saveAlertSettings() {
    const threshold = document.getElementById('stockLowThreshold').value;
    const monthly = document.getElementById('monthlyExpected').value;

    try {
      await fetch('/api/settings/batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          stock_low_threshold: threshold,
          monthly_expected: monthly
        })
      });
      closeAlertSettings();
      alert('Đã lưu cài đặt!');
      location.reload();
    } catch (e) {
      alert('Lỗi: ' + e.message);
    }
  }

  // ===== A2HS INSTALL BANNER =====
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner() {
    if (document.getElementById('a2hsBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'a2hsBanner';
    banner.style.cssText = `
      position: fixed; bottom: 72px; left: 0; right: 0;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      color: white; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; font-weight: 500;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
      z-index: 9999; border-radius: 12px 12px 0 0;
      animation: slideUp 0.3s ease;
    `;
    banner.innerHTML = `
      <span style="font-size:24px">📱</span>
      <div style="flex:1">
        <div style="font-weight:700">Cài đặt BeerPOS</div>
        <div style="font-size:12px;opacity:0.85">Thêm app vào màn hình chính để dùng offline</div>
      </div>
      <button id="a2hsInstallBtn" style="
        background:white;color:#1e40af;border:none;
        padding:8px 16px;border-radius:8px;font-weight:700;
        font-size:13px;cursor:pointer;white-space:nowrap">
        Cài đặt
      </button>
      <button id="a2hsDismissBtn" style="
        background:rgba(255,255,255,0.2);color:white;border:none;
        padding:8px 12px;border-radius:8px;font-size:18px;cursor:pointer">
        ×
      </button>
    `;
    document.body.appendChild(banner);

    document.getElementById('a2hsInstallBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      hideInstallBanner();
      if (outcome === 'accepted') {
        showToast('Đã cài đặt BeerPOS!', 'success');
      }
    });

    document.getElementById('a2hsDismissBtn').addEventListener('click', () => {
      hideInstallBanner();
      localStorage.setItem('a2hsDismissed', '1');
    });
  }

  function hideInstallBanner() {
    const b = document.getElementById('a2hsBanner');
    if (b) b.remove();
  }

  // Show banner if installable AND not previously dismissed
  if (!localStorage.getItem('a2hsDismissed')) {
    setTimeout(() => {
      if (deferredPrompt) showInstallBanner();
    }, 3000);
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('[App] Service Worker registered');
      reg.addEventListener('updatefound', () => {
        showToast('App đã được cập nhật — tải lại trang để dùng phiên bản mới', 'info');
      });
    }).catch(err => console.warn('[App] SW registration failed:', err));
  }

  </script>
</body>
</html>
