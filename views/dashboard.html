  (function () {
    var k = 'theme';
    var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var saved = localStorage.getItem(k);
    var theme = (saved === 'light' || saved === 'dark') ? saved : sys;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
  })();
  </script>

    /* Desktop: side-by-side layout */
    @media (min-width: 640px) {
      .dsh-settings-grid {

        flex: 1;
        border-right: 1px solid var(--border);

      .dsh-settings-item-icon { margin-bottom: 0; }

      .dsh-settings-item-arrow { position: static; opacity: 0.5; font-size: 14px; }

    /* Settings section animation on appear */
    .dsh-settings-section {
      animation: cd-fade-up 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    @keyframes cd-fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

  <div id="app"></div>

  <script>
    requireAuth();

    const headerActions = `
      <div class="dsh-hdr-settings-wrap">

            </div>
            <div class="dsh-hdr-drop-item-arrow">›</div>
          </a>
          <a href="/qr-settings" class="dsh-hdr-drop-item dsh-hdr-drop-item-qr">
            <div class="dsh-hdr-drop-item-icon">💳</div>
            <div class="dsh-hdr-drop-item-text">
              <div class="dsh-hdr-drop-item-name">QR Thanh toán</div>

              <div class="dsh-hdr-drop-item-name">Quản lý Sales</div>
              <div class="dsh-hdr-drop-item-desc">DS nhân viên, hoa hồng, lương</div>

          </a>
          <div class="dsh-hdr-drop-item" onclick="closeSettingsDropdown(); showAlertSettings();">

            <div class="dsh-hdr-drop-item-text">
              <div class="dsh-hdr-drop-item-name">Cảnh báo &amp; Cloud</div>

  </script>
  <script>
    function toggleSettingsDropdown(e) {
      e.stopPropagation();
      const btn = document.getElementById('dshSettingsBtn');
      const dropdown = document.getElementById('dshSettingsDropdown');
      const overlay = document.getElementById('dshSettingsOverlay');
      if (!dropdown || !btn) return;
      const isOpen = dropdown.classList.contains('open');
      if (isOpen) {
        closeSettingsDropdown();
      } else {
        dropdown.classList.add('open');
        btn.classList.add('active');
        overlay.classList.add('open');
      }
    }
    function closeSettingsDropdown() {
      const btn = document.getElementById('dshSettingsBtn');
      const dropdown = document.getElementById('dshSettingsDropdown');
      const overlay = document.getElementById('dshSettingsOverlay');
      if (dropdown) dropdown.classList.remove('open');
      if (btn) btn.classList.remove('active');
      if (overlay) overlay.classList.remove('open');
    }
    // Close on outside click
    document.addEventListener('click', function(e) {
      const wrap = document.querySelector('.dsh-hdr-settings-wrap');
      if (wrap && !wrap.contains(e.target)) closeSettingsDropdown();
    });
    // Close on ESC
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeSettingsDropdown();
    });
    (async () => {
      try {
        if (typeof loadVersion === 'function') await loadVersion();
        // Remove skeleton placeholder — prevents CLS and shows real header immediately
        const skeleton = document.getElementById('skeleton');
        if (skeleton) skeleton.remove();
        document.getElementById('app').innerHTML =
          getHeaderWithActions('Gia Huy', '🍺', headerActions) +
          getContent(`
          <div id="loading" class="text-center py-8">
            <div class="spinner mx-auto"></div>
            <div class="text-muted mt-2">Đang tải...</div>
          </div>

          <div id="contentSection" class="hidden" style="padding-bottom:100px">

            <!-- Header: date -->
            <div class="flex items-center justify-between mb-4 px-1">
              <div class="text-xs text-muted font-medium" id="dashboardDate"></div>
            </div>

  <script>
  let currentSettingsTab = 'alert';

  function switchSettingsTab(tab) {
    currentSettingsTab = tab;
    const alertTab = document.getElementById('tabAlert');
    const cloudTab = document.getElementById('tabCloud');
    const alertBtn = document.getElementById('tabAlertBtn');
    const cloudBtn = document.getElementById('tabCloudBtn');
    const saveSection = document.getElementById('alertSaveSection');

    if (tab === 'alert') {
      alertTab.classList.remove('hidden');
      cloudTab.classList.add('hidden');
      alertBtn.style.color = 'var(--primary)';
      alertBtn.style.borderBottom = '2px solid var(--primary)';
      cloudBtn.style.color = 'var(--text-secondary)';
      cloudBtn.style.borderBottom = '2px solid transparent';
      saveSection.classList.remove('hidden');
    } else {
      alertTab.classList.add('hidden');
      cloudTab.classList.remove('hidden');
      alertBtn.style.color = 'var(--text-secondary)';
      alertBtn.style.borderBottom = '2px solid transparent';
      cloudBtn.style.color = 'var(--primary)';
      cloudBtn.style.borderBottom = '2px solid var(--primary)';
      saveSection.classList.add('hidden');
      // refreshCloudTab defined in sync.js (loaded async via requestIdleCallback)
      if (typeof refreshCloudTab === 'function') {
        refreshCloudTab();
      } else {
        // Fallback: try loading sync.js on-demand
        var s = document.createElement('script');
        s.src = '/sync.js?v=20260405';
        s.onload = function() { if (typeof refreshCloudTab === 'function') refreshCloudTab(); };
        document.head.appendChild(s);
      }
    }
  }

  async function showAlertSettings() {
    const modal = document.getElementById('alertSettingsModal');

    try {
      const res = await fetch('/api/settings');
      if (res.ok) {
        const settings = await res.json();
        document.getElementById('stockLowThreshold').value = settings.stock_low_threshold || 10;
        document.getElementById('monthlyExpected').value = settings.monthly_expected || 300;
      }
    } catch (e) {
      // Silently use defaults on error
      document.getElementById('stockLowThreshold').value = 10;
      document.getElementById('monthlyExpected').value = 300;
    }

    switchSettingsTab('alert');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }

  function closeAlertSettings() {
    const modal = document.getElementById('alertSettingsModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }

  async function saveAlertSettings() {
    const threshold = document.getElementById('stockLowThreshold').value;
    const monthly = document.getElementById('monthlyExpected').value;

    try {
      const res = await fetch('/api/settings/batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          stock_low_threshold: threshold,
          monthly_expected: monthly
        })
      });
      if (res.ok) {
        closeAlertSettings();
        showToast('Đã lưu cài đặt!', 'success');
        location.reload();
      } else {
        throw new Error('Server error: ' + res.status);
      }
    } catch (e) {
      showToast('Lỗi: ' + e.message, 'error');
    }
  }

  // ===== CLOUD TAB EVENT LISTENERS (fix race condition) =====
  // Cloud functions (becomeCloud, scanForCloud, saveCloudUrl) are defined in sync.js
  // which is loaded via requestIdleCallback. We attach listeners here that:
  // 1. Wait for sync.js to load
  // 2. Then safely call the functions

  function attachCloudListeners() {
    const becomeBtn = document.getElementById('becomeCloudBtn');
    const scanBtn = document.getElementById('scanCloudBtn');
    const saveBtn = document.getElementById('saveCloudUrlBtn');

    if (becomeBtn) {
      becomeBtn.addEventListener('click', async () => {
        if (typeof becomeCloud === 'function') {
          await becomeCloud();
        } else {
          // Load sync.js dynamically if not yet loaded
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = '/sync.js?v=20260405';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
          if (typeof becomeCloud === 'function') await becomeCloud();
        }
      });
    }

    if (scanBtn) {
      scanBtn.addEventListener('click', async () => {
        if (typeof scanForCloud === 'function') {
          await scanForCloud();
        } else {
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = '/sync.js?v=20260405';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
          if (typeof scanForCloud === 'function') await scanForCloud();
        }
      });
    }

    if (saveBtn) {
      saveBtn.addEventListener('click', async () => {
        if (typeof saveCloudUrl === 'function') {
          saveCloudUrl();
        } else {
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = '/sync.js?v=20260405';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
          if (typeof saveCloudUrl === 'function') saveCloudUrl();
        }
      });
    }
  }

  // Try to attach immediately, and also after sync.js loads
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      attachCloudListeners();
      // Re-attach after requestIdleCallback (when sync.js loads)
      setTimeout(attachCloudListeners, 6000);
    });
  } else {
    attachCloudListeners();
    setTimeout(attachCloudListeners, 6000);
  }

  // ===== A2HS INSTALL BANNER =====
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner() {
    if (document.getElementById('a2hsBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'a2hsBanner';
    banner.style.cssText = `
      position: fixed; bottom: 72px; left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-main); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; font-weight: 500;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      z-index: 9999; border-radius: 12px 12px 0 0;
      animation: slideUp 0.3s ease;
    `;
    banner.innerHTML = `
      <span style="font-size:24px">📱</span>
      <div style="flex:1">
        <div style="font-weight:700">Cài đặt BeerPOS</div>
        <div style="font-size:12px;opacity:0.7">Thêm app vào màn hình chính để dùng offline</div>
      </div>
      <button id="a2hsInstallBtn" style="
        background:var(--primary);color:var(--text-on-dark);border:none;
        padding:8px 16px;border-radius:8px;font-weight:700;
        font-size:13px;cursor:pointer;white-space:nowrap">
        Cài đặt
      </button>
      <button id="a2hsDismissBtn" style="
        background:rgba(0,0,0,0.1);color:var(--text-main);border:none;
        padding:8px 12px;border-radius:8px;font-size:18px;cursor:pointer">
        ×
      </button>
    `;
    document.body.appendChild(banner);

    document.getElementById('a2hsInstallBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      hideInstallBanner();
      if (outcome === 'accepted') {
        showToast('Đã cài đặt BeerPOS!', 'success');
      }
    });

    document.getElementById('a2hsDismissBtn').addEventListener('click', () => {
      hideInstallBanner();
      localStorage.setItem('a2hsDismissed', '1');
    });
  }

  function hideInstallBanner() {
    const b = document.getElementById('a2hsBanner');
    if (b) b.remove();
  }

  // Show banner if installable AND not previously dismissed
  if (!localStorage.getItem('a2hsDismissed')) {
    setTimeout(() => {
      if (deferredPrompt) showInstallBanner();
    }, 3000);
  }

  // PART 5: Đăng ký SW — dùng getRegistration() guard để tránh trùng lặp
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistration().then(function (reg) {
      if (!reg) {
        var swVer = (typeof window !== 'undefined' && window.APP_VERSION) ? window.APP_VERSION : '1';
        navigator.serviceWorker.register('/sw.js?v=' + swVer).then(function (reg2) {
          // Registered
          reg2.addEventListener('updatefound', function () {
            if (typeof showToast === 'function') {
              showToast('App đã được cập nhật — tải lại trang để dùng phiên bản mới', 'info');
            }
          });
        }).catch(function (e) { /* Silent SW registration fail */ });
      }
