<!DOCTYPE html>
<html lang="vi">
<head>
  <script>window.BASE_PATH = '/';</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Khách hàng</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">

  <!-- PERFORMANCE: Prefetch next-page modules for instant navigation -->
  <link rel="prefetch" href="/js/sales.js">
  <link rel="prefetch" href="/js/stock.js">

  <link rel="stylesheet" href="/css/unified.css?v=20260410-spacing">
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script src="/js/layout.js?v=20260410-binance"></script>
  <script src="/js/numfmt.js"></script>
  <script>requireAuth();</script>
  <style>
    canvas { width: 100% !important; height: auto !important; }

    /* ===== ADD MODAL — POS UX STYLES ===== */
    #addModal .add-section {
      padding: 16px;
      border-bottom: 1px solid var(--color-border);
    }
    #addModal .add-section:last-of-type {
      border-bottom: none;
      padding-bottom: 8px;
    }

    /* Section title */
    #addModal .add-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    /* Fields stack */
    #addModal .add-fields-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Field label */
    #addModal .add-field-label {
      display: block;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 5px;
      font-weight: 500;
    }

    /* Warning row (phone duplicate) */
    #addModal .add-field-warning {
      margin-top: 5px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 2px;
    }
    #addModal .add-field-warning.hidden { display: none; }

    /* Focus transition inputs */
    #addModal .add-input-compact {
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    #addModal .add-input-compact:focus {
      outline: none;
      border-color: var(--color-info);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    /* Currency input wrapper */
    #addModal .add-money-wrap {
      display: flex;
      align-items: stretch;
      max-width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--color-card);
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    #addModal .add-money-wrap:focus-within {
      border-color: var(--color-info);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    #addModal .add-money-suffix {
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-text);
      background: var(--color-bg);
      border-left: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    /* Stepper grid */
    #addModal .add-device-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      width: 100%;
    }
    #addModal .add-device-cell { min-width: 0; max-width: 100%; }

    /* Stepper component */
    #addModal .add-stepper-wrapper {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--color-card);
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    #addModal .add-stepper-wrapper:focus-within {
      border-color: var(--color-info);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    #addModal .add-stepper-btn {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      background: var(--color-bg);
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      color: var(--color-text);
    }
    #addModal .add-stepper-btn.minus {
      border-right: 1px solid var(--color-border);
      border-radius: 12px 0 0 12px;
    }
    #addModal .add-stepper-btn.plus {
      border-left: 1px solid var(--color-border);
      border-radius: 0 12px 12px 0;
    }
    #addModal .add-stepper-btn:active {
      transform: scale(0.92);
      background: var(--color-bg-hover);
    }
    #addModal .add-stepper-input::-webkit-outer-spin-button,
    #addModal .add-stepper-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    #addModal .add-stepper-input:focus { outline: none; }

    /* Price toggle row */
    #addModal .add-price-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    #addModal .add-toggle-btn {
      background: none;
      border: none;
      color: var(--color-info);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      min-height: 32px;
      min-width: 32px;
    }
    #addModal .add-toggle-btn:active { background: rgba(37,99,235,0.1); }

    /* Price body */
    #addModal .add-price-body { padding-top: 4px; }
    #addModal .add-price-body.hidden { display: none; }

    /* Footer buttons */
    #addModal .add-footer {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    #addModal .add-btn-cancel {
      flex: 1;
      min-width: 0;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--color-border);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #addModal .add-btn-save {
      flex: 1;
      min-width: 0;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--color-success), var(--color-success-dark));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-success);
      transition: filter 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #addModal .add-btn-save:active { filter: brightness(0.95); }
    #addModal .add-btn-cancel:active { background: var(--color-bg-hover); }
    #addModal .add-footer button:active { transform: scale(0.99); }

    /* Phone display format helper */
    #addModal .phone-display-hint {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    /* Modal sửa khách — mobile-first, không tràn ngang */
    #editModal .edit-modal-sheet {
      overflow-x: hidden;
      max-width: 100vw;
    }
    #editModal form#editForm {
      overflow-x: hidden;
      max-width: 100%;
      padding: 16px;
    }
    #editModal .edit-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-top: 16px;
      margin-bottom: 8px;
    }
    #editModal #editForm > .edit-block:first-of-type .edit-section-title {
      margin-top: 0;
    }
    #editModal .edit-field-label {
      display: block;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
      font-weight: 500;
    }
    #editModal .edit-block {
      padding-bottom: 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--color-border);
    }
    #editModal .edit-block:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    #editModal .edit-fields-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    /* Nút +/- số lượng */
    #editModal .qty-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      font-size: 18px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #editModal .qty-btn:active { transform: scale(0.92); background: var(--color-bg-hover); }
    #editModal .qty-btn.minus { border-radius: 10px 0 0 10px; border-right: none; }
    #editModal .qty-btn.plus  { border-radius: 0 10px 10px 0; border-left: none; }
    #editModal .qty-wrapper {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--color-card);
    }
    #editModal .qty-wrapper:focus-within {
      border-color: var(--color-info);
      box-shadow: 0 0 0 2px rgba(59,99,235,0.2);
    }
    #editModal .qty-input {
      width: 100%;
      height: 44px;
      border: none;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      color: var(--color-text);
      background: transparent;
      padding: 0 4px;
      min-width: 0;
      -moz-appearance: textfield;
    }
    #editModal .qty-input::-webkit-outer-spin-button,
    #editModal .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    #editModal .qty-input:focus { outline: none; }
    /* Grid thiết bị */
    #editModal .edit-device-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 100%;
    }
    #editModal .edit-device-cell { min-width: 0; max-width: 100%; }
    /* Ô tiền: suffix đ riêng */
    #editModal .edit-money-wrap {
      display: flex;
      align-items: stretch;
      max-width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--color-card);
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    #editModal .edit-money-wrap:focus-within {
      border-color: var(--color-info);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    #editModal .edit-money-input {
      flex: 1;
      min-width: 0;
      width: 1%;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    #editModal .edit-money-suffix {
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-text);
      background: var(--color-bg);
      border-left: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    /* Tuỳ chọn — grid 2 cột, không tràn ngang */
    #editModal .edit-option-card {
      max-width: 100%;
      overflow: hidden;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      padding: 12px 14px;
    }
    #editModal .edit-option-row {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      width: 100%;
      max-width: 100%;
      cursor: pointer;
      margin: 0;
    }
    #editModal .edit-option-checkbox {
      width: 22px;
      height: 22px;
      margin: 1px 0 0 0;
      cursor: pointer;
      accent-color: var(--color-info);
      flex-shrink: 0;
    }
    #editModal .edit-option-copy {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    #editModal .edit-option-title {
      font-size: 14px;
      line-height: 1.4;
      font-weight: 600;
      color: var(--color-text);
    }
    #editModal .edit-option-desc {
      font-size: 13px;
      line-height: 1.4;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }
    /* Footer: hai nút cân bằng */
    #editModal .edit-footer {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    #editModal .edit-btn-cancel {
      flex: 1;
      min-width: 0;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--color-border);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 16px;
      font-weight: 600;
    }
    #editModal .edit-btn-save {
      flex: 1;
      min-width: 0;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: var(--color-info);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }
    #editModal .edit-btn-save:active { background: var(--color-info-dark); }
    #editModal .edit-btn-cancel:active { background: var(--color-bg-hover); }
    #editModal .edit-footer button:active { transform: scale(0.99); }
    /* Focus transition inputs */
    #editModal .edit-input-compact {
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    #editModal .edit-input-compact:focus {
      outline: none;
      border-color: var(--color-info);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    /* Disable overscroll bounce */
    #editModal form { overscroll-behavior: contain; }
  </style>
</head>
<body class="bg-main text-primary body--app">
  <div id="app"></div>

  <!-- Floating Add Button -->
  <button onclick="showModal('addModal')" class="fab">+</button>

  <!-- Add Modal: POS-optimized UX — keyboard-first, 3-section layout, stepper inputs -->
  <div id="addModal" class="modal-overlay-v2 hidden" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
    <div class="modal-sheet-v2">
      <!-- Header -->
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title" id="addModalTitle">Thêm khách hàng</div>
        <button type="button" onclick="hideModal('addModal')" class="modal-sheet-v2-close" aria-label="Đóng">×</button>
      </div>

      <form id="addForm" class="modal-sheet-v2-body" novalidate>

        <!-- ===== SECTION 1: Thông tin cơ bản ===== -->
        <div class="section">
          <div class="section-title">Thông tin khách</div>
          <div class="flex flex-col gap-3">
            <div>
              <label for="addName" class="field-label">Tên khách hàng</label>
              <input type="text" name="name" id="addName" required autocomplete="name" enterkeyhint="next" data-field="name" placeholder="Nhập tên khách" class="bn-input bn-input--lg">
            </div>
            <div>
              <label for="addPhone" class="field-label">Số điện thoại</label>
              <input type="tel" name="phone" id="addPhone" inputmode="numeric" autocomplete="tel" enterkeyhint="next" data-field="phone" placeholder="0xxx xxx xxx" class="bn-input bn-input--lg">
              <div id="addPhoneWarning" class="add-field-warning hidden">
                <span class="text-warning text-xs">⚠️ SĐT đã tồn tại</span>
                <span id="addPhoneDupName" class="text-muted text-xs ml-1"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- ===== SECTION 2: Công nợ & tài sản ===== -->
        <div class="section">
          <div class="section-title">Công nợ & tài sản</div>

          <!-- Đặt cọc — currency input -->
          <div class="mb-3">
            <label for="addDeposit" class="field-label">Đặt cọc</label>
            <div class="field-wrap">
              <input type="text" name="deposit" id="addDeposit" value="0" data-format-number inputmode="decimal" enterkeyhint="next" data-field="deposit" placeholder="0" class="bn-input bn-input--lg">
              <span class="field-suffix">đ</span>
            </div>
          </div>

          <!-- Tủ lạnh nằm + Tủ mát đứng — stepper grid -->
          <div class="device-grid">
            <div class="device-cell">
              <label for="addHorizontalFridge" class="field-label">Tủ nằm ❄️</label>
              <div class="stepper">
                <button type="button" class="stepper-btn minus" data-action="decrement" data-target="addHorizontalFridge" aria-label="Giảm">−</button>
                <input type="number" name="horizontal_fridge" id="addHorizontalFridge" value="0" min="0" data-field="horizontal_fridge" enterkeyhint="next" class="stepper-input">
                <button type="button" class="stepper-btn plus" data-action="increment" data-target="addHorizontalFridge" aria-label="Tăng">+</button>
              </div>
            </div>
            <div class="device-cell">
              <label for="addVerticalFridge" class="field-label">Tủ đứng 🥶</label>
              <div class="stepper">
                <button type="button" class="stepper-btn minus" data-action="decrement" data-target="addVerticalFridge" aria-label="Giảm">−</button>
                <input type="number" name="vertical_fridge" id="addVerticalFridge" value="0" min="0" data-field="vertical_fridge" enterkeyhint="next" class="stepper-input">
                <button type="button" class="stepper-btn plus" data-action="increment" data-target="addVerticalFridge" aria-label="Tăng">+</button>
              </div>
            </div>
          </div>
        </div>

        <!-- ===== SECTION 3: Giá riêng (collapsible, default hidden) ===== -->
        <div class="section">
          <div class="flex justify-between items-center mb-3">
            <div class="section-title" style="margin-bottom:0">💰 Bảng giá riêng</div>
            <button type="button" onclick="toggleAddPrices()" id="togglePriceBtn" class="btn btn-ghost text-sm" style="font-size:13px;padding:4px 10px;">
              + Thêm giá
            </button>
          </div>
          <div id="addPriceFields" class="hidden">
            <div id="addPriceList" class="space-y-2 max-h-40 overflow-y-auto">
              <div class="text-muted text-sm text-center py-2">Đang tải sản phẩm...</div>
            </div>
          </div>
        </div>

      </form>

      <!-- Action bar: sticky bottom -->
      <div class="flex-shrink-0 border-t border-muted card px-4 pt-3 pb-[max(0.75rem,env(safe-area-inset-bottom,0px))] add-footer">
        <button type="button" onclick="hideModal('addModal')" class="add-btn-cancel touch-manipulation">Hủy</button>
        <button type="button" onclick="submitAddForm()" class="btn btn-primary bn-btn-lg">
          Lưu khách
        </button>
      </div>
    </div>
  </div>

  <!-- Edit Modal: mobile = bottom sheet, nội dung cuộn, nút cố định dưới -->
  <div id="editModal" class="modal-overlay-v2 hidden" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-sheet-v2">
      <div class="modal-sheet-v2-header">
        <div class="modal-sheet-v2-title" id="editModalTitle">Sửa khách hàng</div>
        <button type="button" onclick="hideModal('editModal')" class="modal-sheet-v2-close" aria-label="Đóng">×</button>
      </div>
      <form id="editForm" class="modal-sheet-v2-body">
        <input type="hidden" name="id" id="editId">

        <!-- Thông tin khách -->
        <div class="section">
          <div class="section-title">Thông tin khách</div>
          <div class="flex flex-col gap-3">
            <div>
              <label for="editName" class="field-label">Tên</label>
              <input type="text" name="name" id="editName" required autocomplete="name" enterkeyhint="next" data-field="name" class="bn-input bn-input--lg">
            </div>
            <div>
              <label for="editPhone" class="field-label">Điện thoại</label>
              <input type="tel" name="phone" id="editPhone" inputmode="numeric" autocomplete="tel" enterkeyhint="next" data-field="phone" placeholder="0xxx xxx xxx" class="bn-input bn-input--lg">
            </div>
          </div>
        </div>

        <!-- Tài chính -->
        <div class="section">
          <div class="section-title">Tài chính</div>
          <div>
            <label for="editDeposit" class="field-label">Đặt cọc</label>
            <div class="field-wrap">
              <input type="text" name="deposit" id="editDeposit" data-format-number inputmode="decimal" enterkeyhint="next" data-field="deposit" placeholder="0" class="bn-input bn-input--lg">
              <span class="field-suffix">đ</span>
            </div>
          </div>
        </div>

        <!-- Thiết bị -->
        <div class="section">
          <div class="section-title">Thiết bị</div>
          <div class="device-grid">
            <div class="device-cell">
              <label for="editHorizontalFridge" class="field-label">Tủ nằm ❄️</label>
              <div class="stepper">
                <button type="button" class="stepper-btn minus" onclick="adjustQty('editHorizontalFridge', -1)" aria-label="Giảm">−</button>
                <input type="number" name="horizontal_fridge" id="editHorizontalFridge" value="0" min="0" data-field="horizontal_fridge" class="stepper-input" onchange="clampQty(this, 0)">
                <button type="button" class="stepper-btn plus" onclick="adjustQty('editHorizontalFridge', 1)" aria-label="Tăng">+</button>
              </div>
            </div>
            <div class="device-cell">
              <label for="editVerticalFridge" class="field-label">Tủ đứng 🥶</label>
              <div class="stepper">
                <button type="button" class="stepper-btn minus" onclick="adjustQty('editVerticalFridge', -1)" aria-label="Giảm">−</button>
                <input type="number" name="vertical_fridge" id="editVerticalFridge" value="0" min="0" data-field="vertical_fridge" class="stepper-input" onchange="clampQty(this, 0)">
                <button type="button" class="stepper-btn plus" onclick="adjustQty('editVerticalFridge', 1)" aria-label="Tăng">+</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Tuỳ chọn -->
        <div class="section">
          <div class="section-title">Tuỳ chọn</div>
          <div class="option-card">
            <label class="option-row" for="editExcludeExpected">
              <input type="checkbox" name="exclude_expected" id="editExcludeExpected" class="option-checkbox">
              <span class="option-copy">
                <span class="option-title">Bỏ qua kỳ vọng doanh số (KPI)</span>
                <span class="option-desc">Không đưa khách này vào cảnh báo "dưới kỳ vọng" theo tháng.</span>
              </span>
            </label>
          </div>
        </div>
      </form>
      <!-- Action bar -->

          </div>

          <div class="mb-4">

          <div id="customersList" class="space-y-3">

          </div>

      `) +
      getBottomNav('/customers');
    })();
  </script>

  <!-- Load Customers JS -->
  <!-- realtime.js auto-loaded by layout.js -->
  <script src="/js/customers.js?v=20260410-binance"></script>

  <script>
    async function loadData() {
      try {
        const res = await fetch('/customers/data?page=1&limit=5&tab=active', { cache: 'no-store' });
        const data = await res.json();

        // Initialize customers page
        try {
          initCustomersPage(data);
        } catch (e) {
          console.error('Init error:', e);
        }

        // Hide loading, show content
        const loading = document.getElementById('loading');
        const contentSection = document.getElementById('contentSection');
        if (loading) loading.classList.add('hidden');
        if (contentSection) contentSection.classList.remove('hidden');

      } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('loading').innerHTML = '<div class="text-danger">Lỗi tải dữ liệu</div>';
      }
    }

    loadData();
  </script>
  
  <!-- PERFORMANCE: db.js + sync.js non-blocking via requestIdleCallback -->
  <script>
    var _ric = window.requestIdleCallback || function(cb) { return setTimeout(cb, 200); };
    _ric(function() {
      var s1 = document.createElement('script');
      s1.src = '/js/vendor/dexie.min.js?v=20260405';
      document.head.appendChild(s1);
      s1.onload = function() {
        var s2 = document.createElement('script');
        s2.src = '/db.js?v=20260411a';
        document.head.appendChild(s2);
        s2.onload = function() {
          var s3 = document.createElement('script');
          s3.src = '/sync.js?v=20260405';
          document.head.appendChild(s3);
        };
      };
    }, { timeout: 8000 });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(function (reg) {
        if (!reg) {
          var swVer = (typeof window !== 'undefined' && window.APP_VERSION) ? window.APP_VERSION : Date.now();
          navigator.serviceWorker.register('/sw.js?v=' + swVer).catch(function () {});
        }
      });
    }
  </script>
