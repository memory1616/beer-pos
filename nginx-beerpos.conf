upstream beerpos_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ============================================================
# PUBLIC: biatuoitayninh.store — Landing page + static
# ============================================================
server {
    listen 80;
    server_name biatuoitayninh.store www.biatuoitayninh.store;
    return 301 https://biatuoitayninh.store$request_uri;
}

server {
    listen 443 ssl http2;
    server_name biatuoitayninh.store www.biatuoitayninh.store;

    ssl_certificate /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/beer-pos;
    index landing.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # deploy.sh: copy public/landing-assets → /var/www/beer-pos/landing-assets/
    # Phục vụ trực tiếp (Range/stream video .mp4 ổn định hơn proxy qua Node)
    location ^~ /landing-assets/ {
        alias /var/www/beer-pos/landing-assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        sendfile on;
        tcp_nopush on;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /landing.html;
    }
}

# ============================================================
# ADMIN: admin.biatuoitayninh.store — Proxy to Node.js backend
# ============================================================
server {
    listen 80;
    server_name admin.biatuoitayninh.store;
    return 301 https://admin.biatuoitayninh.store$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.biatuoitayninh.store;

    ssl_certificate /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location = /favicon.ico {
        return 301 /icon-192.png;
    }

    # Admin JS/CSS: no long-term cache (version busting handled by server-side injection)
    location ~* \.(js|css)$ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        access_log off;
    }

    # Admin static assets (images, fonts): still cache long-term
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
}
