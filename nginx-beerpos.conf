upstream beerpos_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

    # ============================================================
    # PUBLIC: biatuoitayninh.store — Landing page + static
    # ============================================================
    server {
        listen 80;
        server_name biatuoitayninh.store www.biatuoitayninh.store;
        return 301 https://biatuoitayninh.store$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name biatuoitayninh.store www.biatuoitayninh.store;

        ssl_certificate /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        root /var/www/beer-pos;
        index landing.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript image/svg+xml video/mp4;
        gzip_min_length 1000;
        gzip_vary on;

        # deploy.sh: copy public/landing-assets → /var/www/beer-pos/landing-assets/
        # Video: phục vụ trực tiếp với MIME type + streaming headers
        location ^~ /landing-assets/ {
            alias /var/www/beer-pos/landing-assets/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header Accept-Ranges bytes;
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
            access_log off;
            sendfile on;
            tcp_nopush on;

            # Explicit MIME types for video (mobile requires this)
            types {
                video/mp4  mp4;
                video/webm webm;
                video/ogg  ogv;
                image/png  png;
                image/jpg  jpg jpeg;
                image/svg+xml svg;
                image/gif  gif;
                application/javascript js;
                text/css  css;
            };
        }

        # Lighttpd-compat alias for root-level landing-assets (used by Express /public mount)
        location ~* ^/landing-assets/(.+)$ {
            alias /var/www/beer-pos/public/landing-assets/$1;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header Accept-Ranges bytes;
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
            access_log off;
            sendfile on;
            tcp_nopush on;

            types {
                video/mp4  mp4;
                video/webm webm;
                video/ogg  ogv;
                image/png  png;
                image/jpg  jpg jpeg;
                image/svg+xml svg;
                image/gif  gif;
            };
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }

        location / {
            try_files $uri $uri/ /landing.html;
        }
    }

# ============================================================
# ADMIN: admin.biatuoitayninh.store — Proxy to Node.js backend
# ============================================================
server {
    listen 80;
    server_name admin.biatuoitayninh.store;
    return 301 https://admin.biatuoitayninh.store$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.biatuoitayninh.store;

    ssl_certificate /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location = /favicon.ico {
        return 301 /icon-192.png;
    }

    # Admin JS/CSS: no long-term cache (version busting handled by server-side injection)
    location ~* \.(js|css)$ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        access_log off;
    }

    # Admin static assets (images, fonts): still cache long-term
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
}
