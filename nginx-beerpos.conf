# =============================================================================
# BeerPOS - Nginx Config for 2 Domain Architecture
# =============================================================================
# Domain 1 (public landing):  biatuoitayninh.store
# Domain 2 (admin PWA):       admin.biatuoitayninh.store
#
# Setup:
#   1. Copy to /etc/nginx/sites-available/beerpos.conf
#   2. Link: ln -s /etc/nginx/sites-available/beerpos.conf /etc/nginx/sites-enabled/
#   3. Test:  nginx -t
#   4. Reload: systemctl reload nginx
#
# =============================================================================

# ---------- UPSTREAM ----------
upstream beerpos_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# =============================================================================
# DOMAIN 1: biatuoitayninh.store (Public Landing)
# Serves static landing page from /public/landing.html
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name biatuoitayninh.store www.biatuoitayninh.store;

    # Redirect HTTP → HTTPS
    return 301 https://biatuoitayninh.store$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name biatuoitayninh.store www.biatuoitayninh.store;

    # SSL certificates (letsencrypt)
    ssl_certificate     /etc/letsencrypt/live/biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/beer-pos/public;
    index index.html;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options   "nosniff"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # No cache for landing HTML
    location = / {
        try_files $uri $uri/ /landing.html;
    }

    # Serve landing.html for root
    location / {
        try_files $uri $uri/ /landing.html;
    }

    # Block /admin entirely on public domain — redirect to admin subdomain
    location ~ ^/admin(/.*)?$ {
        return 301 https://admin.biatuoitayninh.store$1;
    }

    # Block /api, /login, /sw.js on public domain
    location ~ ^/(api|login|sw\.js|manifest\.json) {
        return 403;
    }

    # Logging
    access_log /var/log/nginx/beerpos_public_access.log;
    error_log  /var/log/nginx/beerpos_public_error.log;
}

# =============================================================================
# DOMAIN 2: admin.biatuoitayninh.store (Admin PWA)
# Proxies to Node.js backend (Express on port 3000)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name admin.biatuoitayninh.store;

    # Redirect HTTP → HTTPS
    return 301 https://admin.biatuoitayninh.store$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.biatuoitayninh.store;

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/admin.biatuoitayninh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.biatuoitayninh.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options   "nosniff"                     always;
    add_header X-XSS-Protection         "1; mode=block"               always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header X-App-Mode              "admin"                        always;  # Tells Express app mode

    # SSL session cache
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---------- GZIP ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # ---------- STATIC ASSETS (Nginx serves directly) ----------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        # /public/ is mapped to /var/www/beer-pos/public via root below
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;

        # Let Express handle if not found
        try_files $uri @proxy_to_app;
    }

    # ---------- SERVICE WORKER: always fresh ----------
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires        "0";
        add_header X-App-Mode    "admin" always;
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- MANIFEST ----------
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
        add_header X-App-Mode    "admin" always;
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # ---------- API ROUTES: proxy to Express ----------
    location /api/ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";

        # CORS headers (Express also sets these, Nginx adds extra)
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods  "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers  "Content-Type, Authorization" always;

        # Preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Access-Control-Max-Age    86400;
            add_header Content-Type text/plain;
            add_header Content-Length 0;
            return 204;
        }

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ---------- AUTH ROUTES ----------
    location /auth/ {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";
        proxy_set_header X-App-Mode "admin";

        # CORS
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Type text/plain;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ---------- ALL HTML PAGES: proxy to Express ----------
    location / {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Mode "admin";  # Critical: tells Express to serve admin pages

        # Buffering
        proxy_buffering    on;
        proxy_buffer_size  128k;
        proxy_busy_buffers_size 256k;

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ---------- FALLBACK: Express handles 404 ----------
    error_page 404 /404.html;
    location = /404.html {
        proxy_pass http://beerpos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-App-Mode "admin";
    }

    # Logging
    access_log /var/log/nginx/beerpos_admin_access.log;
    error_log  /var/log/nginx/beerpos_admin_error.log;
}
